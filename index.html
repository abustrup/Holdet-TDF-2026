        ${mCell('roi / M',intKr,sell&&sell.roi_per_million,buy&&buy.roi_per_million,'higher')}
      </div>`:'';
    return `<div class="swap">
      <div>
        <div class="flow"><span class="sell">${esc(sw.sell_name||'—')}${flTag(sell)}</span><span class="arrow">→</span><span class="buy">${esc(sw.buy_name||'—')}${flTag(buy)}</span></div>
        <div class="why">${esc(sw.rationale||'')}</div>
      </div>
      <div class="meta">
        ${num(sw.expected_value)?`<span class="ev">EV ${kr(sw.expected_value)}</span>`:''}
        ${sw.confidence?`<span class="chip-conf ${ccCls}">${esc(sw.confidence)}</span>`:''}
        ${sw.human_gated===true?'<span class="pill warn tiny">human-gated</span>':''}
      </div>
      ${ledger}
    </div>`;
  }).join('');

  const tt=(dc.target_team||[]).map(n=>`<span class="tt-chip ${n===dc.captain_name?'cap':''}">${n===dc.captain_name?'★ ':''}${esc(n)}</span>`).join('');

  const inner=`<div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <span class="pill acc">source: ${esc(dc.source||'?')}</span>
      ${dc.rebuild?'<span class="pill warn">FULL REBUILD</span>':''}
      ${num(dc.matchRateAtWrite)?`<span class="pill">matchRate@write ${(dc.matchRateAtWrite*100).toFixed(0)}%</span>`:''}
      ${num(dc.total_value)?`<span class="pill">target value ${krM(dc.total_value)}</span>`:''}
      <span class="pill">written ${relAge(dc.generatedAt)}</span>
    </div>
    ${recon}
    <div class="decision-summary">${esc(dc.summary||'')}</div>
    <h3 style="margin:6px 0 9px">${(dc.swaps||[]).length} swap${(dc.swaps||[]).length===1?'':'s'} — sell → buy${pricedN?` <span class="mut2" style="font-weight:400;text-transform:none;letter-spacing:0">· net budget ${netDelta<0?`<span class="frees">frees ${krM(-netDelta)}</span>`:netDelta>0?`spends ${krM(netDelta)}`:'flat'} across ${pricedN} priced</span>`:''}</h3>
    ${ledgerNote}
    <div class="swaps">${swaps||'<span class="na">no swaps</span>'}</div>
    ${(shape||tt)?`<h3 style="margin:16px 0 7px">Resulting target team${shape?' — by real-world squad':''}</h3>${shape||`<div class="target-team">${tt}</div>`}`:''}
  </div>`;
  pushBlock('decision','03','Why this team — the decision','the core explanation: what changed and why',inner);
})();

/* ============================================================= 3b. TEAM B — DIFFERENTIAL (SHADOW) */
(function(){
  const tb=D.teamB||{};
  const plan=tb.plan||null;
  const enabled=!!tb.enabled;
  // Plan-vs-plan decorrelation: compare Team A's *planned* captain to Team B's planned captain.
  const aCaptain=(D.decision&&D.decision.captain_name)||(D.team&&D.team.captain)||null;
  const bCaptain=(plan&&plan.captain_name)||null;

  if(!plan && !tb.lastDecisionMd){
    pushBlock('teamb','3·B','Team B — differential (shadow)','the decorrelated second-team plan — surfaced even when disabled',
      `<div class="card"><span class="na">No Team B plan on record — the differential (cycle-b) routine has not produced a plan yet.</span></div>`);
    return;
  }

  const statusPill = enabled
    ? '<span class="pill ok"><span class="led"></span>ENABLED · live second team</span>'
    : '<span class="pill warn">DISABLED · shadow plan only</span>';

  // Honest framing: when disabled this is NOT a live action, just the decorrelated reasoning made visible.
  const honesty = enabled
    ? `<div class="cap-callout">Team B is a <b>live, decorrelated second entry</b> run alongside the anchor (Team A). It deliberately <b>fades ownership</b> and tilts toward differentials so the two teams are not perfectly correlated — the portfolio logic for chasing a top-1% finish instead of a safe mid-table.</div>`
    : `<div class="banner warn">⚠ Team B is <b>DISABLED in config</b>. What follows is the most recent <b>shadow differential plan</b> the cycle-b routine computed — it is <b>NOT applied to any live second team</b>. Shown for honest transparency into the decorrelated reasoning, never as an executed action.</div>`;

  // The single most insightful artifact: the A-vs-B captain split that makes "decorrelation" concrete.
  const same = aCaptain && bCaptain && aCaptain.trim().toLowerCase()===bCaptain.trim().toLowerCase();
  const verdict = (aCaptain && bCaptain)
    ? (same
        ? '<div class="tiny" style="color:var(--warn);margin-top:5px">⚠ same captain as Team A — not decorrelated this cycle</div>'
        : '<div class="tiny" style="color:var(--ok);margin-top:5px">✓ decorrelated — a different captain from Team A</div>')
    : '';
  const contrast = (aCaptain||bCaptain) ? `<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div class="card" style="flex:1;min-width:210px;margin:0">
        <h3>Team A captain (planned anchor)</h3>
        <div style="font-size:15px;font-weight:650;color:var(--gold)">★ ${esc(aCaptain||'—')}</div>
        <div class="tiny muted" style="margin-top:4px">the certain right-tail — highest-ceiling owned rider</div>
      </div>
      <div class="card" style="flex:1;min-width:210px;margin:0">
        <h3>Team B captain (differential)</h3>
        <div style="font-size:15px;font-weight:650;color:var(--violet)">★ ${esc(bCaptain||'—')}</div>
        <div class="tiny muted" style="margin-top:4px">ownership-faded differential pick</div>
        ${verdict}
      </div>
    </div>` : '';

  const swaps=((plan&&plan.swaps)||[]).map(sw=>`<div class="swap">
      <div>
        <div class="flow"><span class="sell">${esc(sw.sell_name||'—')}</span><span class="arrow">→</span><span class="buy">${esc(sw.buy_name||'—')}</span></div>
        <div class="why">${esc(sw.rationale||'')}</div>
      </div>
      <div class="meta"><span class="pill tiny" style="border-color:var(--diff-bd);color:var(--violet);background:var(--diff-bg)">differential</span></div>
    </div>`).join('');

  const inner=`<div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      ${statusPill}
      ${plan&&plan.source?`<span class="pill acc">source: ${esc(plan.source)}</span>`:''}
      ${plan&&plan.stage_number!=null?`<span class="pill">stage ${esc(plan.stage_number)} · ${esc(plan.stage_type||'?')}</span>`:''}
      ${plan&&plan.generatedAt?`<span class="pill">written ${relAge(plan.generatedAt)}</span>`:''}
    </div>
    ${honesty}
    ${contrast}
    ${plan&&plan.summary?`<div class="decision-summary" style="border-left-color:var(--violet)">${esc(plan.summary)}</div>`:''}
    ${swaps?`<h3 style="margin:6px 0 9px">${plan.swaps.length} differential swap${plan.swaps.length===1?'':'s'} — sell → buy</h3><div class="swaps">${swaps}</div>`:'<div class="cap-nodata">No swaps in the latest Team B plan.</div>'}
  </div>`;
  pushBlock('teamb','3·B','Team B — differential (shadow)','decorrelated second-team plan · enabled state shown honestly · captain split vs Team A',inner);
})();

/* ============================================================= 4. EV EXPLORER */
(function(){
  const live=D.meta&&D.meta.substrateLive;
  const board=D.evBoard||[];
  if(!live || !board.length){
    // fallback to name lists
    const b=D.boards||{};
    const list=(arr)=> (arr&&arr.length)? '<ol style="margin:6px 0 0;padding-left:20px">'+arr.map(n=>`<li>${esc(n)}</li>`).join('')+'</ol>' : '<span class="na">none</span>';
    const inner=`<div class="banner warn">Live per-rider substrate was unavailable for this build — showing the snapshot's name-list leaderboards instead.</div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">
        <div class="card"><h3>Top by EV</h3>${list(b.topByEv)}</div>
        <div class="card"><h3>Top by ROI</h3>${list(b.topByRoi)}</div>
        <div class="card"><h3>Low confidence</h3>${list(b.lowConfidence)}</div>
      </div>`;
    pushBlock('explorer','04','EV substrate explorer','fallback: substrate not live',inner);
    return;
  }
  // max for sparkbars
  const maxEh=Math.max(1,...board.map(r=>num(r.e_horizon)?r.e_horizon:0));
  const cols=[
    {k:'name',  t:'Rider',     num:false},
    {k:'realTeam',t:'Team',    num:false},
    {k:'value', t:'Price',     num:true,  fmt:v=>krM(v)},
    {k:'p_stage',t:'p_stage',  num:true,  fmt:v=>pct(v,2)},
    {k:'p_top15',t:'p_top15',  num:true,  fmt:v=>pct(v,2)},
    {k:'p_gc',  t:'p_gc',      num:true,  fmt:v=>pct(v)},
    {k:'confidence',t:'conf',  num:true,  fmt:confCell},
    {k:'coverage',t:'cov',     num:true,  fmt:v=>num(v)?v:naSpan},
    {k:'e_stage',t:'e_stage',  num:true,  fmt:v=>kr(v)},
    {k:'e_horizon',t:'e_horizon',num:true,fmt:ehCell},
    {k:'roi_per_million',t:'roi/M',num:true,fmt:v=>num(v)?Math.round(v).toLocaleString('en-US'):naSpan},
    {k:'captain_ceiling',t:'cap ceil',num:true,fmt:v=>kr(v)},
    {k:'signal',t:'signal',num:false,fmt:null},
  ];
  function confCell(v){ const t=confTier(v); return `<span class="confcell"><span style="color:${t.col}">${t.c}</span></span>`; }
  function ehCell(v){ const w=num(v)?Math.max(1,Math.round(v/maxEh*46)):0; return `<span class="sparkbg"><span class="spark" style="width:${w}px"></span></span>${kr(v)}`; }
  // Provenance cell: which research channels actually fed this rider — coverage===0 means NONE (a shared prior/floor, not evidence).
  function signalCell(r){
    if(!num(r.coverage) || r.coverage===0) return '<span class="floor-tag" title="No research channel returned a reading for this rider — the estimate is the identical shared prior, not evidence.">⚠ prior/floor</span>';
    const srcs=(r.sources||[]);
    if(!srcs.length) return '<span class="floor-tag">⚠ no src</span>';
    return srcs.map(s=>`<span class="src-chip">${esc(s)}</span>`).join('');
  }
  const floorCount=board.filter(r=>!num(r.coverage)||r.coverage===0).length;
  const liveChannels=[...new Set(board.flatMap(r=>r.sources||[]))];

  const head=cols.map((c,i)=>`<th class="${c.num?'r':''} sortable" data-col="${i}">${c.t}<span class="ar"></span></th>`).join('');
  const inner=`<div class="card">
    <div class="explorer-bar">
      <input type="text" id="evfilter" placeholder="filter by rider or team…">
      <label><input type="checkbox" id="evowned"> owned only</label>
      <label><input type="checkbox" id="evcov"> covered only (conf≥0.4)</label>
      <span class="count-tag" id="evcount"></span>
    </div>
    <div class="evlegend">
      <span><span class="src-chip">uci</span><span class="src-chip">gcOdds</span> = channels that fed the estimate (its <b style="color:var(--cyan)">signal</b>).</span>
      <span><span class="floor-tag">⚠ prior/floor</span> = <b>${floorCount} of ${board.length} riders (${(floorCount/board.length*100).toFixed(0)}%)</b> had NO channel reading — collapsed to the identical shared prior, shown here so a prior is never mistaken for evidence.</span>
      <span>Live channels this build: <b style="color:var(--cyan)">${liveChannels.length? liveChannels.map(esc).join(', ') : 'none'}</b>.</span>
    </div>
    <div class="tbl-wrap" style="max-height:640px;overflow:auto">
      <table id="evtable"><thead><tr>${head}</tr></thead><tbody></tbody></table>
    </div>
  </div>`;
  pushBlock('explorer','04','EV substrate explorer','full pool of '+board.length+' · '+floorCount+' on the zero-signal prior floor · click headers to sort · this is WHY X over Y',inner);

  // defer wiring until DOM is in place
  EV_WIRE.push(function(){
    const tbody=document.querySelector('#evtable tbody');
    const ths=document.querySelectorAll('#evtable thead th');
    let sortCol=9, sortDir=-1; // e_horizon desc
    function render(){
      const q=(document.getElementById('evfilter').value||'').toLowerCase();
      const ownedOnly=document.getElementById('evowned').checked;
      const covOnly=document.getElementById('evcov').checked;
      let rows=board.filter(r=>{
        if(ownedOnly&&!r.owned) return false;
        if(covOnly&&!(num(r.confidence)&&r.confidence>=0.4)) return false;
        if(q){ const hay=((r.name||'')+' '+(r.realTeam||'')).toLowerCase(); if(!hay.includes(q)) return false; }
        return true;
      });
      const c=cols[sortCol];
      rows.sort((a,b)=>{
        if(c.k==='signal'){ // sort by coverage depth (floor riders group together), then confidence
          const av=(num(a.coverage)?a.coverage:0)+(num(a.confidence)?a.confidence:0);
          const bv=(num(b.coverage)?b.coverage:0)+(num(b.confidence)?b.confidence:0);
          return (av-bv)*sortDir;
        }
        let av=a[c.k],bv=b[c.k];
        if(c.num){ av=num(av)?av:-Infinity; bv=num(bv)?bv:-Infinity; return (av-bv)*sortDir; }
        av=(av||'').toString().toLowerCase(); bv=(bv||'').toString().toLowerCase();
        return av<bv?-sortDir:av>bv?sortDir:0;
      });
      tbody.innerHTML=rows.map(r=>{
        const isFloor = !num(r.coverage) || r.coverage===0;
        const tds=cols.map(col=>{
          if(col.k==='signal') return `<td>${signalCell(r)}</td>`;
          let v=r[col.k];
          let disp = col.fmt? col.fmt(v) : esc(v);
          return `<td class="${col.num?'r':''}">${disp}</td>`;
        }).join('');
        return `<tr class="${r.owned?'owned':''} ${r.isOut?'out':''} ${isFloor?'floorrow':''}">${tds}</tr>`;
      }).join('');
      document.getElementById('evcount').textContent=rows.length+' / '+board.length+' riders';
      ths.forEach((th,i)=>{ th.classList.toggle('act',i===sortCol); const ar=th.querySelector('.ar'); if(ar) ar.textContent= i===sortCol?(sortDir<0?'▼':'▲'):''; });
    }
    ths.forEach(th=>th.addEventListener('click',()=>{
      const i=+th.dataset.col;
      if(i===sortCol) sortDir*=-1; else { sortCol=i; sortDir= cols[i].num? -1 : 1; }
      render();
    }));
    document.getElementById('evfilter').addEventListener('input',render);
    document.getElementById('evowned').addEventListener('change',render);
    document.getElementById('evcov').addEventListener('change',render);
    render();
  });
})();

/* ============================================================= 5. STAGE CONTEXT */
(function(){
  const st=D.stage||{}, en=st.enriched||{}, tw=en.type_weighting||null;
  const up=D.upcomingStages||[];

  // radar for type_weighting
  function radar(tw){
    if(!tw) return '<span class="na">no type weighting</span>';
    const keys=['climber','sprinter','puncheur','rouleur','breakaway','gc'];
    const vals=keys.map(k=>num(tw[k])?tw[k]:0);
    const maxv=Math.max(0.001,...vals);
    const cx=95,cy=95,R=72,N=keys.length;
    const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};
    let rings='';
    [0.25,0.5,0.75,1].forEach(f=>{ const p=keys.map((_,i)=>pt(i,R*f).map(n=>n.toFixed(1)).join(',')).join(' '); rings+=`<polygon points="${p}" fill="none" stroke="var(--line)" stroke-width="1"/>`; });
    let axes='',labels='';
    keys.forEach((k,i)=>{ const[x,y]=pt(i,R); axes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--line2)"/>`;
      const[lx,ly]=pt(i,R+14); labels+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="9.5" fill="var(--mut)" text-anchor="middle" dominant-baseline="middle">${k}</text>`; });
    const poly=keys.map((k,i)=>pt(i,R*(vals[i]/maxv)).map(n=>n.toFixed(1)).join(',')).join(' ');
    return `<svg width="190" height="190" viewBox="0 0 190 190" role="img" aria-label="type weighting radar">
      ${rings}${axes}
      <polygon points="${poly}" fill="rgba(163,113,247,.22)" stroke="var(--violet)" stroke-width="2"/>
      ${keys.map((k,i)=>{const[x,y]=pt(i,R*(vals[i]/maxv));return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="var(--violet)"/>`;}).join('')}
      ${labels}</svg>`;
  }
  function twBars(tw){
    if(!tw) return '';
    const keys=['climber','sprinter','puncheur','rouleur','breakaway','gc'];
    const maxv=Math.max(0.001,...keys.map(k=>num(tw[k])?tw[k]:0));
    return `<div class="tw-bars">`+keys.map(k=>{const v=num(tw[k])?tw[k]:0;return `<div class="tw-row"><span class="lbl">${k}</span><span class="bar"><i style="width:${(v/maxv*100).toFixed(0)}%"></i></span><span class="val">${v.toFixed(3)}</span></div>`;}).join('')+`</div>`;
  }

  const upcards=up.map(s=>`<div class="ustage ${s.summit_finish?'summit':''}">
      <div class="sn">Stage ${s.number??'?'} · ${s.date||''}</div>
      <div class="ic">${stageIcon(s.type)}</div>
      <div class="ty">${cap1(s.type)||'?'}</div>
      <div class="rt">${esc(s.start_town||'?')} → ${esc(s.finish_town||'?')}<br>${num(s.distance_km)?s.distance_km+' km':''}</div>
      ${s.summit_finish?'<div class="summitflag">▲ summit finish</div>':''}
    </div>`).join('');

  /* ---- swap cadence / block rhythm ----
     The strategy treats stage-TYPE boundaries as reshape points and holds within a block
     (swaps are unlimited but the 1% buy fee is the only friction — tendency #7 respects
     block_boundary look-ahead). Classify each transition between the shown stages straight
     from their types (no rider/name keying): same type = HOLD; a boundary between two climbing
     stages (hilly<->mountain) is a SOFT GC-internal transition (the GC core still fits); any
     flip touching a flat/sprint or TT block is a HARD reshape (the rewarded archetype changes). */
  let cadenceHtml='';
  const upt=up.filter(s=>s&&s.type);
  if(upt.length>=2){
    const grp=t=>{t=(t||'').toLowerCase();
      if(t==='mountain'||t==='hilly')return 'climb';
      if(t==='flat'||t==='sprint')return 'flat';
      if(t==='itt'||t==='ttt'||t==='tt')return 'tt';
      return t||'?';};
    const transClass=(a,b)=>{ if(a===b)return 'hold'; return grp(a)===grp(b)?'soft':'hard'; };
    const transLbl={hold:'hold',soft:'soft · GC-internal',hard:'hard flip · reshape'};
    // current stage number (the "here" marker) = the live stage
    const hereNum=(D.stage&&num(D.stage.number))?D.stage.number:(upt[0]&&upt[0].number);
    let ribbon='';
    upt.forEach((s,i)=>{
      ribbon+=`<div class="cad-stage ${s.number===hereNum?'here':''}"><span class="cs-n">S${s.number??'?'}</span><span class="cs-ic">${stageIcon(s.type)}</span><span class="cs-ty">${cap1(s.type)||'?'}</span></div>`;
      if(i<upt.length-1){
        const c=transClass((s.type||'').toLowerCase(),(upt[i+1].type||'').toLowerCase());
        ribbon+=`<div class="cad-link ${c}" title="S${s.number}→S${upt[i+1].number}: ${transLbl[c]}"><span class="cl-line"></span><span class="cl-lbl">${c==='hold'?'hold':(c==='soft'?'soft':'reshape')}</span></div>`;
      }
    });
    // next HARD reshape point in the forward sequence
    let nextHard=null;
    for(let i=0;i<upt.length-1;i++){
      if(transClass((upt[i].type||'').toLowerCase(),(upt[i+1].type||'').toLowerCase())==='hard'){
        nextHard={a:upt[i],b:upt[i+1]}; break;
      }
    }
    // today's action, straight from the decision (0 swaps = a hold day)
    const nsw=(D.decision&&Array.isArray(D.decision.swaps))?D.decision.swaps.length:null;
    const todayTxt = nsw===0
      ? `<b>Today the bot HELD — 0 swaps</b> (chalk captain).`
      : (nsw!=null ? `<b>Today the bot made ${nsw} swap${nsw>1?'s':''}.</b>` : '');
    const hereEn=(D.stage&&D.stage.enriched)||{};
    const openedTxt = hereEn.block_boundary
      ? ` S${hereNum} itself opened a new block (<span class="mono">${esc(hereEn.profile_block||'block boundary')}</span>).`
      : '';
    const nextTxt = nextHard
      ? ` The next <b style="color:var(--bad)">hard reshape</b> point is <b>S${nextHard.a.number}→S${nextHard.b.number}</b> (${cap1(nextHard.a.type)}→${cap1(nextHard.b.type)}) — where the rewarded archetype flips and the squad is rebuilt${nsw===0?`, so the 0-swap hold today is on-doctrine, not inertia`:''}.`
      : '';
    cadenceHtml=`<h3 style="margin:18px 0 9px;font-size:12px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase">Swap cadence — the block rhythm</h3>
      <div class="cadence">${ribbon}</div>
      <p style="font-size:12.5px;color:var(--ink2);line-height:1.6;margin:11px 0 0">${todayTxt}${openedTxt}${nextTxt} ${I('Strategy: swaps are unlimited but cost a 1% buy fee, so the bot reshapes the squad at stage-type boundaries (where the rewarded rider archetypes flip) and holds within a block — it will not churn for one mid-block stage (tendency #7).')}
      <br><span style="color:var(--mut);font-size:11.5px">Boundary legend, derived from stage types only: <b style="color:var(--bad)">hard flip</b> = a climb↔flat/TT archetype change (full rebuild); <b style="color:var(--gold)">soft</b> = a GC-internal hilly↔mountain move (GC core still fits, few/no swaps); <b style="color:var(--mut)">hold</b> = same stage type as the previous, no boundary.</span></p>`;
  }

  const inner=`<div class="stage-grid">
    <div class="card">
      <h3>Stage ${st.number??'?'} profile</h3>
      <div class="kv" style="display:grid;grid-template-columns:max-content 1fr;gap:5px 14px;font-size:13px">
        <b class="muted">Type</b><span>${cap1(st.type)||naSpan}</span>
        <b class="muted">Route</b><span>${esc(st.start_town||'?')} → ${esc(st.finish_town||'?')}</span>
        <b class="muted">Distance</b><span>${num(st.distance_km)?st.distance_km+' km':naSpan}</span>
        <b class="muted">Date</b><span>${esc(st.date||naSpan)}</span>
        <b class="muted">Summit</b><span>${st.summit_finish?'yes':'no'}</span>
      </div>
      <p style="font-size:12.5px;color:var(--mut);line-height:1.6;margin:12px 0 0">${esc(st.profile_notes||'')}</p>
    </div>
    <div class="card">
      <h3>Enriched block ${I('Per-stage signal weighting the engine derives — what rider archetypes this stage rewards.')}</h3>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px">
        <span class="pill">leverage ${num(en.leverage)?en.leverage:naSpan}</span>
        <span class="pill">breadth ${en.expected_breadth??naSpan}</span>
        <span class="pill">${esc(en.profile_block||'—')}</span>
        ${en.block_boundary?'<span class="pill warn">block boundary</span>':''}
      </div>
      <div class="radar-wrap">${radar(tw)}${twBars(tw)}</div>
    </div>
  </div>
  <h3 style="margin:18px 0 9px;font-size:12px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase">Upcoming stages</h3>
  <div class="upcoming">${upcards||'<span class="na">none</span>'}</div>
  ${cadenceHtml}`;
  pushBlock('stage','05','Stage context','profile · enriched type-weighting radar · look-ahead · swap cadence',inner);
})();

/* ============================================================= 7. SELF-IMPROVE */
(function(){
  const im=D.improve;
  if(!im){ pushBlock('improve','07','Self-improvement','','<div class="card"><span class="na">No improve report.</span></div>'); return; }
  const cv=im.crossVal||{}, folds=cv.folds||[];
  const maxAbs=Math.max(0.5,...folds.map(f=>Math.abs(num(f.pct)?f.pct:0)));
  const foldBars=folds.map(f=>{
    const p=num(f.pct)?f.pct:0; const w=Math.abs(p)/maxAbs*50;
    return `<div class="fold-row">
      <span class="yr">${f.year}</span>
      <div class="fold-track"><div class="zero"></div><i class="${p>=0?'pos':'neg'}" style="width:${w.toFixed(1)}%"></i></div>
      <span class="pc ${p>=0?'pos':'neg'}">${p>=0?'+':''}${num(f.pct)?f.pct.toFixed(2):'?'}%</span>
    </div>`;
  }).join('');
  const wc=(im.weightChanges||[]).map(w=>`<tr><td class="mono">${esc(w.knob)}</td><td class="r">${esc(w.from)}</td><td style="text-align:center;color:var(--mut)">→</td><td class="r">${esc(w.to)}</td></tr>`).join('');
  const findings=(im.autopsy&&im.autopsy.findings||[]).map(fd=>`<div style="border:1px solid var(--line);border-radius:9px;padding:9px 12px;background:var(--chip-bg)">
      <span class="chip-conf ${fd.severity==='high'?'low':fd.severity==='med'?'med':'high'}">${esc(fd.severity||'')}</span>
      <b style="margin-left:7px">${esc(fd.area||'')}</b>
      <div style="font-size:12.5px;color:var(--mut);margin-top:5px">${esc(fd.detail||'')}</div>
    </div>`).join('');
  const aStats=im.autopsy&&im.autopsy.stats||null;
  const statChips=aStats?Object.entries(aStats).filter(([k,v])=>typeof v!=='object').map(([k,v])=>`<span class="pill tiny">${esc(k)}: ${esc(v)}</span>`).join(''):'';

  /* Where points are lost, by stage type. autopsy.stats.breadthByType (avg of the 8 owned riders that
     SCORED per stage, split by stage type) is the autopsy's richest field, yet the scalar-only stat-chip
     filter above silently drops it (it's an object) — so the bot's own most granular self-diagnosis never
     rendered. Surface it as bars, lowest breadth first, worst type flagged; and when the worst-breadth type
     ALSO equals captainWorstType, fuse both into one honest "systematic weak spot" headline (two disconnected
     pills → one insight). Pure backtest aggregates — no rider names anywhere → no surname keying. */
  let weakspot='';
  if(aStats && aStats.breadthByType && typeof aStats.breadthByType==='object'){
    const ents=Object.entries(aStats.breadthByType).filter(([,v])=>num(v));
    if(ents.length){
      const worst=ents.reduce((a,b)=>b[1]<a[1]?b:a);
      const best =ents.reduce((a,b)=>b[1]>a[1]?b:a);
      const capWorstType=String(aStats.captainWorstType||'').toLowerCase().split(/[\s(]/)[0];
      const agree = capWorstType && capWorstType===worst[0];
      const bars=[...ents].sort((a,b)=>a[1]-b[1]).map(([t,v])=>{
        const isWorst=t===worst[0];
        const w=Math.max(2,Math.round(v/8*100));
        const bg=isWorst?'var(--bad)':'linear-gradient(90deg,var(--violet),var(--acc))';
        return `<div style="display:grid;grid-template-columns:104px 1fr 74px;gap:11px;align-items:center;font-size:12px;margin-bottom:6px">
          <span style="text-transform:capitalize;color:${isWorst?'var(--bad)':'var(--mut)'}">${esc(t)}${isWorst?' <span class="tiny">◄ weak spot</span>':''}</span>
          <span style="height:9px;border-radius:5px;background:var(--bar-bg);border:1px solid var(--line);overflow:hidden;display:block"><i style="display:block;height:100%;width:${w}%;background:${bg}"></i></span>
          <span class="mono" style="text-align:right;color:var(--ink2)">${v.toFixed(2)}/8</span>
        </div>`;
      }).join('');
      const head=agree
        ? `<b style="color:var(--bad)">${cap1(worst[0])} stages are the systematic weak spot</b> — worst on <b>both</b> axes: fewest riders scoring (<b>${worst[1].toFixed(2)}/8</b>) <b>and</b> the largest captain regret (${esc(aStats.captainWorstType||'')}). When the Tour hits ${esc(worst[0])} stages, expect this to be where the strategy leaks the most points — and where the self-improve loop should push hardest.`
        : `Breadth is thinnest on <b style="color:var(--bad)">${esc(worst[0])}</b> stages (<b>${worst[1].toFixed(2)}/8</b> riders scoring) and healthiest on <b style="color:var(--ok)">${esc(best[0])}</b> (<b>${best[1].toFixed(2)}/8</b>) — a ${(best[1]-worst[1]).toFixed(2)}-rider swing the strategy has not closed.`;
      weakspot=`<h3 style="margin-top:16px">Where points are lost — breadth by stage type ${I('Backtest average, over the stages above, of how many of the 8 owned riders scored ANY points per stage — split by stage type. Low = most of the squad blanked that day. This is coverage of the field, not captaincy.')}</h3>
        <div class="slot-note" style="border-left-color:var(--bad);margin-bottom:11px">${head}</div>
        <div style="max-width:540px">${bars}</div>`;
    }
  }

  const inner=`<div class="card">
    <div class="imp-top">
      <div class="metric ${num(im.improvedPct)&&im.improvedPct>=0?'pos':'neg'}"><div class="v">${num(im.improvedPct)?(im.improvedPct>=0?'+':'')+im.improvedPct+'%':'—'}</div><div class="l">in-sample</div></div>
      <div class="metric ${num(im.heldOutPct)&&im.heldOutPct>=0?'pos':'neg'}"><div class="v">${num(im.heldOutPct)?(im.heldOutPct>=0?'+':'')+im.heldOutPct+'%':'—'}</div><div class="l">held-out (oos)</div></div>
      <div class="metric"><div class="v" style="color:${im.merged?'var(--ok)':'var(--warn)'}">${im.merged?'MERGED':'HELD'}</div><div class="l">verdict</div></div>
      <div class="metric"><div class="v">${(im.years||[]).length}</div><div class="l">backtest years</div></div>
    </div>
    <div class="gate-explain"><b>Merge gate ${I('Conjunctive: in-sample ≥ floor AND held-out ≥ floor AND no cross-val fold regresses. ALL must pass to auto-merge.')}:</b> ${esc(im.mergeGateExplanation||'')}</div>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <h3>Cross-validation folds ${I('Leave-one-year-out: candidate vs baseline per season. Signed bars, baseline at 0.')}</h3>
        <div class="fold-bars">${foldBars||'<span class="na">no folds</span>'}</div>
      </div>
      <div>
        <h3>Proposed weight changes</h3>
        ${wc?`<div class="tbl-wrap"><table>${wc}</table></div>`:'<span class="na">none</span>'}
      </div>
    </div>
    <h3 style="margin-top:16px">Autopsy</h3>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${statChips}</div>
    ${weakspot}
    <div class="grid" style="gap:9px;margin-top:${weakspot?'16px':'0'}">${findings||'<span class="na">no findings</span>'}</div>
  </div>`;
  pushBlock('improve','07','Self-improvement','in-sample vs held-out · the conjunctive merge gate explained',inner);
})();

/* ============================================================= 8. RUN LOG */
(function(){
  const runs=D.status&&D.status.recentRuns||[];
  const tails=D.status&&D.status.logTails||{};
  const rows=runs.map(r=>{
    const ph=(r.phase||'other').toLowerCase();
    const phCls= ph==='collect'?'ph-collect':ph==='verify'?'ph-verify':ph==='improve'?'ph-improve':'ph-other';
    const stCls= r.status==='warn'?'st-warn':(r.status==='err'||r.status==='error')?'st-err':r.status==='noop'?'st-noop':'';
    return `<div class="run ${stCls}">
      <span class="when">${esc(r.created_at||'')}</span>
      <span class="phase ${phCls}">${esc(r.phase||'?')}</span>
      <span class="msg" title="${esc(r.message||'')}">${esc(r.status||'')} · ${esc(r.message||'')}</span>
    </div>`;
  }).join('');
  const tail=(name)=>{ const lines=tails[name]||[]; if(!lines.length) return '';
    return `<details class="collapse"><summary>${name}.log — last ${lines.length} lines</summary><pre class="logtail">${lines.map(l=>esc(l)).join('\n')}</pre></details>`; };
  const inner=`<div class="card">
    <div class="runlog">${rows||'<span class="na">no runs</span>'}</div>
    ${tail('evening')}${tail('watch')}${tail('improve')}${tail('guard')}
  </div>`;
  pushBlock('runlog','08','Pipeline run log','newest first · colour-coded by phase/status · log tails behind collapse',inner);
})();

/* ============================================================= 9. PROVENANCE */
(function(){
  const sc=D.sources||{};
  const chans=(sc.channels||[]).map(c=>`<div class="chan ${c.live?'':'dark'}">
      <div class="ch-h"><span class="ch-name">${esc(c.label||c.name)}</span>
        <span class="pill ${c.live?'ok':''}">${c.live?'<span class="led"></span>live':'dark'}</span></div>
      <div class="ch-note">${esc(c.coverageNote||'')}</div>
      <div class="tiny mono" style="color:var(--mut2);margin-top:5px">${esc(c.name)}</div>
    </div>`).join('');
  const fw=sc.fusionWeightsSummary||{};
  function wtRows(obj,label){ if(!obj||typeof obj!=='object') return ''; return `<tr><td colspan="2" style="color:var(--cyan);padding-top:8px">${label}</td></tr>`+Object.entries(obj).map(([k,v])=>`<tr><td class="muted">${esc(k)}</td><td class="r mono">${esc(v)}</td></tr>`).join(''); }
  const inner=`<div class="card">
    <p style="font-size:13px;color:var(--ink2);margin:0 0 12px">Five research channels feed the fusion engine. <b>matchRate ${pct(sc.matchRate)}</b> = the fraction of the pool a LIVE source actually covered. Pre-race only the GC odds board and UCI points are live; stage odds / star ratings / feltet are dark until ~24h out.</p>
    <div class="chan-grid">${chans}</div>
    <h3 style="margin-top:6px">Fusion weights summary ${I('Channel base weights × per-stage-type overrides. Loop-tunable by the self-improve routine.')}</h3>
    <div class="tbl-wrap" style="max-width:520px"><table class="fw-table">
      ${wtRows(fw.channelBase,'channel base')}
      ${wtRows(fw.byTypeCurrent,'this stage type ('+(D.stage&&D.stage.type||'?')+')')}
      <tr><td class="muted">gcWeight</td><td class="r mono">${esc(fw.gcWeight)}</td></tr>
      <tr><td class="muted">uciGcWeight</td><td class="r mono">${esc(fw.uciGcWeight)}</td></tr>
      <tr><td class="muted">note</td><td class="r">${esc(fw.note)}</td></tr>
    </table></div>
  </div>`;
  pushBlock('sources','09','Data provenance','channel coverage live/dark · matchRate · fusion weights',inner);
})();

/* ============================================================= 10. STRATEGY + GLOSSARY */
(function(){
  const str=D.strategy||{};
  const tend=(str.tendencies||[]).map(t=>`<li>${esc(t)}</li>`).join('');
  const gloss=(D.glossary||[]).map(g=>`<div class="gterm"><div class="gt">${esc(g.term)}</div><div class="gd">${esc(g.definition)}</div></div>`).join('');
  const inner=`<div class="card" style="margin-bottom:14px">
      <h3>Strategy essence</h3>
      <p style="font-size:13.5px;line-height:1.65;color:var(--ink2)">${esc(str.essence||'')}</p>
      <h3 style="margin-top:14px">EV tendencies (not hard rules)</h3>
      <ul class="tendencies">${tend}</ul>
    </div>
    <div class="card">
      <h3>Glossary — how to read this</h3>
      <div class="gloss">${gloss}</div>
    </div>`;
  pushBlock('glossary','10','Glossary &amp; strategy','EV tendencies · term definitions for the non-expert',inner);
})();

/* ============================================================= FINAL MOUNT */
(function(){
  const root=document.getElementById('root');
  root.innerHTML = blocks.join('');
  // run deferred explorer wiring
  (EV_WIRE||[]).forEach(fn=>{ try{ fn(); }catch(e){ console.warn('ev wire',e); } });
  // stamps
  const stamp = (D.meta&&D.meta.generatedAt)? new Date(D.meta.generatedAt).toLocaleString() : '';
  const ns=document.getElementById('navstamp'); if(ns) ns.textContent=stamp;
  const fs=document.getElementById('footstamp'); if(fs) fs.textContent='· generated '+stamp;
})();

/* ============================================================= THEME TOGGLE */
(function(){
  const btn=document.getElementById('theme-toggle');
  if(!btn) return;
  const root=document.documentElement;
  const glyph=btn.querySelector('.tg-glyph');
  function curTheme(){ return root.getAttribute('data-theme')==='light' ? 'light' : 'dark'; }
  function paint(){
    const light = curTheme()==='light';
    // In light mode show a moon (click → dark); in dark mode show a sun (click → light).
    if(glyph) glyph.textContent = light ? '☾' : '☀';
    const label = light ? 'Switch to dark theme' : 'Switch to light theme';
    btn.setAttribute('aria-label', label);
    btn.setAttribute('title', label);
  }
  btn.addEventListener('click', function(){
    const next = curTheme()==='light' ? 'dark' : 'light';
    if(next==='light') root.setAttribute('data-theme','light');
    else root.removeAttribute('data-theme');
    try{ localStorage.setItem('holdet-dash-theme', next); }catch(e){}
    paint();
  });
  paint();
})();
</script>
