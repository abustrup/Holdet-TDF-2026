  const tile=(href,tok,valHtml,label,subHtml)=>`<a href="${href}" style="text-decoration:none;color:inherit">
      <div class="metric" style="border-left:3px solid var(${tok})">
        <div class="v">${valHtml}</div>
        <div class="l">${label}</div>
        ${subHtml?`<div class="sub">${subHtml}</div>`:''}
      </div></a>`;

  const jobs=status.jobs||[];
  const badJobs=jobs.filter(j=>!j.loaded || (j.lastExit!=null && j.lastExit!==0));
  const okJobs=jobs.length-badJobs.length;

  // TILE 1 — STATE / HEALTH
  let t1v,t1tok;
  if(m.buildOk===false){ t1v='DOWN'; t1tok='--bad'; }
  else if(m.buildOk && m.substrateLive && badJobs.length===0){ t1v='HEALTHY'; t1tok='--ok'; }
  else { t1v='DEGRADED'; t1tok='--warn'; }
  const tile1=tile('#runlog',t1tok,t1v,'state',
    `mode:${esc(m.mode||'?')} · build ${m.buildOk?'OK':'FAIL'} · ${okJobs}/${jobs.length} jobs`);

  // TILE 2 — matchRate / COVERAGE
  const mr=num(status.matchRate)?status.matchRate:null;
  const t2tok = mr==null?'--mut2':(mr>=0.6?'--ok':mr>=0.35?'--warn':'--bad');
  const maw=num(dc.matchRateAtWrite)?dc.matchRateAtWrite:null;
  const liveCh=(sc.channels||[]).filter(c=>c.live).length, chN=(sc.channels||[]).length;
  const degraded = mr!=null && maw!=null && mr<maw;
  const t2sub = (degraded?`<span style="color:var(--warn)">▾ was ${pct(maw,0)} @ plan</span> · `:'')
    +`${liveCh}/${chN} channels live`;
  const tile2=tile('#sources',t2tok,`${mr==null?naSpan:pct(mr,0)}`,'matchRate',t2sub);

  // TILE 3 — STAGE / COUNTDOWN CONTEXT
  const st=D.stage||{};
  const t3v = m.racing?'RACING':('Stage '+(st.number??'?'));
  const cur=num(st.number)?st.number:null;
  const ups=D.upcomingStages||[];
  const nextS = ups.find(u=>cur==null?true:(num(u.number)&&u.number>cur)) || ups[0] || null;
  const t3parts=[cap1(st.type),st.summit_finish?'summit':'',num(st.distance_km)?st.distance_km+' km':''].filter(Boolean);
  const t3sub=(t3parts.join(' · '))+(nextS?` · next: S${nextS.number} ${cap1(nextS.type)}`:'');
  const tile3=tile('#stage','--acc',esc(t3v),'stage',esc(t3sub));

  // TILE 4 — TEAM VALUE
  const budgetPct=(num(tm.totalValue)&&num(tm.budget)&&tm.budget>0)?Math.min(100,tm.totalValue/tm.budget*100):0;
  const tile4=tile('#team','--cyan',krM(tm.totalValue),'team value',
    `${krM(tm.bank)} bank · ${tm.squadSize??'?'}/8<div class="budgetbar" style="margin-top:5px;min-width:0"><i style="width:${budgetPct}%"></i></div>`);

  // TILE 5 — CAPTAIN (divergence-aware, brother-safe)
  const liveCap=tm.captain||null, planCap=dc.captain_name||null;
  const capDiffers = !!(liveCap&&planCap&&!namesMatch(liveCap,planCap));
  const t5tok = capDiffers?'--warn':'--gold';
  const t5sub = capDiffers
      ? `<span style="color:var(--warn)">⚠ plan wants ${esc(planCap)}</span>`
    : (planCap? '<span style="color:var(--ok)">✓ matches plan</span>' : '');
  const tile5=tile('#captain',t5tok,`<span style="color:var(--gold)">${esc(liveCap||'—')}</span>`,'captain',t5sub);

  // TILE 6 — DECISION
  const swN=(dc.swaps||[]).length;
  const t6v = dc.rebuild ? '<span class="pill acc">REBUILD</span>' : (swN+' swaps');
  const t6sub = `src ${esc(dc.source||'?')} · ${relAge(dc.generatedAt||m.generatedAt)}`+(dc.rebuild?` · ${swN} swaps`:'');
  const tile6=tile('#decision','--acc',t6v,'decision',t6sub);

  // TILE 7 — SELF-IMPROVE VERDICT
  const sign=(x)=> num(x)?((x>=0?'+':'')+x):'n/a';
  const t7v = im.merged ? 'MERGED' : 'HELD';
  const t7tok = im.merged ? '--ok' : '--warn';
  const noEdge = num(im.improvedPct)&&num(im.heldOutPct)&&im.improvedPct>0&&im.heldOutPct<=0&&im.merged===false;
  const t7sub = `${sign(im.improvedPct)}% in / ${sign(im.heldOutPct)}% oos`
    +(noEdge?` <span class="tiny" style="color:var(--mut)">no validated edge</span>`:'');
  const tile7=tile('#improve',t7tok,t7v,'self-improve',t7sub);

  // TILE 8 — BRAIN LAST ACTION
  const bj=(D.brainJournal||[])[0]||null;
  const bActRaw=bj&&bj.action||'—';
  const rawTxt=bj&&bj.text?String(bj.text):'';
  // headline: keep ACTED/HELD; else the leading **BOLD** label's first word (e.g. CHANGED), else a friendly fallback
  const bBold=rawTxt.match(/\*\*([^*]+?)\*\*/);
  const bAct=(bActRaw==='ACTED'||bActRaw==='HELD')?bActRaw
    :(bBold?String(bBold[1]).trim().split(/[\s(]+/)[0].toUpperCase()
    :(bActRaw==='other'||bActRaw==='—'?'NOTE':String(bActRaw).toUpperCase()));
  const t8tok = bActRaw==='ACTED'?'--ok':'--mut2';
  // sub: drop the redundant leading ISO timestamp (relative age is shown) and strip markdown noise
  let cleanTxt=rawTxt
    .replace(/^\s*\d{4}-\d{2}-\d{2}T[0-9:.]*Z?\s*[—–-]+\s*/,'')
    .replace(/\*\*/g,'').replace(/`/g,'').replace(/\s+/g,' ').trim();
  // avoid repeating the headline: drop a leading copy of the bold label from the sub
  if(bBold){ const bl=String(bBold[1]).replace(/\s+/g,' ').trim(); if(cleanTxt.indexOf(bl)===0) cleanTxt=cleanTxt.slice(bl.length).replace(/^[\s.:—–-]+/,'').trim(); }
  const t8txt = cleanTxt.length>52 ? esc(cleanTxt.slice(0,52))+'…' : esc(cleanTxt);
  const t8age = bj ? relAge(bj.ts) : '';
  const t8sub = bj ? [t8age,t8txt].filter(Boolean).join(' · ') : '';
  const tile8=tile('#brain',t8tok,esc(bAct),'brain',t8sub);

  const tiles=[tile1,tile2,tile3,tile4,tile5,tile6,tile7,tile8].join('');

  // ---- ALERT RIBBON (shared W) ----
  let ribbon;
  if(!W.length){
    ribbon=`<div class="ov-ribbon"><div class="candor-clear" style="flex:1">✓ No material weakness detected from this snapshot — substrate live, jobs clean, coverage adequate, captaincy matches the highest ceiling. (Auto-derived; a break would show here.)</div></div>`;
  } else {
    const sumPills=['high','med','low'].filter(s=>counts[s]).map(s=>{
      const lbl=s==='high'?'high':s==='med'?'medium':'low';
      return `<span class="pill ${sevPill(s)}">${counts[s]} ${lbl}</span>`;
    }).join('');
    const top3=W.slice(0,3).map(w=>`<span class="pill ${sevPill(w.sev)}">${w.sev}: ${esc(w.title)}</span>`).join('');
    const more=W.length>3?`<a href="#candor" class="pill" style="color:var(--acc)">+${W.length-3} more → full candor</a>`:'';
    ribbon=`<div class="ov-ribbon"><span class="ov-badge">⚑ ${W.length}</span>${sumPills}${top3}${more}</div>`;
  }

  const section=`<section class="block" id="overview" style="scroll-margin-top:58px;margin-top:14px">
    <div class="block-h"><span class="num">00</span><h2>Overview — state, alerts &amp; the whole board at a glance</h2><span class="hint">auto-derived from this snapshot — nothing here is hand-written</span></div>
    <div class="card">
      <div class="ov-mast">
        <div class="ov-left">
          <span class="teamname">${esc(tm.teamName||'—')}</span>
          <span class="ov-verdict" style="color:var(${verdict.tok});background:${verdict.bg};border:1px solid ${verdict.bd}">${verdict.txt}</span>
        </div>
        <div class="ov-right">
          ${countTok}
          <span class="metarow" style="margin:0;display:flex;flex-wrap:wrap;gap:8px">${metarow}</span>
        </div>
      </div>
      <div class="imp-top" style="margin-bottom:0;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">${tiles}</div>
      ${ribbon}
    </div>
  </section>`;
  blocks.unshift(section);
})();

/* ============================================================= 2. TEAM BOARD */
(function(){
  const tm=D.team||{};
  const riders=tm.riders||[];
  // colour per real team
  const teams=[...new Set(riders.map(r=>r.realTeam||'Unknown'))];
  const palette=['#58a6ff','#39d3c8','#a371f7','#e3b341','#f0883e','#db61a2','#3fb950','#79c0ff'];
  const tcol={}; teams.forEach((t,i)=>tcol[t]=palette[i%palette.length]);

  const budgetPct = (num(tm.totalValue)&&num(tm.budget)&&tm.budget>0)? Math.min(100,tm.totalValue/tm.budget*100):0;

  const cards=riders.map(r=>{
    const col=tcol[r.realTeam||'Unknown'];
    const ev=r.ev, fu=r.fused;
    const hasData = ev||fu;
    // no-signal floor: has substrate, but NO research channel reached it (coverage 0) → the numbers
    // shown are the shared prior floor, not a scored read. Flag it so a skimmer doesn't read "scored low".
    const noSignal = !!hasData && (!fu || !num(fu.coverage) || fu.coverage===0);
    const ct=confTier(fu&&fu.confidence);
    const sub = hasData? `<div class="subgrid">
        <b>e_horizon</b><span>${kr(ev&&ev.e_horizon)}</span>
        <b>cap ceil</b><span>${kr(ev&&ev.captain_ceiling)}</span>
        <b>p_stage</b><span>${pct(fu&&fu.p_stage,2)}</span>
        <b>p_top15</b><span>${pct(fu&&fu.p_top15,2)}</span>
        <b>p_gc</b><span>${pct(fu&&fu.p_gc)}</span>
        <b>roi/M</b><span>${num(ev&&ev.roi_per_million)?Math.round(ev.roi_per_million).toLocaleString('en-US'):naSpan}</span>
      </div>
      <div class="srcline">
        <span style="font-size:11px;color:var(--mut)"><span class="conf-dot" style="background:${ct.col}"></span>conf ${ct.c}</span>
        ${(fu&&fu.sources&&fu.sources.length)? fu.sources.map(s=>`<span class="srctag">${esc(s)}</span>`).join('') : '<span class="tiny na">no live source</span>'}
      </div>`
      : `<div class="gap">Not in current snapshot pool — no substrate to attach (real data gap).</div>`;
    const floorNote = noSignal ? `<div class="floornote">⚠ Prior/floor only — no research channel has covered this rider yet; the figures above are the shared no-signal floor, not a scored read.</div>` : '';
    return `<div class="rider ${r.isCaptain?'captain':''} ${hasData?'':'nodata'} ${noSignal?'floor':''}" style="--tc:${col}">
      ${r.isCaptain?'<span class="crown">★ CAPTAIN</span>':''}
      <span class="price">${krM(r.value)}</span>
      <div class="rn">${esc(r.name)}</div>
      <div class="rt">${esc(r.realTeam||'Unknown team')}</div>
      ${sub}
      ${floorNote}
    </div>`;
  }).join('');

  const groups=(tm.realTeamGroups||[]).map(g=>{
    const col=tcol[g.team]||'var(--mut)';
    return `<span class="pill" style="border-color:${col}40"><span class="led" style="background:${col};box-shadow:0 0 6px ${col}"></span>${esc(g.team)} ×${g.count}</span>`;
  }).join('');

  const inner=`
    <div class="card">
      <div class="team-summary">
        <div class="stat"><span class="v">${krM(tm.totalValue)}</span><span class="l">team value</span></div>
        <div class="stat"><span class="v">${krM(tm.bank)}</span><span class="l">bank</span></div>
        <div class="stat"><span class="v">${krM(tm.budget)}</span><span class="l">budget</span></div>
        <div class="stat"><span class="v">${tm.squadSize??riders.length}</span><span class="l">riders</span></div>
        <div class="stat"><span class="v">${tm.maxPerRealTeam??'?'}</span><span class="l">max / squad</span></div>
        <div class="budgetbar" title="${pct(budgetPct/100)} of budget"><i style="width:${budgetPct}%"></i></div>
      </div>
      <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:7px">${groups}</div>
      <div class="squad">${cards}</div>
    </div>`;
  pushBlock('team','02','Current team','captain crowned · coloured by real-world squad · "2-up" structure visible',inner);
})();

/* ============================================================= 2·A. RESULTS — REALIZED VALUE GROWTH
   The entire rest of the dashboard is PREDICTED EV. This is the accountability layer: how the held
   riders have ACTUALLY moved in value since the Grand Départ. In Holdet Tourspillet a rider's fantasy
   contribution IS its value growth (the rules bar demand from moving price), so this is the bot's
   realized standing driver — not a forecast. Growth is price-keyed (build.js growthForValue), never
   name/surname-keyed. Pool-relative because most riders deflate, so "negative" is only bad vs the
   pool median. Renders only once the race is live and a stage has been scored. */
(function(){
  const R=D.results;
  if(!R || !R.available){
    if(D.meta && D.meta.racing){
      pushBlock('results','02·A','Results — how the picks are paying off','realized value growth · awaiting scored data',
        `<div class="card"><span class="na">No realized value-growth data in this snapshot yet (market start/current price not captured). This section fills in once a stage has been scored.</span></div>`);
    }
    return; // pre-race: nothing to hold the bot accountable for yet — stay silent rather than fake it.
  }
  // signed kr with a proper minus glyph; signed M for the headline.
  const sK=(n)=> !num(n)? naSpan : (n>0?'+':(n<0?'−':''))+Math.abs(Math.round(n)).toLocaleString('en-US');
  const sM=(n)=> !num(n)? naSpan : (n>0?'+':(n<0?'−':''))+(Math.abs(n)/1e6).toFixed(Math.abs(n)%1e6?2:0)+'M';
  const cls=(n)=> !num(n)?'flat':(n>0?'pos':(n<0?'neg':'flat'));
  const P=R.pool||{};

  // ---- Per-stage PORTFOLIO trajectory (roster value + cash bank, swap-invariant). Closes the standing
  // top weakness: the rest of Results holds only ONE cumulative number, so it could never show WHERE in
  // the race value was made, nor that the captaincy ROTATED stage-to-stage. Data is pre-computed team
  // totals + the per-stage captain string from the sibling snapshot-stage-N captures — no name/price
  // keying. Renders in both the healthy and degraded branches (it's independent of per-rider attribution).
  const trajBlock=()=>{
    const T=R.trajectory;
    if(!T || !Array.isArray(T.points) || T.points.length<2) return '';
    const pts=T.points;
    const lo=Math.min(...pts.map(p=>p.portfolio)), hi=Math.max(...pts.map(p=>p.portfolio));
    const rng=(hi-lo)||1;
    const W=600, H=88, padX=10, padTop=12, padBot=12;
    const X=i=> padX + (pts.length>1 ? i*(W-2*padX)/(pts.length-1) : 0);
    const Y=v=> padTop + (1-((v-lo)/rng))*(H-padTop-padBot);
    const line=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.portfolio).toFixed(1)}`).join(' ');
    const area=`M${X(0).toFixed(1)},${(H-padBot).toFixed(1)} L`+pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.portfolio).toFixed(1)}`).join(' L')+` L${X(pts.length-1).toFixed(1)},${(H-padBot).toFixed(1)} Z`;
    const dots=pts.map((p,i)=>{
      const cx=X(i), cy=Y(p.portfolio);
      // captain-change: gold ring · duplicate capture: hollow warn dot · else solid accent dot.
      const ring = p.captainChanged ? `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="6.5" fill="none" stroke="var(--gold)" stroke-width="1.6"/>` : '';
      const core = p.dup
        ? `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.6" fill="var(--chip-bg)" stroke="var(--warn)" stroke-width="1.6"/>`
        : `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.6" fill="var(--acc)"/>`;
      return ring+core;
    }).join('');
    // endpoint value labels (kr, in M) so the vertical axis is legible without gridlines.
    const lblStart=`<text x="${X(0).toFixed(1)}" y="${(Y(pts[0].portfolio)-9).toFixed(1)}" fill="var(--mut2)" font-size="9.5" font-family="var(--mono)" text-anchor="start">${(pts[0].portfolio/1e6).toFixed(2)}M</text>`;
    const li=pts.length-1;
    const lblEnd=`<text x="${X(li).toFixed(1)}" y="${(Y(pts[li].portfolio)-9).toFixed(1)}" fill="var(--ink2)" font-size="9.5" font-family="var(--mono)" text-anchor="end">${(pts[li].portfolio/1e6).toFixed(2)}M</text>`;
    const svg=`<svg class="traj-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="per-stage portfolio trajectory">
      <path d="${area}" fill="var(--acc)" opacity="0.10"/>
      <polyline points="${line}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}${lblStart}${lblEnd}
    </svg>`;
    const cells=pts.map(p=>{
      const dc=cls(p.delta);
      const capShort = p.captain ? esc(p.captain) : '—';
      const deltaTxt = p.dup ? '<span class="td flat">·</span>' : `<span class="td ${dc}">${sK(p.delta)}</span>`;
      const capCls = p.captainChanged ? 'tc chg' : 'tc';
      const capLine = p.dup ? `<span class="tdup">no fresh capture</span>` : `<span class="${capCls}" title="captain ${capShort}">${p.captainChanged?'⇄ ':''}${capShort}</span>`;
      return `<div class="traj-cell ${p.dup?'dup':''}"><span class="ts">S${p.stage}</span>${deltaTxt}${capLine}</div>`;
    }).join('');
    const rotNote = T.captainRotated
      ? `The crown <b>rotated</b> this tour — ${T.captainsUsed.map(esc).join(' → ')} (⇄ marks a stage where it changed). The captain doubles only its <i>own</i> positive growth <i>that</i> stage, so who wears it each stage — not just cumulatively — is what actually banks the bonus.`
      : `${esc(T.captainsUsed[0]||'the same rider')} wore the crown every stage.`;
    const dupNote = (T.dupStages&&T.dupStages.length)
      ? ` Stage${T.dupStages.length>1?'s':''} ${T.dupStages.join(', ')} re-froze the prior capture (a degraded collect) — shown hollow/greyed, <b>not</b> a real zero-growth stage.`
      : '';
    return `<div class="traj">
      <div class="traj-h">Per-stage trajectory — portfolio ${sM(T.portfolioGrowth)} across S${T.firstStage}–S${T.lastStage}</div>
      <div class="traj-sub">portfolio = roster value + cash bank · ${(T.portfolioStart/1e6).toFixed(2)}M → ${(T.portfolioNow/1e6).toFixed(2)}M</div>
      ${svg}
      <div class="traj-cells">${cells}</div>
      <div class="res-note"><b>Portfolio is swap-invariant</b> — a transfer just moves value between the roster and the bank (minus a small fee), so each step is value the team actually <b>gained or lost that stage</b>, unlike the roster-value alone which lurches on every swap. This is a different lens from the cumulative headline above: it shows the <i>shape</i> of the run and answers where the value came from. ${rotNote}${dupNote}</div>
    </div>`;
  };

  // ---- Honest degraded state: the value↔price identity link is broken this build, so growth CANNOT be
  // pinned to our named riders (attribution.resolved===false). Report the FIELD outcome — which IS
  // reliable (computed per market row, no name join) — and surface the identity gap as a weakness,
  // rather than fabricating a per-rider ledger that would misattribute another rider's result.
  if(R.attribution && R.attribution.resolved===false){
    const stageTxt = num(R.stagesDone)? `through Stage ${R.stagesDone}` : 'so far';
    const linkPct = R.attribution.poolCount ? Math.round((R.attribution.linkedCount/R.attribution.poolCount)*100) : Math.round((R.attribution.linkRatio||0)*100);
    const inner=`<div class="card">
      <div class="res-hero"><span class="res-big pos">${sK(P.max)} kr</span><span class="lbl">the field's single biggest riser · ${stageTxt}</span></div>
      <div class="res-sub">field median ${sK(P.median)} · ${num(P.winners)?P.winners:'—'} of ${num(P.n)?P.n:'—'} priced riders gained value, ${num(P.losers)?P.losers:'—'} lost${R.asOf?` · as of ${esc(R.asOf)}`:''}</div>
      <div class="res-note warn"><b>Per-rider attribution unavailable this build — showing the field outcome only.</b> ${esc(R.attribution.reason||'')}</div>
      <div class="res-summary">
        <span class="pill">field: ${num(P.winners)?P.winners:'—'} up · ${num(P.losers)?P.losers:'—'} down of ${num(P.n)?P.n:'—'}</span>
        <span class="pill ok">top riser ${sK(P.max)}</span>
        <span class="pill">median ${sK(P.median)}</span>
        <span class="pill">worst faller ${sK(P.min)}</span>
        <span class="pill warn">roster↔market link ${linkPct}%</span>
      </div>
      ${trajBlock()}
      <div class="res-note">In Holdet your score <b>is</b> value growth, so this section normally shows how each owned rider actually moved. This snapshot dropped its rider-identity map (<code>persons=[]</code>) and the roster's values are decoupled from the live market prices, so the only honest report is the <b>field</b> distribution above — <b>not</b> a fabricated per-rider ledger that would attribute a stranger's result to our riders via a coincidental price collision. The field itself moved a lot (top riser <b>${sK(P.max)}</b> vs median <b>${sK(P.median)}</b>), so &ldquo;did our picks catch a riser?&rdquo; is a real, unanswerable-right-now question — it self-heals on the next clean collect.</div>
    </div>`;
    pushBlock('results','02·A','Results — how the picks are actually paying off',
      'realized value growth · field outcome (per-rider attribution unavailable this build)',inner);
    return;
  }

  const riders=(R.riders||[]);
  const scored=riders.filter(r=>num(r.growth));
  const maxAbs=Math.max(1, ...scored.map(r=>Math.abs(r.growth)));
  const sorted=[...riders].sort((a,b)=>(num(b.growth)?b.growth:-Infinity)-(num(a.growth)?a.growth:-Infinity));

  const rows=sorted.map(r=>{
    const g=r.growth, c=cls(g);
    const name=`<span class="rn"><b>${r.isCaptain?'<span class="capstar">★ </span>':''}${esc(r.name)}</b><small>${esc(r.realTeam||'—')} · ${krM(r.value)}</small></span>`;
    if(!num(g)){
      return `<div class="resrow flat ${r.isCaptain?'cap':''}">${name}<div class="restrack"><span class="zero"></span></div><span class="rg flat">${naSpan}</span></div>`;
    }
    const w=Math.max(2,Math.round(Math.abs(g)/maxAbs*49)); // ≤49% each side of the centre zero line
    const side = g>=0 ? `left:50%;width:${w}%` : `right:50%;width:${w}%`;
    const pctTxt = num(r.poolPct)? `${Math.round(r.poolPct*100)}th pct of pool` : '';
    return `<div class="resrow ${c} ${r.isCaptain?'cap':''}">
      ${name}
      <div class="restrack"><span class="zero"></span><i class="${c}" style="${side}"></i></div>
      <span class="rg ${c}">${sK(g)}<small>${pctTxt}</small></span>
    </div>`;
  }).join('');

  const teamC=cls(R.teamGrowth);
  const stageTxt = num(R.stagesDone)? `through Stage ${R.stagesDone}` : 'so far';
  const pills=[];
  if(num(R.aboveMedian)) pills.push(`<span class="pill ${R.aboveMedian>=Math.ceil((R.ownedScored||8)/2)?'ok':'warn'}">${R.aboveMedian}/${R.ownedScored} beat the pool median</span>`);
  if(num(P.winners)&&num(P.losers)) pills.push(`<span class="pill">pool: ${P.winners} up · ${P.losers} down of ${P.n}</span>`);
  if(R.bestOwned) pills.push(`<span class="pill ok">top riser ${esc(R.bestOwned.name.split(' ').slice(-1)[0])} ${sK(R.bestOwned.growth)}</span>`);

  const intro=`In Holdet, your score <b>is</b> value growth — the rules bar demand from moving a rider's price, so this is the bot's <b>realized</b> standing driver, not a forecast like everything below. `
    +`Read it pool-relative: most riders <b>lose</b> value over a Tour (pool median <b>${sK(P.median)}</b> · ${P.losers} of ${P.n} riders are down), so a small loss can still beat the field. Bars diverge from a centre zero line and share one scale, so ${esc((R.bestOwned&&R.bestOwned.name.split(' ').slice(-1)[0])||'the top riser')}'s surge dwarfs the rest — because it did.`;

  // Captain accountability. The banked captain-bonus LEDGER (results.captainLedger) reconstructs, stage
  // by stage, how much bonus the doubling actually banked — closing the standing "can't reconstruct it"
  // caveat. When it's available we render the ledger; else we fall back to the honest cumulative note.
  const capName=R.captainName, capG=R.captainGrowth, best=R.bestOwned;
  const ledgerBlock=()=>{
    const L=R.captainLedger;
    if(!L || !Array.isArray(L.rows) || !L.rows.length) return '';
    const sLabel=st=>st.length>1?`S${st[0]}–${st[st.length-1]}`:`S${st[0]}`;
    const rowsHtml=L.rows.map(r=>{
      const bc=r.bonus>0?'pos':'flat';
      const capChip=`<span class="cl-cap${r.captain&&L.rotated?' rot':''}">${r.captain?esc(r.captain):'—'}</span>`;
      let verdict;
      if(!r.capResolved){
        verdict=`<span class="cl-v mut">captain not in this capture — bonus unmeasured</span>`;
      } else if(r.crownWasBest){
        verdict=`<span class="cl-v ok">✓ the squad's biggest riser that stage — doubling on the right rider</span>`;
      } else {
        const bo=r.bestOwned;
        const inner = bo?`${esc(bo.name)} grew more (${sK(bo.delta)}) — the bonus would have been larger on the crown`:'a bigger riser was owned this stage';
        verdict=`<span class="cl-v warn">✗ ${inner}</span>`;
      }
      const mergeTag=r.merged?`<span class="cl-merge" title="a duplicate capture folded ${'>'} 1 stage in here">merged${r.captainAmbiguous?' · mixed crown':''}</span>`:'';
      return `<div class="cl-row ${bc}">
        <span class="cl-st">${sLabel(r.stages)}${mergeTag}</span>
        ${capChip}
        <span class="cl-b ${bc}">${r.bonus>0?'+':''}${sK(r.bonus)}</span>
        ${verdict}
      </div>`;
    }).join('');
    // Verdict headline — is the rotation actually capturing the bonus?
    const spanTxt=`S${L.rows[0].stages[0]}–S${L.rows[L.rows.length-1].stages.slice(-1)[0]}`;
    let head;
    if(L.optimal && L.measured>0){
      head=`<b>Perfect so far.</b> The crown sat on the squad's <b>biggest riser</b> in <b>all ${L.measured}</b> measurable stages — <b>0 kr left on the table</b> vs perfect hindsight.`;
    } else if(L.measured>0){
      head=`The crown caught the squad's biggest riser in <b>${L.hits} of ${L.measured}</b> measurable stages — <b>${sK(L.leftOnTable)}</b> left on the table vs perfect hindsight (the best owned rider each stage).`;
    } else {
      head=`No stage has a clean pair of captures yet, so the banked bonus can't be measured.`;
    }
    const liftTxt = (L.rotated && num(L.lift))
      ? (L.lift>0
          ? ` Rotating the crown banked <b>${sK(L.lift)} more</b> than never moving it off ${esc(L.anchorName||'the anchor')}.`
          : (L.lift<0 ? ` That's <b>${sK(-L.lift)} less</b> than simply keeping the crown on ${esc(L.anchorName||'the anchor')} all tour — the rotation cost bonus.` : ''))
      : '';
    const dupTag = L.rows.some(r=>r.merged)
      ? ` <b>Honesty:</b> a degraded collect duplicated one capture, so the merged stages above (${L.rows.filter(r=>r.merged).map(r=>`S${r.stages.join('+')}`).join(', ')}) share one entry and can't be split — the total is still exact because the same rider wore the crown across them.`
      : '';
    return `<div class="cledge">
      <div class="cl-h">Captain bonus banked — <span class="cl-tot">+${sK(L.banked)}</span> across ${spanTxt}</div>
      <div class="cl-sub">the game rule doubles the crown's <i>positive</i> value growth each stage; this is that extra copy, reconstructed per stage from the sibling captures</div>
      <div class="cl-rows">${rowsHtml}</div>
      <div class="res-note cap">${head}${liftTxt}${dupTag} <span class="cl-method">Riders keyed first-initial + surname (brother-safe), never surname alone.</span></div>
    </div>`;
  };
  let capNote=ledgerBlock();
  if(!capNote && capName && best){
    const capIsBest = num(capG) && num(best.growth) && Math.abs(capG-best.growth)<1;
    if(capIsBest){
      capNote=`<div class="res-note cap"><b>Captain doubles its positive growth each stage.</b> The crown sits on <b>${esc(capName)}</b> (${sK(capG)}) — also the squad's biggest realized riser, so the doubling is landing on the right rider.</div>`;
    } else {
      capNote=`<div class="res-note cap"><b>Captain doubles its positive growth each stage</b> (game rule). The current crown is <b>${esc(capName)}</b> at ${sK(capG)} — a ${num(R.riders.find(x=>x.isCaptain)?.poolPct)?Math.round(R.riders.find(x=>x.isCaptain).poolPct*100)+'th-pct':'modest'} mover — while the squad's realized value is dominated by <b>${esc(best.name)}</b> (${sK(best.growth)}, the pool's single biggest riser). `
        +`Honest caveat: the captaincy is chosen <i>per stage</i> and this page only holds <i>cumulative</i> growth, so it can't reconstruct how much captain-bonus was actually banked stage-by-stage — but if the current pattern holds, the double is landing on a minor mover rather than the rider producing the value.</div>`;
    }
  }

  // Laggards — genuinely below-field slots (bottom ~third of the pool), stated pool-relative.
  const lag=scored.filter(r=>num(r.poolPct)&&r.poolPct<0.35).sort((a,b)=>a.growth-b.growth);
  const lagNote = lag.length
    ? `<div class="res-note warn"><b>Weakest slots vs the field:</b> ${lag.map(r=>`${esc(r.name)} (${sK(r.growth)}, ${Math.round(r.poolPct*100)}th pct)`).join(' · ')} — below the pool's bottom third, i.e. losing value <i>faster than most</i>, not merely down. These are the picks results are questioning.</div>`
    : `<div class="res-note"><b>No owned rider sits in the pool's bottom third</b> — every slot is holding value at least as well as the median rider.</div>`;

  const inner=`<div class="card">
    <div class="res-hero"><span class="res-big ${teamC}">${sM(R.teamGrowth)} kr</span><span class="lbl">team value growth · ${stageTxt}</span></div>
    <div class="res-sub">squad value ${krM(R.teamStartValue)} → ${krM(R.teamValueNow)}${R.asOf?` · as of ${esc(R.asOf)}`:''}</div>
    <div class="res-note">${intro}</div>
    <div class="res-summary">${pills.join('')}</div>
    <div class="reswrap">${rows}</div>
    ${trajBlock()}
    ${capNote}
    ${lagNote}
  </div>`;
  pushBlock('results','02·A','Results — how the picks are actually paying off',
    'realized value growth since the Grand Départ · pool-relative · the accountability layer',inner);
})();

/* ============================================================= 2·A·2. MODEL CHECK — DID THE SUBSTRATE PREDICT?
   Results (§02·A) shows WHAT the picks realized. This asks the deeper, previously-unanswered accountability
   question: did the bot's prediction ENGINE actually work? Every pick on this page rests on `e_horizon` — a
   fused, EV-weighted per-rider score — yet nothing has ever tested that score against ground truth. It can be
   tested now, brother-SAFE, with ZERO name matching: every scored evBoard row already carries BOTH its predicted
   e_horizon AND its realized value growth (price-keyed via growthForValue → invariant across price collisions,
   never surname-keyed) on the SAME row, so we simply measure whether the substrate's RANKING of riders lines up
   with who actually gained value — a Spearman rank correlation + a predicted-EV-quintile → realized-growth ladder.
   Covered riders only (coverage>0): the ~55 coverage-0 floor riders all share one prior e_horizon, so a prior
   can't be validated. Renders only when racing + ≥30 scored rows carry growth; else silent (never fake a check). */
(function(){
  const m=D.meta||{};
  if(!m.racing) return; // pre-race: nothing realized to validate against.
  const rowsAll=(D.evBoard||[]).filter(r=>num(r.e_horizon)&&num(r.growth));
  const rows=rowsAll.filter(r=>r.coverage>0);
  if(rows.length<30){
    pushBlock('validation','02·A·2','Model check — did the substrate predict?','predicted EV vs realized growth · awaiting scored data',
      `<div class="card"><span class="na">Not enough scored riders carry realized growth yet (${rows.length} with a live channel) — this validation fills in once the race has scored stages and the value↔price link is intact.</span></div>`);
    return;
  }
  const sK=(n)=> !num(n)? naSpan : (n>0?'+':(n<0?'−':''))+Math.abs(Math.round(n)).toLocaleString('en-US');
  const clsG=(n)=> !num(n)?'flat':(n>0?'pos':(n<0?'neg':'flat'));
  // Spearman rank correlation (ties averaged) of predicted e_horizon vs realized growth over the covered set.
  const spearman=(list,fa,fb)=>{
    const n=list.length;
    const rank=(vals)=>{const idx=vals.map((v,i)=>[v,i]).sort((x,y)=>x[0]-y[0]);const r=new Array(n);let i=0;
      while(i<n){let j=i;while(j+1<n&&idx[j+1][0]===idx[i][0])j++;const a=(i+j)/2+1;for(let k=i;k<=j;k++)r[idx[k][1]]=a;i=j+1;}return r;};
    const ra=rank(list.map(fa)),rb=rank(list.map(fb));
    const ma=ra.reduce((s,x)=>s+x,0)/n,mb=rb.reduce((s,x)=>s+x,0)/n;
    let nu=0,da=0,db=0; for(let i=0;i<n;i++){nu+=(ra[i]-ma)*(rb[i]-mb);da+=(ra[i]-ma)**2;db+=(rb[i]-mb)**2;}
    return (da&&db)? nu/Math.sqrt(da*db) : 0;
  };
  const rho=spearman(rows,r=>r.e_horizon,r=>r.growth);
  // Predicted-EV quintiles (ascending), each → mean realized growth + positive share + which owned riders land there.
  const asc=[...rows].sort((a,b)=>a.e_horizon-b.e_horizon);
  const Q=5, per=Math.floor(asc.length/Q), buckets=[];
  for(let i=0;i<Q;i++) buckets.push(asc.slice(i*per, i===Q-1?asc.length:(i+1)*per));
  const stat=buckets.map((seg,i)=>({
    q:i+1, n:seg.length,
    mean: seg.reduce((s,r)=>s+r.growth,0)/seg.length,
    pos: seg.filter(r=>r.growth>0).length,
    ehLo: seg[0].e_horizon, ehHi: seg[seg.length-1].e_horizon,
    owned: seg.filter(r=>r.owned).map(r=>({name:r.name,cap:!!r.isCaptain})),
  }));
  const maxAbs=Math.max(1,...stat.map(s=>Math.abs(s.mean)));
  const topQ=stat[Q-1], botQ=stat[0];
  const monotone=stat.every((s,i)=>i===0||s.mean>=stat[i-1].mean-1); // means rise with predicted EV
  // Verdict on ρ.
  const verdict = rho>=0.5 ? {c:'pos',w:'Strong',col:'var(--ok)'} : rho>=0.3 ? {c:'flat',w:'Moderate',col:'var(--warn)'} : {c:'neg',w:'Weak',col:'var(--bad)'};

  // ---- VALIDATION BLIND SPOT (the scope this ρ silently omits) --------------------------------------
  // ρ can only be measured where the substrate produces VARIED predictions — i.e. the covered minority.
  // The engine floors most of the pool to ONE identical prior e_horizon (no research channel reached
  // them), so it emits NO ranking for them: a strong ρ certifies the model where it HAS an opinion, and
  // says nothing about the floored majority — which is exactly the cheap breadth/filler pool where value
  // is actually lost, and where the brain has to price off realized growth instead of EV. Surfacing this
  // is the honesty mandate: "strong · not a broken model" is a real result, but it is scoped, and reading
  // it as "the model works" is the over-read the decision log itself warns against. Data-derived, no
  // name/surname keying: floor = the modal e_horizon across the pool (the shared no-signal prior).
  const _vboard=(D.evBoard||[]);
  const poolN=_vboard.length;
  const coveredN=_vboard.filter(r=>num(r.coverage)&&r.coverage>0).length;
  const _ehFreq=new Map();
  _vboard.forEach(r=>{ if(num(r.e_horizon)) _ehFreq.set(r.e_horizon,(_ehFreq.get(r.e_horizon)||0)+1); });
  let floorVal=null, floorN=0;
  for(const [v,c] of _ehFreq){ if(c>floorN){ floorN=c; floorVal=v; } }
  const coveredPct = poolN? coveredN/poolN : 0;
  const floorPct   = poolN? floorN/poolN   : 0;

  // Quintile ladder — Q5 (highest predicted EV) at top, diverging from a centre zero, one shared scale.
  const barRows=[...stat].reverse().map(s=>{
    const c=clsG(s.mean);
    const w=Math.max(2,Math.round(Math.abs(s.mean)/maxAbs*49));
    const side=s.mean>=0?`left:50%;width:${w}%`:`right:50%;width:${w}%`;
    const ownedChips=s.owned.length? s.owned.map(o=>`${o.cap?'<span class="capstar">★</span>':''}${esc(o.name.split(' ').slice(-1)[0])}`).join(', ') : '—';
    const tier = s.q===5?' · highest EV' : s.q===1?' · lowest EV' : '';
    const label=`<span class="rn"><b>Q${s.q}${tier}</b><small>predicted ${Math.round(s.ehLo).toLocaleString('en-US')}–${Math.round(s.ehHi).toLocaleString('en-US')} · ${s.pos}/${s.n} rose · owned: ${ownedChips}</small></span>`;
    return `<div class="resrow ${c}">${label}<div class="restrack"><span class="zero"></span><i class="${c}" style="${side}"></i></div><span class="rg ${c}">${sK(Math.round(s.mean))}<small>mean growth</small></span></div>`;
  }).join('');

  const pills=[
    `<span class="pill ${verdict.c==='pos'?'ok':verdict.c==='neg'?'bad':'warn'}">ρ = ${rho.toFixed(2)} · ${verdict.w}</span>`,
    `<span class="pill">n = ${rows.length} scored riders (coverage&gt;0)</span>`,
    monotone? `<span class="pill ok">quintiles monotone — growth rises with predicted EV</span>` : `<span class="pill warn">quintiles not fully monotone</span>`,
    (poolN&&floorN)? `<span class="pill bad" title="The engine scores only the covered minority; the rest share one floored prior e_horizon and get no ranking.">blind to ${pct(floorPct,0)} of pool — one floored score</span>` : '',
  ].filter(Boolean).join('');

  const spreadTxt = `Bottom predicted quintile: <b>${botQ.pos}/${botQ.n}</b> (${Math.round(botQ.pos/botQ.n*100)}%) actually rose, mean <b>${sK(Math.round(botQ.mean))}</b>. `
    +`Top predicted quintile: <b>${topQ.pos}/${topQ.n}</b> (${Math.round(topQ.pos/topQ.n*100)}%) rose, mean <b>${sK(Math.round(topQ.mean))}</b>. `
    +`The score sorts value-gainers from value-losers ${(topQ.pos/topQ.n - botQ.pos/botQ.n)>=0.5?'sharply':'meaningfully'}.`;

  // Owned riders the model rated highest / lowest — a self-audit fact (predictions, cross-check against Results).
  const ownedTop=topQ.owned.map(o=>esc(o.name.split(' ').slice(-1)[0]));
  const ownedBot=[...botQ.owned,...stat[1].owned].map(o=>esc(o.name.split(' ').slice(-1)[0]));
  const selfNote=(ownedTop.length&&ownedBot.length)
    ? `<div class="res-note"><b>The model's own verdict on the roster.</b> Of the picks it could score, it rated <b>${ownedTop.join(', ')}</b> in the top EV quintile and <b>${ownedBot.join(', ')}</b> in the bottom two — cross-check that ordering against the realized bars in §02·A above (the laggards it flagged are the laggards that happened).</div>`
    : '';

  const caveats=`<div class="res-note warn"><b>Read this honestly.</b> `
    +`(1) <b>Horizon mismatch</b> — <code>e_horizon</code> is a <i>forward</i> estimate for the upcoming stages, while growth is realized <i>to date</i>; a strong ρ therefore says the fused signals identify <i>genuinely strong riders</i> (form/quality persists across the Tour), NOT that the engine timed each stage. `
    +`(2) <b>Covered only</b> — computed over the ${rows.length} riders with ≥1 live research channel; the coverage-0 floor riders all share one prior score, so there is nothing to validate there (and including them would flatter ρ). `
    +`(3) <b>Ranking, not certainty</b> — even the top quintile has ${topQ.n-topQ.pos} rider(s) that fell; the substrate ranks probability, it never guarantees a single rider.</div>`;

  // The blind spot this ρ omits — prominent, because it's the single biggest caveat on the whole engine.
  const blindNote = (poolN&&floorN)
    ? `<div class="res-note warn"><b>The blind spot — what this ρ does <i>not</i> cover.</b> ρ can only be measured where the engine produces <i>varied</i> predictions: the <b>${coveredN} of ${poolN}</b> riders (<b>${pct(coveredPct,0)}</b>) a live channel actually reached. The other <b>${floorN}</b> (<b>${pct(floorPct,0)}</b>) share <i>one identical</i> floored prior (<code>e_horizon ${num(floorVal)?Math.round(floorVal).toLocaleString('en-US'):'—'}</code>), so the substrate emits <b>no ranking for them at all</b>. A strong ρ therefore certifies the model <b>where it has an opinion</b> — the covered minority, i.e. the marquee riders — and says <b>nothing</b> about the floored majority, which is exactly the cheap <b>breadth / filler</b> pool where the field bleeds value. That is why the decision log prices those slots off <b>realized kr growth</b>, not <code>e_horizon</code>: when it leans on the substrate there instead, it can pick value-negative fillers (the engine can't tell them apart). This ρ is real, but it is <b>scoped</b> — do not read it as "the whole engine works".</div>`
    : '';

  const reconcile=`<div class="res-note cap"><b>Reconciles with §02·R (Standing).</b> The prediction engine works per-rider <b>where it has coverage</b> (ρ = ${rho.toFixed(2)}, ${monotone?'monotone':'near-monotone'} quintiles) — but it is <b>blind to the floored ${pct(floorPct,0)}</b> above, and the bot is <b>sliding on rank</b>. So the deficit is <b>portfolio construction</b> — being sprinter-light where the winners spread cheap breadth, in a pool the substrate mostly can't rank — <i>not</i> a model that's wrong where it speaks. A good map read on a route it can only partly see.</div>`;

  const inner=`<div class="card">
    <div class="res-hero"><span class="res-big ${verdict.c}" style="color:${verdict.col}">ρ ${rho.toFixed(2)}</span><span class="lbl">predicted EV ↔ realized growth · rank correlation</span></div>
    <div class="res-sub">${verdict.w.toLowerCase()} agreement — the substrate's rider ranking ${rho>=0.5?'genuinely tracks':rho>=0.3?'partly tracks':'barely tracks'} who actually gained value</div>
    <div class="res-note">Every pick above trusts <code>e_horizon</code>. This tests it against ground truth: does a higher predicted score actually correspond to higher realized value growth? Below, the ${rows.length} scored riders are split into five equal buckets by <b>predicted</b> EV; each bar is that bucket's <b>mean realized</b> growth. A working model makes the ladder climb left-to-right.</div>
    <div class="res-summary">${pills}</div>
    <div class="reswrap">${barRows}</div>
    <div class="res-note">${spreadTxt}</div>
    ${selfNote}
    ${blindNote}
    ${caveats}
    ${reconcile}
  </div>`;
  pushBlock('validation','02·A·2','Model check — did the substrate actually predict?',
    'predicted e_horizon vs realized growth · Spearman ρ + EV-quintile ladder · the engine\'s accountability',inner);
})();

/* ============================================================= 2·R. STANDING — RANK vs THE FIELD
   Everything else on this page grades the bot against ITSELF (predicted EV) or against the field's
   value-GROWTH distribution (Results §02·A). But Holdet is won on RANK, and growth is NOT rank —
   every team's riders gain value, so the green Results panel above can quietly coexist with SLIDING
   down the leaderboard. That divergence is the dashboard's single biggest blind spot, and this
   section closes it. It reads D.standing (built read-only from data/meta/report-latest.json — the
   highscore/meta routine's per-round analysis) and shows the honest competitive reality: the rank
   arc, the mini-league seat, and the WHY (which crowd-favourite GC stars the WINNERS fade while this
   bot anchors on them). Ownership/weOwn came personId-keyed from the report; the only local name
   work is the blessed brother-safe namesMatch (first-initial + surname-suffix, NEVER surname alone),
   used only to green-tint riders we hold. Renders only when racing + a report exists, else silent. */
(function(){
  const S=D.standing;
  if(!S || !S.available){
    if(D.meta && D.meta.racing)
      pushBlock('standing','02·R','Standing — how the bot ranks against the field','competitive rank · awaiting meta-learning report',
        `<div class="card"><span class="na">No meta-learning report on disk yet (data/meta/report-latest.json) — this fills in once the highscore/meta routine has scored a round.</span></div>`);
    return; // no report / pre-race: don't fabricate a standing.
  }
  const P=S.posture||{};
  const owned=(D.team&&D.team.riders)||[];
  const weHold=(name)=> owned.some(r=>namesMatch(r.name,name)); // brother-safe (module namesMatch)
  const sEdge=(e)=> num(e)? (e>0?'+':'−')+Math.abs(e).toFixed(2) : '—';

  // Headline colour: a worsening rank reads red, improving green — never dress up a decline.
  const trend=(P.trend||'').toLowerCase();
  const trendCls= trend==='worsening'?'neg': trend==='improving'?'pos':'flat';
  const seatLast= num(P.miniRank)&&num(P.miniSize)&&P.miniRank>=P.miniSize;
  const seatCls= seatLast?'bad': (num(P.miniRank)&&num(P.miniSize)&&P.miniRank<=Math.ceil(P.miniSize/2))?'ok':'warn';

  const pills=[];
  if(num(P.miniRank)&&num(P.miniSize)) pills.push(`<span class="pill ${seatCls}">mini-league ${P.miniRank} of ${P.miniSize}${seatLast?' · last':''}</span>`);
  if(P.trend) pills.push(`<span class="pill ${trendCls==='neg'?'bad':trendCls==='pos'?'ok':'warn'}">trend: ${esc(P.trend)}</span>`);
  if(P.stance) pills.push(`<span class="pill acc">stance: ${esc(P.stance)}</span>`);
  if(S.leader&&S.leader.teamName) pills.push(`<span class="pill">leader: ${esc(S.leader.teamName)}${S.leader.captain?` · ©${esc(S.leader.captain)}`:''}</span>`);

  // Diverging edge rows, scaled to the largest |edge| across BOTH lists so the two panels share a frame.
  const allE=[...(S.winnersFade||[]),...(S.winnersLoad||[])].map(x=>Math.abs(x.edge)).filter(num);
  const emax=allE.length?Math.max(...allE):1;
  const edgeRow=(x,kind)=>{
    const own=weHold(x.name), w=Math.max(4,Math.round(Math.abs(x.edge)/emax*100));
    return `<div class="edge-row${own?' own':''}"><span class="en${own?' own':''}" title="${esc(x.name)}">${own?'● ':''}${esc(x.name)}</span>`
      +`<span class="edge-track ${kind}"><i style="width:${w}%"></i></span><span class="ev">${sEdge(x.edge)}</span></div>`;
  };
  const fadeRows=(S.winnersFade||[]).slice(0,6).map(x=>edgeRow(x,'fade')).join('');
  const loadRows=(S.winnersLoad||[]).slice(0,6).map(x=>edgeRow(x,'load')).join('');

  const miss=(S.missingCore||[]).map(m=>esc(m.name)).filter(Boolean).join(', ');
  const capName=S.consensusCaptain?S.consensusCaptain.name:null;
  const capOwn=!!(S.consensusCaptain&&S.consensusCaptain.weOwn);
  const ourCap=(owned.find(r=>r.isCaptain)||{}).name||null;
  const coreSrc=S.consensusFresh&&num(S.consensusRound)?` (round&#8201;${S.consensusRound} field capture)`:'';
  const ch=S.churn||{};
  const cbg=ch.captainBonusGap||{};

  const realityNote=`In Holdet your <b>score is value growth</b>, but the <b>competition is rank</b> — and the two diverge: every team's riders gain value, so the green Results panel above can coexist with <b>losing ground on the leaderboard</b>. That is exactly what is happening here — the rank arc is <b>${esc(P.arc||'—')}</b>${seatLast?', and the bot now sits <b>last in its mini-league</b>':''}.`;

  const whyNote= (fadeRows&&loadRows)
    ? `<b>Why we're slipping — a strategy mismatch, not bad luck.</b> The top-25 teams over-index cheap first-week <b>sprinters</b> (right panel) and <b>fade the GC stars this bot anchors on</b> (left): Pogačar &amp; Vingegaard carry the field's most <b>negative</b> winner-edge, yet the consensus crown sits on <b>${esc(capName||'a sprinter')}</b>${capName?(capOwn?` — which the bot also owns and captains`:(ourCap?` while the bot captains <b>${esc(ourCap)}</b>`:``)):``}. We hold <b>${S.ownedCore} of ${S.templateN}</b> of the crowd's core${coreSrc}${miss?`; missing: <b>${miss}</b>`:''}. <span style="color:var(--ok)">●</span> marks a rider we own — note the bot holds several riders the winners are actively fading.`
    : '';

  const nuanceNote= (num(cbg.ours)&&num(cbg.topAvg))
    ? `<b>Not everything is worse — the gap is roster composition, not execution.</b> The bot's captaincy is actually <b>ahead</b> of the top-team average on banked bonus (${krM(cbg.ours)} vs ${krM(cbg.topAvg)}), and it churns <b>less</b> (${num(ch.ourSubsPerRound)?ch.ourSubsPerRound.toFixed(1):'—'} vs ${num(ch.topAvgSubsPerRound)?ch.topAvgSubsPerRound.toFixed(1):'—'} subs/round, ${krM(ch.ourFeesKr)} vs ${krM(ch.topAvgFeesKr)} in fees). The deficit is being <b>sprinter-light in a sprint-heavy first week</b> — which is precisely what the posture below now leans against.`
    : '';

  const lag= num(S.roundsBehind)&&S.roundsBehind>0
    ? `<div class="res-sub">Meta report as of round ${esc(String(S.round))} (${esc(S.asOf||'—')}) — <b>${S.roundsBehind} round behind</b> live Stage ${esc(String(S.liveStage))}; the highscore/meta routine refreshes once per round.</div>`
    : `<div class="res-sub">Meta report as of round ${esc(String(S.round))} (${esc(S.asOf||'—')}).</div>`;

  const inner=`<div class="card">
    <div class="res-hero"><span class="res-big ${trendCls}">#${num(P.globalRank)?P.globalRank.toLocaleString('en-US'):'—'}</span><span class="lbl">global rank${num(P.globalPctile)?` · top ${pct(P.globalPctile)}`:''}</span></div>
    ${lag}
    <div class="res-summary">${pills.join('')}</div>
    <div class="res-note warn">${realityNote}</div>
    ${whyNote?`<div class="stand-grid">
      <div class="stand-panel"><h4>Winners fade these <span class="sub">— crowd owns, top teams don't</span></h4>${fadeRows}</div>
      <div class="stand-panel"><h4>Winners load these <span class="sub">— top-team differentiators</span></h4>${loadRows}</div>
    </div>
    <div class="res-note">${whyNote}</div>`:''}
    ${nuanceNote?`<div class="res-note cap">${nuanceNote}</div>`:''}
    ${P.rationale?`<div class="res-note"><b>Posture in force:</b> ${esc(P.rationale)}</div>`:''}
  </div>`;
  pushBlock('standing','02·R','Standing — how the bot ranks against the field',
    'competitive rank vs the field · the honest reality check the growth numbers can hide',inner);
})();

/* ============================================================= 2·B. ROSTER RATIONALE — WHY EACH SLOT */
(function(){
  // The team board shows each owned rider's raw numbers, but a raw e_horizon (982) means nothing on its
  // own — you cannot tell an anchor from a cheap breadth pick from a slot the numbers don't justify.
  // This section ranks every owned rider against the SCORED pool and classifies its slot, turning the
  // abstract strategy ("maximise Σ e_horizon; fill breadth with roi/M; discount low-confidence") into a
  // concrete, auditable per-slot verdict — and surfaces weak slots honestly instead of hiding them.
  const tm=D.team||{}, riders=tm.riders||[];
  const board=D.evBoard||[];
  const live=D.meta&&D.meta.substrateLive;
  if(!riders.length) return;

  // Scored pool = riders a live channel actually reached (coverage>0) with a real e_horizon.
  const scored=board.filter(r=>num(r.coverage)&&r.coverage>0&&num(r.e_horizon));
  if(!live || scored.length<4){
    pushBlock('roster','02·B','Roster rationale — why each slot','pool-relative standing of every owned rider',
      `<div class="card"><span class="na">Live per-rider substrate is unavailable this build (or too few scored riders), so owned riders cannot be ranked against the pool. See the EV explorer for the raw numbers.</span></div>`);
    return;
  }
  const N=scored.length;
  const byEh=[...scored].sort((a,b)=>b.e_horizon-a.e_horizon);
  const byRoi=[...scored].sort((a,b)=>(num(b.roi_per_million)?b.roi_per_million:-Infinity)-(num(a.roi_per_million)?a.roi_per_million:-Infinity));
  // Brother-safe name match: compare full pool names (both team.riders[].name and evBoard[].name are the
  // resolved full pool names), accent-folded and normalised — NEVER surname alone.
  const nn=(s)=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  const findRow=(name)=>{ const k=nn(name); return board.find(r=>nn(r.name)===k)||null; };
  const rankIn=(arr,name)=>{ const k=nn(name); const i=arr.findIndex(r=>nn(r.name)===k); return i<0?null:i+1; };
  const pctl=(rank)=> rank==null?null:(N<=1?1:(1-(rank-1)/(N-1))); // rank 1 -> 1.0 (top)

  let anchors=0,values=0,solids=0,specs=0,floors=0,gaps=0;
  const rows=riders.map(r=>{
    const isCap=!!r.isCaptain;
    const row=findRow(r.name);
    if(!row || !num(row.e_horizon)){ gaps++; return {r,isCap,cls:'nodata'}; }
    const cov=num(row.coverage)?row.coverage:0;
    if(cov===0){ floors++; return {r,isCap,cls:'floor',row}; }
    const ehRank=rankIn(byEh,r.name), roiRank=rankIn(byRoi,r.name);
    const ehP=pctl(ehRank), roiP=pctl(roiRank);
    let cls,label;
    if(num(ehP)&&ehP>=0.8){ cls='anchor'; label='Anchor'; anchors++; }
    else if(num(roiP)&&roiP>=0.8){ cls='value'; label='Value pick'; values++; }
    else if(num(ehP)&&ehP>=0.5){ cls='solid'; label='Upper-half'; solids++; }
    else { cls='spec'; label='Speculative'; specs++; }
    return {r,isCap,cls,label,row,ehRank,roiRank,ehP,roiP};
  });

  function metricCell(lbl,kind,rank,p){
    if(rank==null||!num(p)) return `<div class="slotmetric"><div class="ml"><span>${lbl}</span><span class="rk na">n/a</span></div><div class="slotbar"></div></div>`;
    const w=Math.max(2,Math.round(p*100));
    return `<div class="slotmetric"><div class="ml"><span>${lbl}</span><span class="rk">#${rank}/${N} · ${(p*100).toFixed(0)}th pct</span></div><div class="slotbar"><i class="${kind}" style="width:${w}%"></i></div></div>`;
  }

  const html=rows.map(x=>{
    const r=x.r;
    const name=`<span class="sn"><b>${x.isCap?'<span class="capstar">★ </span>':''}${esc(r.name)}</b><small>${esc(r.realTeam||'—')} · ${krM(r.value)}</small></span>`;
    if(x.cls==='nodata'){
      return `<div class="slot nodata">${name}<div class="spanmid na">Not matched in the scored pool — no substrate to rank this slot (real data gap).</div><span class="role">no pool match</span></div>`;
    }
    if(x.cls==='floor'){
      return `<div class="slot floor ${x.isCap?'cap':''}">${name}
        <div class="spanmid" style="color:var(--warn)">No research channel has reached this rider — it sits on the shared no-signal prior, so it has no meaningful pool rank yet. This is <b>“not yet scored”, not “scored low”.</b></div>
        <span class="role">${x.isCap?'★ ':''}Prior / floor</span></div>`;
    }
    const roleTxt=(x.isCap?'★ ':'')+x.label;
    return `<div class="slot ${x.cls} ${x.isCap?'cap':''}">
      ${name}
      ${metricCell('e_horizon','eh',x.ehRank,x.ehP)}
      ${metricCell('roi / M','roi',x.roiRank,x.roiP)}
      <span class="role" title="${x.isCap?'captain · ':''}${x.label}">${roleTxt}</span>
    </div>`;
  }).join('');

  const pills=[];
  if(anchors) pills.push(`<span class="pill ok">${anchors} anchor${anchors===1?'':'s'}</span>`);
  if(values)  pills.push(`<span class="pill acc">${values} value pick${values===1?'':'s'}</span>`);
  if(solids)  pills.push(`<span class="pill">${solids} upper-half</span>`);
  if(specs)   pills.push(`<span class="pill bad">${specs} speculative</span>`);
  if(floors)  pills.push(`<span class="pill warn">${floors} prior/floor</span>`);
  if(gaps)    pills.push(`<span class="pill warn">${gaps} no substrate</span>`);

  const weakBits=[];
  if(specs)  weakBits.push(`<b style="color:var(--bad)">${specs} owned rider${specs===1?'':'s'} rank below the pool median e_horizon</b> — slot${specs===1?'':'s'} the numbers do not yet justify`);
  if(floors) weakBits.push(`<b style="color:var(--warn)">${floors} sit on the no-signal floor</b> (not yet scored)`);
  if(gaps)   weakBits.push(`<b style="color:var(--warn)">${gaps} have no pool match</b>`);
  const weakLine = weakBits.length ? ' '+weakBits.join('; ')+'. ' : ' Every scored slot clears the pool median. ';

  const note=`Each owned rider ranked against the <b>${N}</b> pool riders a live channel actually scored (coverage&gt;0). `
    +`<b style="color:var(--ok)">Anchor</b> = top-quintile e_horizon (the Σ e_horizon core); `
    +`<b style="color:var(--cyan)">Value pick</b> = top-quintile roi/M (the cheap breadth the strategy fills slots with); `
    +`<b style="color:var(--acc)">Upper-half</b> = solid; `
    +`<b style="color:var(--bad)">Speculative</b> = below the pool median e_horizon.`
    +weakLine
    +`This is the squad-construction strategy made auditable per slot: is every rider actually earning its place?`;

  const inner=`<div class="card">
    <div class="slot-note">${note}</div>
    <div class="slot-summary">${pills.join('')}</div>
    <div class="slotwrap">${html}</div>
  </div>`;
  pushBlock('roster','02·B','Roster rationale — why each slot','owned riders ranked vs the scored pool · anchor / value / speculative / floor · weak slots surfaced',inner);
})();

/* ============================================================= 2b. CAPTAIN PICK */
(function(){
  const tm=D.team||{};
  const riders=tm.riders||[];
  // Owned riders ranked by captain_ceiling — the exact metric the strategy uses to pick the captain.
  // r.isCaptain is computed upstream by a robust norm match (never surname-only), so we trust it here.
  const ranked=riders.filter(r=>r.ev&&num(r.ev.captain_ceiling))
    .map(r=>({name:r.name,realTeam:r.realTeam,ceil:r.ev.captain_ceiling,isCaptain:!!r.isCaptain}))
    .sort((a,b)=>b.ceil-a.ceil);
  const noData=riders.filter(r=>!(r.ev&&num(r.ev.captain_ceiling))).map(r=>r.name);

  if(!ranked.length){
    pushBlock('captain','CAP','Captain pick — why the crown','the captaincy decision, ranked by captain_ceiling',
      `<div class="card"><span class="na">No per-rider captain_ceiling available this build (substrate not live), so the captaincy of <b>${esc(tm.captain||'—')}</b> cannot be justified numerically here.</span></div>`);
    return;
  }
  const chosen=ranked.find(r=>r.isCaptain)||null;
  const top=ranked[0], runner=ranked[1]||null;
  const maxc=top.ceil>0?top.ceil:1;

  // captain_ceiling collapses toward a shared value on stages where the EV engine zeroes the stage-placement
  // / sprint terms (e.g. a TTT). It then cannot discriminate the crown, and a naive descending sort makes an
  // arbitrary tie-break rider look "highest" — which would fire a FALSE "captaincy mismatch". Two shapes of
  // this: (a) FULLY FLAT — every owned ceiling equal; (b) TIED AT THE TOP — the crown SHARES the squad-high
  // ceiling with ≥1 other owned rider while lower riders differ (a TTT top-TT-tier, e.g. Pogačar == Wellens
  // at 157,666). In (b) "highest ceiling" is a non-justification — the ceiling is indifferent between the tied
  // co-leaders, and reporting "×1.0 the next-best" only advertises the tie. Handle BOTH the same way: justify
  // the crown on the metric that actually breaks the tie here — e_horizon (the forward / GC-scoring floor the
  // ceiling drops). All name work uses full resolved names — never surname-only (brothers).
  const ceilMin=ranked[ranked.length-1].ceil;
  const ceilEps=Math.max(1,top.ceil*0.005);
  const ceilFlat=(top.ceil-ceilMin)<=ceilEps;
  const coLeaders=chosen?ranked.filter(r=>!r.isCaptain && Math.abs(r.ceil-top.ceil)<=ceilEps):[];
  const chosenAtTop=!!chosen && (top.ceil-chosen.ceil)<=ceilEps;
  const ceilTieAtTop=!ceilFlat && chosenAtTop && coLeaders.length>0;
  if(chosen && (ceilFlat || ceilTieAtTop)){
    const rankedEh=riders.filter(r=>r.ev&&num(r.ev.e_horizon))
      .map(r=>({name:r.name,realTeam:r.realTeam,eh:r.ev.e_horizon,isCaptain:!!r.isCaptain}))
      .sort((a,b)=>b.eh-a.eh);
    const board=D.evBoard||[];
    const shareN=board.filter(r=>num(r.captain_ceiling)&&Math.abs(r.captain_ceiling-chosen.ceil)<1).length;
    const stg=(D.stage&&D.stage.type)?String(D.stage.type).toUpperCase():'';
    const coNames=coLeaders.map(c=>esc(c.name)).join(', ');
    const ceilHead=ceilFlat
      ? `<b>captain_ceiling is flat this build</b> — all ${ranked.length} owned riders carry the same <b class="mono">${kr(chosen.ceil)}</b> kr${shareN?`, as do ${shareN} of ${board.length} pool riders`:''}`
      : `<b>captain_ceiling ties at the top this build</b> — the crown shares the squad-high ceiling <b class="mono">${kr(chosen.ceil)}</b> kr with ${coLeaders.length===1?coNames:coLeaders.length+' other owned riders ('+coNames+')'}${shareN&&shareN>1?`; ${shareN} of ${board.length} pool riders carry it`:''}, so ranking by ceiling reports a meaningless <b>×1.0</b> and can't pick between the tied co-leaders`;
    const flatNote=`${ceilHead}. ${stg==='TTT'?'Stage 1 is a <b>TTT</b>, so the engine zeroes the stage-placement / sprint terms':'The stage EV zeroes the stage-placement / sprint terms this build'} → the ceiling <b>cannot discriminate the crown</b>. ${I('captain_ceiling = E[max(0,Δkr)] right-tail stage-win upside if captained; on a TTT that term is 0 for everyone so it degenerates toward a shared squad-TT floor.')}`;
    let cco, ehMax=1, barsEh='';
    if(rankedEh.length){
      const cEh=rankedEh.find(r=>r.isCaptain), tEh=rankedEh[0], rEh=rankedEh[1]||null;
      ehMax=tEh.eh>0?tEh.eh:1;
      if(cEh && cEh.name===tEh.name){
        const marg=rEh&&rEh.eh>0?(cEh.eh/rEh.eh):null;
        cco=`<div class="cap-callout">${flatNote} The crown is instead driven by <b class="mono">e_horizon</b> — the forward / GC-scoring floor: <b style="color:var(--gold)">★ ${esc(cEh.name)}</b> tops the squad at <b class="mono">${kr(cEh.eh)}</b> kr${rEh?`, ${marg?'<b>×'+marg.toFixed(1)+'</b> ':''}the rest of the field (${esc(rEh.name)}, ${kr(rEh.eh)})`:''}. That forward floor — not stage-win ceiling — is <b>why he wears the crown</b>.</div>`;
      } else if(cEh){
        cco=`<div class="banner warn">${flatNote} On the fallback metric <b class="mono">e_horizon</b>, <b>${esc(cEh.name)}</b> (${kr(cEh.eh)}) is <b>not</b> the squad's highest — <b>${esc(tEh.name)}</b> leads at ${kr(tEh.eh)}. Neither the (flat) ceiling nor the forward floor justifies this crown — worth a look.</div>`;
      } else {
        cco=`<div class="banner warn">${flatNote} And the live captain did not resolve to an e_horizon-bearing rider — the crown is <b>unexplained</b> this build (data gap).</div>`;
      }
      barsEh=rankedEh.map(r=>{
        const w=Math.max(2,Math.round(r.eh/ehMax*100));
        return `<div class="caprow ${r.isCaptain?'chosen':''}">
          <span class="cn"><b>${r.isCaptain?'★ ':''}${esc(r.name)}</b><small>${esc(r.realTeam||'—')}</small></span>
          <span class="ctrack"><i style="width:${w}%"></i></span>
          <span class="cval">${kr(r.eh)}</span>
        </div>`;
      }).join('');
    } else {
      cco=`<div class="banner warn">${flatNote} No per-rider e_horizon is available to justify the crown on the fallback metric either — a data gap.</div>`;
    }
    const inner=`<div class="card">
      ${cco}
      <h3>Owned riders ranked by e_horizon ${I('Forward / GC-scoring floor over the horizon. Shown because captain_ceiling is uniform this build and cannot rank the crown; the gold bar is the live captain.')}</h3>
      <div class="capwrap">${barsEh}</div>
      ${noData.length?`<div class="cap-nodata">Not ranked — no live substrate: ${noData.map(esc).join(', ')}.</div>`:''}
    </div>`;
    pushBlock('captain','CAP','Captain pick — why the crown',(ceilFlat?'ceiling is flat this build':'ceiling ties at the top this build')+' · crown judged on e_horizon (forward floor) · gold bar tops the list',inner);
    return;
  }

  let callout;
  if(!chosen){
    // Live captain exists but didn't resolve to a ceiling-bearing rider — surface it as a gap, don't hide it.
    callout=`<div class="banner warn">The live captain <b>${esc(tm.captain||'—')}</b> could not be matched to a rider carrying a captain_ceiling in this build — the captaincy is <b>unexplained</b> here (possible data gap, not a green light).</div>`;
  } else if(chosen.ceil>=top.ceil){
    const marg=runner&&runner.ceil>0?(chosen.ceil/runner.ceil):null;
    callout=`<div class="cap-callout"><b style="color:var(--gold)">★ ${esc(chosen.name)}</b> is captained — the <b>highest captain_ceiling in the squad</b> at <b class="mono">${kr(chosen.ceil)}</b> kr${runner?`, ${marg?'<b>×'+marg.toFixed(1)+'</b> ':''}the next-best (${esc(runner.name)}, ${kr(runner.ceil)})`:''}. ${I('captain_ceiling = E[max(0,Δkr)] right-tail upside if this rider is captained this stage — win windfall + placement upside + positive passive floor.')} The strategy crowns the owned rider with the largest captain_ceiling, so this pick is <b>consistent with the rule</b>.</div>`;
  } else {
    // The crowned rider is NOT the top of the FRESHLY-RECOMPUTED ceiling board. Before calling that a
    // fault, consult the decision log: the dashboard rebuilds the whole substrate from scratch each run,
    // so its ceiling ranking can drift from the board the brain actually saw when it set the crown.
    //  · NON-STALE DRIFT — live crown == the latest decision's captain (same stage): the brain deliberately
    //    captained the highest ceiling IT saw; a later re-fusion of refreshed odds nudged a near-tied
    //    teammate above it. That is a dashboard-vs-decision timing artifact — surfaced honestly, but NOT a
    //    stale/wrong crown, so it must not scream a red alarm.
    //  · STALE — live crown != the latest decision captain: the crown was never updated to the plan. That
    //    is the real ops failure and keeps the hard WARN.
    // Name match is brother-safe (namesMatch: first-initial + surname-suffix, never surname alone).
    const dcp=D.decision||null, decCap=dcp&&dcp.captain_name||null;
    const sameStage=!dcp||dcp.stage_number==null||!D.stage||dcp.stage_number===D.stage.number;
    const crownIsLatest=!!(decCap && namesMatch(chosen.name,decCap) && sameStage);
    const gapPct=top.ceil>0?Math.round((top.ceil-chosen.ceil)/top.ceil*100):0;
    const rEh=riders.filter(r=>r.ev&&num(r.ev.e_horizon))
      .map(r=>({name:r.name,eh:r.ev.e_horizon,isCaptain:!!r.isCaptain})).sort((a,b)=>b.eh-a.eh);
    const ehTop=rEh[0]||null, ehCrown=rEh.find(r=>r.isCaptain)||null;
    const crownLeadsEh=!!(ehTop&&ehCrown&&ehCrown.name===ehTop.name);
    if(crownIsLatest){
      // On the live board, does the recomputed #1 also beat the crown on e_horizon? If so the fresh
      // substrate genuinely favours it and the next brain run should reconcile — say so plainly.
      const better=!crownLeadsEh && ehTop && namesMatch(ehTop.name,top.name);
      callout=`<div class="banner note">ℹ <b>Not a stale crown — this is dashboard-vs-decision drift.</b> The live captain <b style="color:var(--gold)">★ ${esc(chosen.name)}</b> is exactly the captain the latest Stage-${esc((D.stage&&D.stage.number)||'?')} decision set (<span class="mono">${esc(dcp.source||'plan')}</span> · ${relAge(dcp.generatedAt)}), so it is <b>not</b> stale. The dashboard recomputes the whole substrate fresh each build; the brain scored the board when it set the crown and captained the highest ceiling it then owned. On this rebuild the recomputed board now ranks <b>${esc(top.name)}</b> (${kr(top.ceil)}) ~${gapPct}% above ${esc(chosen.name)} (${kr(chosen.ceil)}) — the two riders' ceilings were near-tied when the crown was set, so a small re-fusion of refreshed odds flipped their order. ${better?`On the live board <b>${esc(top.name)}</b> now tops <b>both</b> captain_ceiling and e_horizon, so the fresh substrate favours it as captain — the next brain run should reconcile.`:(crownLeadsEh?`The crown still leads the squad on <b class="mono">e_horizon</b> (the forward floor the ceiling can't see), so it remains defensible.`:'')} ${I('The dashboard scores every rider at build time; the brain scored them earlier. When two ceilings sit close, the two boards can disagree on the #1 without either being a mistake.')}</div>`;
    } else {
      const staleNote=decCap?` — and the latest decision captains <b>${esc(decCap)}</b>, so the live crown was not updated to the plan (a stale captaincy)`:'';
      callout=`<div class="banner warn">⚠ <b>Captaincy mismatch.</b> <b>${esc(chosen.name)}</b> wears the crown (ceiling ${kr(chosen.ceil)}), but <b>${esc(top.name)}</b> has the higher captain_ceiling (${kr(top.ceil)})${staleNote}. The strategy says to captain the highest-ceiling owned rider — ${decCap?'reconcile the live crown to the plan':'a possible stale captaincy or deliberate override, worth a look'}.</div>`;
    }
  }

  const bars=ranked.map(r=>{
    const w=Math.max(2,Math.round(r.ceil/maxc*100));
    return `<div class="caprow ${r.isCaptain?'chosen':''}">
      <span class="cn"><b>${r.isCaptain?'★ ':''}${esc(r.name)}</b><small>${esc(r.realTeam||'—')}</small></span>
      <span class="ctrack"><i style="width:${w}%"></i></span>
      <span class="cval">${kr(r.ceil)}</span>
    </div>`;
  }).join('');
  const nodataLine=noData.length?`<div class="cap-nodata">Not ranked — no live substrate to score a ceiling (real data gap): ${noData.map(esc).join(', ')}.</div>`:'';

  const inner=`<div class="card">
    ${callout}
    <h3>Owned riders ranked by captain_ceiling ${I('Right-tail Δkr upside if captained this stage. The crowned (gold) bar should sit at the top.')}</h3>
    <div class="capwrap">${bars}</div>
    ${nodataLine}
  </div>`;
  pushBlock('captain','CAP','Captain pick — why the crown','owned riders ranked by captain_ceiling · the gold (crowned) bar should top the list',inner);
})();

/* ============================================================= 3. DECISION */
(function(){
  const dc=D.decision;
  if(!dc){ pushBlock('decision','03','Why this team','the decision','<div class="card"><span class="na">No decision plan available.</span></div>'); return; }

  /* Plan-vs-live reconciliation — does the bot actually HOLD the team this plan describes?
     The "why" narrative is for dc.target_team, but that can differ from the live roster
     (a rebuild not yet applied, a human-gated swap, a stale captaincy). Surface the gap
     honestly instead of letting the two sections silently contradict each other.
     Name match is brother-safe: exact-normalized, else first-initial + surname-suffix,
     NEVER surname alone (brothers share surnames). */
  // Uses the module-scope brother-safe namesMatch() (defined near the helpers) — the SAME matcher the
  // Candor panel and the Overview ribbon consume, so no drift is possible across the three sections.
  let recon='';
  (function(){
    const planTeam=(dc.target_team||[]).filter(Boolean);
    const liveTeam=((D.team&&D.team.riders)||[]).map(r=>r.name).filter(Boolean);
    if(!planTeam.length || !liveTeam.length) return; // nothing to reconcile against
    const held =planTeam.filter(p=>liveTeam.some(l=>namesMatch(p,l)));
    const toBuy=planTeam.filter(p=>!liveTeam.some(l=>namesMatch(p,l)));
    const toSell=liveTeam.filter(l=>!planTeam.some(p=>namesMatch(p,l)));
    const planCap=dc.captain_name||null, liveCap=(D.team&&D.team.captain)||null;
    const capMatch=(planCap&&liveCap)? namesMatch(planCap,liveCap) : null;
    const rosterApplied=toBuy.length===0 && toSell.length===0;
    const fullApplied=rosterApplied && capMatch!==false;
    const nm=(name,isCap)=>`<div class="nm"><span class="dot2"></span>${isCap?'<span class="star">★</span>':''}${esc(name)}</div>`;
    const capCmp=(planCap||liveCap)?`<div class="capcmp">
        <div class="cc"><small>plan captain</small><b style="color:var(--gold)">★ ${esc(planCap||'—')}</b></div>
        <div class="cc"><small>live captain</small><b style="color:${capMatch===false?'var(--warn)':'var(--gold)'}">★ ${esc(liveCap||'—')}</b></div>
        ${capMatch===null?'':`<span class="verd ${capMatch?'ok':'warn'}">${capMatch?'✓ captain matches':'⚠ captain differs — the live crown is not the planned one'}</span>`}
      </div>`:'';
    const col=(cls,label,arr,capName)=> arr.length? `<div class="col ${cls}"><h4>${label} <span class="cnt">${arr.length}</span></h4>${arr.map(n=>nm(n,capName&&namesMatch(n,capName))).join('')}</div>`:'';
    const cols=[
      col('held','In plan &amp; held',held, fullApplied?planCap:null),
      col('buy','Planned · not yet bought',toBuy, planCap),
      col('sell','Held · not in plan (would sell)',toSell, liveCap),
    ].filter(Boolean).join('');
    const head = fullApplied
      ? '✓ The live roster matches this plan'
      : `⚠ This plan is <b>not yet reflected</b> in the live roster`;
    const sub = fullApplied
      ? 'Every planned rider is held and the planned captain is the live captain — the decision below is the team the bot actually owns.'
      : `${toBuy.length} of ${planTeam.length} planned rider${toBuy.length===1?'':'s'} ${toBuy.length===1?'is':'are'} not held yet`
        + (toSell.length?`, and ${toSell.length} held rider${toSell.length===1?'':'s'} ${toSell.length===1?'is':'are'} not in the plan`:'')
        + (capMatch===false?', and the live captain differs from the planned captain':'')
        + `. The rationale below explains the <b>planned</b> target team — not necessarily the roster shown in “Current team” above.`
        + (dc.rebuild?' This plan is a full rebuild; pre-stage-1 transfers are free, so it may be applied in a later cycle.':'');
    recon=`<div class="recon ${fullApplied?'applied':'drift'}">
      <div class="rh">${head}</div>
      <div class="rsub">${sub}</div>
      ${capCmp}
      <div class="cols">${cols}</div>
    </div>`;
  })();

  /* Target-team SHAPE — group the planned target_team by real-world squad. The pick is structural
     (max 2 per real team; on a TTT, placement is paid EQUALLY to every active rider of a top-placed
     squad, so you value whole strong teams, not individuals) — but that structure is otherwise buried
     in the summary prose and the flat chip row. Grouping the picks by squad makes the "2-up" spine —
     and any single-rider or no-pool-match slots — visible at a glance. Brother-safe name match:
     exact-normalized, else first-initial + surname-suffix, NEVER surname alone. */
  function targetShape(){
    const planned=(dc.target_team||[]).filter(Boolean);
    if(planned.length<2) return '';
    const board=D.evBoard||[];
    if(!board.length) return ''; // no substrate to resolve squads → caller falls back to flat chips
    const nn=(s)=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    const resolve=(name)=>{
      const k=nn(name);
      let row=board.find(r=>nn(r.name)===k); if(row) return row;
      const pa=k.split(' '); if(pa.length<2) return null;
      const init=pa[0][0], sur=pa[pa.length-1];
      const hits=board.filter(r=>{const p=nn(r.name).split(' '); if(p.length<2) return false; const rs=p[p.length-1]; return p[0][0]===init&&(rs===sur||rs.endsWith(sur)||sur.endsWith(rs));});
      return hits.length===1?hits[0]:null; // ambiguous (brothers) → unresolved, never guess
    };
    const items=planned.map(n=>({name:n,row:resolve(n),isCap:dc.captain_name?namesMatch(n,dc.captain_name):false}));
    const resolved=items.filter(x=>x.row).length;
    if(resolved<Math.ceil(planned.length*0.6)) return ''; // too little to trust the shape → flat chips
    const eh=(x)=> x.row&&num(x.row.e_horizon)? x.row.e_horizon : 0;
    const gmap=new Map();
    items.forEach(x=>{ const t=x.row&&x.row.realTeam? x.row.realTeam : '__nomatch__'; if(!gmap.has(t)) gmap.set(t,[]); gmap.get(t).push(x); });
    // pairs (2-up) first, then by summed forward e_horizon; the no-match bucket always sinks last.
    const groups=[...gmap.entries()].map(([team,rs])=>({team,rs,sum:rs.reduce((s,x)=>s+eh(x),0)}))
      .sort((a,b)=>{ if(a.team==='__nomatch__') return 1; if(b.team==='__nomatch__') return -1;
        return (b.rs.length-a.rs.length)||(b.sum-a.sum)||a.team.localeCompare(b.team); });
    const palette=['#58a6ff','#39d3c8','#a371f7','#e3b341','#f0883e','#db61a2','#3fb950','#79c0ff'];
    const pairCount=groups.filter(g=>g.team!=='__nomatch__'&&g.rs.length>=2).length;
    const nomatch=(gmap.get('__nomatch__')||[]).length;
    let pi=0;
    const cards=groups.map(g=>{
      const isNo=g.team==='__nomatch__';
      const col=isNo?'var(--mut2)':palette[(pi++)%palette.length];
      const isPair=!isNo&&g.rs.length>=2;
      const riders=g.rs.map(x=>{
        const isFloor=x.row&&(!num(x.row.coverage)||x.row.coverage===0);
        const val=x.row?krM(x.row.value):naSpan;
        return `<div class="sq-rider ${isFloor?'floor':''}">
          <span class="rnm">${x.isCap?'<span class="caps">★</span>':''}<b>${esc(x.name)}</b>${isFloor?'<span class="sq-floor">prior</span>':''}</span>
          <span class="rv">${val}</span></div>`;
      }).join('');
      const badge=isNo?'no pool match':isPair?'2-up':g.rs.length+'-rider';
      return `<div class="squadcard ${isPair?'pair':''} ${isNo?'nomatch':''}" style="--sc:${col}">
        <div class="sq-h"><span class="sq-name">${esc(isNo?'No pool match':g.team)}</span><span class="sq-badge ${isPair?'pair':''}">${badge}</span></div>
        ${riders}</div>`;
    }).join('');
    const isTTT=(D.stage&&(D.stage.type||'').toLowerCase()==='ttt');
    const why=isTTT
      ? `<b>Stage ${D.stage.number??'1'} is a team time-trial.</b> Only TTT placement scores, and it is paid <b>equally to every active rider of a top-placed squad</b> — so the selection is structural: <b style="color:var(--cyan)">pairs of riders stacked on the strongest TT teams</b> (${pairCount} squad${pairCount===1?'':'s'} run 2-up here), valuing whole teams over individuals. This is why the per-rider e_horizon / conf board below does <i>not</i> drive today's pick — the coverage rouleurs correctly read conf 0.00 on a TTT.`
      : `The planned roster grouped by real-world squad — <b style="color:var(--cyan)">${pairCount} team${pairCount===1?'':'s'} stacked 2-up</b> under the max-2-per-real-team cap. Seeing the pairs (and any lone slots) makes the squad-construction shape auditable at a glance.`;
    const gap=nomatch?` <b style="color:var(--warn)">${nomatch} planned rider${nomatch===1?'':'s'}</b> could not be matched to a pool squad (no live substrate) — shown honestly as a gap, not a fake squad.`:'';
    return `<div class="shape-note">${why}${gap}</div><div class="shape-grid">${cards}</div>`;
  }
  const shape=targetShape();

  /* Swap ledger — resolve the sold + bought rider in the live EV substrate and show a compact
     sold→bought head-to-head (price · e_horizon · roi/M), so the prose rationale is backed by the
     ACTUAL figures instead of an empty "EV n/a" chip. The plan schema never populates expected_value/
     confidence, yet every number that justifies the trade already lives in evBoard. Brother-safe match:
     exact-normalized, else first-initial + surname-suffix, UNIQUE only — NEVER surname alone. */
  const _board=D.evBoard||[];
  const _nn=(s)=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  function resolveRow(name){
    const k=_nn(name); if(!k) return null;
    let row=_board.find(r=>_nn(r.name)===k); if(row) return row;
    const pa=k.split(' '); if(pa.length<2) return null;
    const init=pa[0][0], sur=pa[pa.length-1];
    const hits=_board.filter(r=>{const p=_nn(r.name).split(' ');if(p.length<2)return false;const rs=p[p.length-1];return p[0][0]===init&&(rs===sur||rs.endsWith(sur)||sur.endsWith(rs));});
    return hits.length===1?hits[0]:null; // ambiguous (brothers) → unresolved, never guess
  }
  const isFloorRow=(r)=> !!r && (!num(r.coverage)||r.coverage===0);
  const flTag=(r)=> isFloorRow(r)?' <span class="fl" title="No research channel reached this rider — its numbers are the shared prior floor, not a scored read.">floor</span>':'';
  const intKr=(v)=>Math.round(v).toLocaleString('en-US');
  // one metric cell: sold value → bought value, the bought value coloured by trade direction.
  function mCell(label,fmt,sv,bv,mode){
    const sN=num(sv), bN=num(bv);
    const sTxt=sN?fmt(sv):naSpan, bTxt=bN?fmt(bv):naSpan;
    let cls='flat', ar='';
    if(sN&&bN&&sv!==bv){
      if(mode==='price'){ const cheaper=bv<sv; cls=cheaper?'frees':'flat'; ar=cheaper?'▼':'▲'; }
      else { const better=bv>sv; cls=better?'up':'dn'; ar=better?'▲':'▼'; }
    }
    return `<div class="lmet"><div class="lm-l">${label}</div>`
      +`<div class="lm-v"><span class="sv">${sTxt}</span><span class="arrow">→</span>`
      +`<span class="${cls}">${ar?ar+' ':''}${bTxt}</span></div></div>`;
  }
  // net budget effect across the priced swaps (buy price − sell price), so the aggregate cost is honest.
  let netDelta=0, pricedN=0;
  for(const sw of (dc.swaps||[])){ const s=resolveRow(sw.sell_name),b=resolveRow(sw.buy_name);
    if(s&&b&&num(s.value)&&num(b.value)){ netDelta+=(b.value-s.value); pricedN++; } }
  const isTTTdec=(D.stage&&(D.stage.type||'').toLowerCase()==='ttt');
  const ledgerNote = (dc.swaps||[]).length ? `<div class="ledger-note">Each swap's figures are pulled live from the EV substrate — <b>sold → bought</b> for price, <span class="mono">e_horizon</span> and <span class="mono">roi/M</span> — so the prose is backed by the numbers, not just asserted. <span class="frees mono">▼</span> on price = budget freed; <span class="up mono">▲</span>/<span class="dn mono">▼</span> on a metric = the buy scores higher/lower than the rider it replaces${isTTTdec?' (on this TTT, e_horizon reflects <b>team</b> TT strength, not individual form)':''}. A <span class="fl">floor</span> tag means no research channel reached that rider — its numbers are the shared prior, not a scored read.</div>` : '';

  const swaps=(dc.swaps||[]).map(sw=>{
    const cc=(sw.confidence||'').toLowerCase();
    const ccCls=cc==='high'?'high':cc==='med'?'med':cc==='low'?'low':'med';
    const sell=resolveRow(sw.sell_name), buy=resolveRow(sw.buy_name);
    const ledger=(sell||buy)?`<div class="ledger">
        ${mCell('price',krM,sell&&sell.value,buy&&buy.value,'price')}
        ${mCell('e_horizon',intKr,sell&&sell.e_horizon,buy&&buy.e_horizon,'higher')}
