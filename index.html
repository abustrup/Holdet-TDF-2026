<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Holdet TDF bot — interpretability console</title>
<style>
/* ============================================================= mission-control theme */
:root{
  /* ---- DARK palette (default; byte-identical to the original) ---- */
  --bg:#0a0e14; --bg2:#070a0f; --panel:#11161f; --panel2:#0d121a;
  --ink:#e6edf3; --ink2:#c4cdd8; --mut:#7d8a9c; --mut2:#5a6675;
  --line:#1e2632; --line2:#283142;
  --acc:#58a6ff; --acc2:#388bfd; --cyan:#39d3c8; --violet:#a371f7;
  --ok:#3fb950; --okbg:#0f2417; --warn:#d29922; --warnbg:#241c0d; --bad:#f85149; --badbg:#2a1213;
  --gold:#e3b341;
  /* status / accent borders + accent tint surfaces */
  --ok-bd:#1c4029; --warn-bd:#3d3415; --bad-bd:#4a1f1f; --acc-bd:#1d3a5c;
  --acc-bg:#0c1722;
  /* generic tinted surfaces */
  --chip-bg:#0c121b; --bar-bg:#0a0f17; --nav-bg:rgba(8,11,16,.86);
  --tc-default:#30363d;
  /* hero + body gradient stops */
  --hero-a:#0f1722; --hero-b:#0b1019; --hero-stripe:rgba(88,166,255,.03);
  --body-grad-a:#0e1722; --body-grad-b:#0c141d;
  --jobpill-bg:#0b1019;
  /* crown / captain */
  --crown-ink:#1a1407; --cap-glow:rgba(227,179,65,.10); --cap-inset:rgba(227,179,65,.35);
  --cap-track-a:#8a6d1f;
  /* cyan/value tint surfaces */
  --value-bg:#0c1f1d; --value-bd:#16403b;
  /* candor severity tinted backgrounds */
  --sevhigh-bg:#16100f; --sevmed-bg:#14110b;
  /* squad pair inset */
  --pair-inset:rgba(57,211,200,.14);
  /* floor tag surface */
  --floor-bg:#1c1608; --floor-bd:#4a3a12;
  /* tables */
  --thead-bg:#0d131c; --row-hover:#0e141d;
  --owned-bg:rgba(88,166,255,.06); --owned-bg2:rgba(88,166,255,.10);
  /* provenance src chip */
  --srcchip-bg:#0c1a24; --srcchip-bd:#24425c;
  /* misc tinted phase / journal surfaces */
  --held-bg:#1a2029; --phase-improve-bg:#1a1226;
  /* deep surfaces */
  --logtail-bg:#070a0f; --tip-bg:#05080c; --tip-ink:#c4cdd8; --tip-shadow:rgba(0,0,0,.5);
  /* team-B differential chip */
  --diff-bg:#120c1c; --diff-bd:#3a2a5c;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
html[data-theme="light"]{
  /* ---- LIGHT palette (GitHub-light inspired, AA-tuned) ---- */
  --bg:#f6f8fa; --bg2:#eaeef2; --panel:#ffffff; --panel2:#f6f8fa;
  --ink:#1f2328; --ink2:#3d444d; --mut:#59636e; --mut2:#636c78;
  --line:#d1d9e0; --line2:#c2ccd6;
  --acc:#0969da; --acc2:#0550ae; --cyan:#0f7a72; --violet:#8250df;
  --ok:#1a7f37; --okbg:#dafbe1; --warn:#9a6700; --warnbg:#fff8c5; --bad:#cf222e; --badbg:#ffebe9;
  --gold:#9a6700;
  --ok-bd:#aceebb; --warn-bd:#eac54f; --bad-bd:#ffcecb; --acc-bd:#b6e3ff;
  --acc-bg:#ddf4ff;
  --chip-bg:#f6f8fa; --bar-bg:#eaeef2; --nav-bg:rgba(255,255,255,.85);
  --tc-default:#d1d9e0;
  --hero-a:#ffffff; --hero-b:#f0f3f6; --hero-stripe:rgba(9,105,218,.05);
  --body-grad-a:#eef3f8; --body-grad-b:#f3f6fa;
  --jobpill-bg:#f6f8fa;
  --crown-ink:#ffffff; --cap-glow:rgba(154,103,0,.14); --cap-inset:rgba(154,103,0,.30);
  --cap-track-a:#d4a72c;
  --value-bg:#d7f5f0; --value-bd:#9fe0d6;
  --sevhigh-bg:#ffebe9; --sevmed-bg:#fff8c5;
  --pair-inset:rgba(15,122,114,.18);
  --floor-bg:#fff8c5; --floor-bd:#eac54f;
  --thead-bg:#eaeef2; --row-hover:#eef2f6;
  --owned-bg:rgba(9,105,218,.07); --owned-bg2:rgba(9,105,218,.12);
  --srcchip-bg:#ddf4ff; --srcchip-bd:#b6e3ff;
  --held-bg:#eaeef2; --phase-improve-bg:#f3ecfb;
  --logtail-bg:#eaeef2; --tip-bg:#1f2328; --tip-ink:#eaeef2; --tip-shadow:rgba(31,35,40,.18);
  --diff-bg:#f3ecfb; --diff-bd:#d8c4f2;
}
html{color-scheme:dark}
html[data-theme="light"]{color-scheme:light}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:
   radial-gradient(1200px 600px at 80% -10%, var(--body-grad-a) 0%, transparent 60%),
   radial-gradient(900px 500px at -10% 10%, var(--body-grad-b) 0%, transparent 55%),
   var(--bg);
  color:var(--ink);font:14px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3{margin:0}
::-webkit-scrollbar{height:9px;width:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ============================================================= top nav */
.topnav{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  padding:8px 16px;background:var(--nav-bg);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.topnav .brand{font-weight:700;letter-spacing:.3px;margin-right:10px;font-size:13px;white-space:nowrap}
.topnav .brand .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);
  margin-right:7px;box-shadow:0 0 8px var(--ok);animation:pulse 2.6s ease-in-out infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.topnav a.nav{color:var(--mut);font-size:11.5px;padding:4px 9px;border-radius:6px;white-space:nowrap}
.topnav a.nav:hover{color:var(--ink);background:var(--line);text-decoration:none}
.topnav .spacer{flex:1}
.topnav .stamp{font-family:var(--mono);font-size:11px;color:var(--mut2)}
.theme-toggle{margin-left:10px;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;
  padding:0;border-radius:8px;border:1px solid var(--line2);background:var(--chip-bg);color:var(--ink2);
  font-size:14px;line-height:1;cursor:pointer;transition:color .15s,border-color .15s,background .15s}
.theme-toggle:hover{color:var(--acc);border-color:var(--acc);background:var(--acc-bg)}
.theme-toggle:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.theme-toggle .tg-glyph{display:block}

/* ============================================================= layout */
.wrap{max-width:1320px;margin:0 auto;padding:20px 18px 80px}
section.block{margin:30px 0;scroll-margin-top:58px}
.block-h{display:flex;align-items:baseline;gap:12px;margin:0 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.block-h .num{font-family:var(--mono);font-size:12px;color:var(--acc);opacity:.8}
.block-h h2{font-size:16px;font-weight:650;letter-spacing:.2px}
.block-h .hint{font-size:11.5px;color:var(--mut2);margin-left:auto}
.grid{display:grid;gap:14px}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
  border-radius:12px;padding:15px 16px}
.card h3{font-size:12px;color:var(--mut);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.muted{color:var(--mut)}
.mono{font-family:var(--mono)}
.tiny{font-size:11px}
.nowrap{white-space:nowrap}
.na{color:var(--mut2);font-style:italic}

/* pills / chips */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11px;
  border:1px solid var(--line2);color:var(--ink2);background:var(--chip-bg);white-space:nowrap}
.pill.ok{color:var(--ok);border-color:var(--ok-bd);background:var(--okbg)}
.pill.warn{color:var(--warn);border-color:var(--warn-bd);background:var(--warnbg)}
.pill.bad{color:var(--bad);border-color:var(--bad-bd);background:var(--badbg)}
.pill.acc{color:var(--acc);border-color:var(--acc-bd);background:var(--acc-bg)}
.pill .led{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}

/* ============================================================= header strip */
.hero{display:grid;grid-template-columns:1.5fr auto;gap:16px;align-items:stretch;
  background:linear-gradient(135deg,var(--hero-a),var(--hero-b));border:1px solid var(--line2);border-radius:16px;padding:20px 22px;
  position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:
   repeating-linear-gradient(90deg,transparent,transparent 38px,var(--hero-stripe) 39px,transparent 40px);
   pointer-events:none}
.hero .teamname{font-size:24px;font-weight:750;letter-spacing:.2px;line-height:1.15}
.hero .stageline{margin-top:7px;color:var(--ink2);font-size:13.5px}
.hero .metarow{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.hero .right{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-width:150px}
.count{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--gold);line-height:1}
.count.racing{color:var(--ok)}
.count-lbl{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut)}
.jobs-strip{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.jobpill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:11px;
  background:var(--jobpill-bg);border:1px solid var(--line)}
.jobpill .led{width:8px;height:8px;border-radius:50%}
.jobpill.ok .led{background:var(--ok);box-shadow:0 0 7px var(--ok)}
.jobpill.warn .led{background:var(--warn);box-shadow:0 0 7px var(--warn)}
.jobpill.bad .led{background:var(--bad);box-shadow:0 0 7px var(--bad)}
.jobpill .lx{color:var(--mut2);font-family:var(--mono)}

/* gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center}
.gauge-cap{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);margin-top:2px}

/* ============================================================= team cards */
.team-summary{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-bottom:6px}
.team-summary .stat{display:flex;flex-direction:column}
.team-summary .stat .v{font-family:var(--mono);font-size:18px;font-weight:650;color:var(--ink)}
.team-summary .stat .l{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut)}
.budgetbar{height:8px;border-radius:5px;background:var(--bar-bg);border:1px solid var(--line);overflow:hidden;min-width:200px;flex:1}
.budgetbar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc2),var(--cyan))}
.squad{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;margin-top:14px}
.rider{position:relative;border:1px solid var(--line);border-radius:12px;padding:12px 13px;
  background:linear-gradient(180deg,var(--panel),var(--panel2));border-left:4px solid var(--tc,var(--tc-default))}
.rider.captain{box-shadow:0 0 0 1px var(--gold) inset, 0 4px 18px var(--cap-glow)}
.rider .crown{position:absolute;top:-9px;right:11px;font-size:13px;background:var(--gold);color:var(--crown-ink);
  padding:1px 8px;border-radius:999px;font-weight:700;letter-spacing:.5px}
.rider .rn{font-weight:650;font-size:14.5px}
.rider .rt{font-size:11px;color:var(--mut);margin-top:1px}
.rider .price{float:right;font-family:var(--mono);font-size:13px;color:var(--cyan);font-weight:600}
.rider .subgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;margin-top:9px;font-size:11.5px}
.rider .subgrid b{color:var(--mut);font-weight:500}
.rider .subgrid span{font-family:var(--mono);text-align:right;color:var(--ink2)}
.rider .srcline{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.srctag{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;padding:1px 6px;border-radius:4px;
  background:var(--acc-bg);border:1px solid var(--line2);color:var(--acc)}
.conf-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.rider.nodata{opacity:.72}
.rider.floor{border-left-color:var(--warn)}
.rider.floor .subgrid span{color:var(--mut2)}
.rider .gap{font-size:10.5px;color:var(--warn);margin-top:8px;font-style:italic}
.rider .floornote{font-size:10.5px;color:var(--warn);line-height:1.45;margin-top:9px;
  background:var(--warnbg);border:1px solid var(--warn-bd);border-radius:7px;padding:6px 8px}

/* ============================================================= roster rationale (slots) */
.slot-note{font-size:12.5px;line-height:1.65;color:var(--ink2);background:var(--chip-bg);border:1px solid var(--line);
  border-left:3px solid var(--acc);border-radius:10px;padding:12px 15px;margin-bottom:13px}
.slot-summary{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px}
.slotwrap{display:grid;gap:9px;margin-top:2px}
.slot{display:grid;grid-template-columns:190px 1fr 1fr 128px;gap:15px;align-items:center;
  border:1px solid var(--line);border-radius:11px;padding:10px 14px;background:var(--chip-bg);border-left:3px solid var(--mut2)}
.slot.anchor{border-left-color:var(--ok)}
.slot.value{border-left-color:var(--cyan)}
.slot.solid{border-left-color:var(--acc)}
.slot.spec{border-left-color:var(--bad)}
.slot.floor{border-left-color:var(--warn)}
.slot.cap{box-shadow:0 0 0 1px var(--cap-inset) inset}
.slot.nodata{opacity:.72}
.slot .sn{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.slot .sn b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot .sn small{color:var(--mut2);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot .capstar{color:var(--gold)}
.slotmetric{display:flex;flex-direction:column;gap:4px;min-width:0}
.slotmetric .ml{font-size:9.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--mut);
  display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.slotmetric .ml .rk{font-family:var(--mono);color:var(--ink2);text-transform:none;letter-spacing:0}
.slotbar{height:8px;border-radius:5px;background:var(--bar-bg);border:1px solid var(--line);overflow:hidden}
.slotbar i{display:block;height:100%;border-radius:4px}
.slotbar i.eh{background:linear-gradient(90deg,var(--acc2),var(--cyan))}
.slotbar i.roi{background:linear-gradient(90deg,var(--violet),var(--acc))}
.slot .role{font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:999px;white-space:nowrap;text-align:center;
  border:1px solid var(--line2);color:var(--ink2);background:var(--bar-bg)}
.slot.anchor .role{color:var(--ok);background:var(--okbg);border-color:var(--ok-bd)}
.slot.value .role{color:var(--cyan);background:var(--value-bg);border-color:var(--value-bd)}
.slot.solid .role{color:var(--acc);background:var(--acc-bg);border-color:var(--acc-bd)}
.slot.spec .role{color:var(--bad);background:var(--badbg);border-color:var(--bad-bd)}
.slot.floor .role{color:var(--warn);background:var(--warnbg);border-color:var(--warn-bd)}
.slot .spanmid{grid-column:2/4;font-size:11.5px;line-height:1.5}

/* ============================================================= captain pick */
.capwrap{display:grid;gap:9px;margin-top:4px}
.caprow{display:grid;grid-template-columns:175px 1fr 92px;gap:11px;align-items:center;font-size:12.5px}
.caprow .cn{display:flex;flex-direction:column;line-height:1.25;overflow:hidden}
.caprow .cn b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.caprow .cn small{color:var(--mut2);font-size:10.5px}
.caprow .ctrack{height:20px;border-radius:6px;background:var(--bar-bg);border:1px solid var(--line);overflow:hidden}
.caprow .ctrack i{display:block;height:100%;background:linear-gradient(90deg,var(--mut2),var(--mut));border-radius:5px}
.caprow.chosen .ctrack i{background:linear-gradient(90deg,var(--cap-track-a),var(--gold))}
.caprow.chosen .cn b{color:var(--gold)}
.caprow .cval{font-family:var(--mono);text-align:right;color:var(--ink2)}
.cap-callout{font-size:13px;line-height:1.6;background:var(--chip-bg);border:1px solid var(--line);border-left:3px solid var(--gold);
  border-radius:10px;padding:12px 15px;margin-bottom:14px;color:var(--ink2)}
.cap-nodata{font-size:11.5px;color:var(--mut);margin-top:11px;font-style:italic}

/* ============================================================= results — realized value growth */
.res-hero{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px 18px;margin-bottom:6px}
.res-big{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1;letter-spacing:-.5px}
.res-big.pos{color:var(--ok)} .res-big.neg{color:var(--bad)}
.res-hero .lbl{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.res-sub{font-size:12px;color:var(--mut2);font-family:var(--mono);margin-top:2px}
.res-note{font-size:12.5px;line-height:1.65;color:var(--ink2);background:var(--chip-bg);border:1px solid var(--line);
  border-left:3px solid var(--ok);border-radius:10px;padding:12px 15px;margin:13px 0}
.res-note.cap{border-left-color:var(--gold)}
.res-note.warn{border-left-color:var(--warn)}
.res-summary{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
.reswrap{display:grid;gap:7px;margin-top:4px}
.resrow{display:grid;grid-template-columns:180px 1fr 118px;gap:14px;align-items:center;
  border:1px solid var(--line);border-radius:10px;padding:8px 13px;background:var(--chip-bg);border-left:3px solid var(--mut2)}
.resrow.pos{border-left-color:var(--ok)} .resrow.neg{border-left-color:var(--bad)} .resrow.flat{border-left-color:var(--mut2)}
.resrow.cap{box-shadow:0 0 0 1px var(--cap-inset) inset}
.resrow .rn{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.resrow .rn b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resrow .rn small{color:var(--mut2);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resrow .capstar{color:var(--gold)}
.restrack{position:relative;height:18px;border-radius:5px;background:var(--bar-bg);border:1px solid var(--line);overflow:hidden}
.restrack .zero{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line2);z-index:1}
.restrack i{position:absolute;top:2px;bottom:2px;border-radius:3px}
.restrack i.pos{background:linear-gradient(90deg,var(--ok),var(--cyan))}
.restrack i.neg{background:linear-gradient(270deg,var(--bad),var(--warn))}
.resrow .rg{font-family:var(--mono);text-align:right;font-size:12.5px;display:flex;flex-direction:column;align-items:flex-end;line-height:1.2}
.resrow .rg.pos{color:var(--ok)} .resrow .rg.neg{color:var(--bad)} .resrow .rg.flat{color:var(--ink2)}
.resrow .rg small{color:var(--mut2);font-size:9.5px;font-family:var(--mono)}
@media(max-width:640px){.resrow{grid-template-columns:120px 1fr 84px;gap:9px}}
/* per-stage portfolio trajectory (results sub-block) */
.traj{margin:15px 0 4px;border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:var(--chip-bg)}
.traj-h{font-size:13px;font-weight:650;color:var(--ink)}
.traj-sub{font-size:11.5px;color:var(--mut2);font-family:var(--mono);margin:2px 0 10px}
.traj-svg{width:100%;height:96px;display:block;overflow:visible}
.traj-cells{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:5px;margin-top:9px}
.traj-cell{text-align:center;border-top:1px solid var(--line);padding-top:6px;min-width:0}
.traj-cell .ts{font-family:var(--mono);font-size:10px;color:var(--mut);font-weight:700;letter-spacing:.3px}
.traj-cell .td{font-family:var(--mono);font-size:11px;font-weight:700;margin:2px 0;white-space:nowrap}
.traj-cell .td.pos{color:var(--ok)} .traj-cell .td.neg{color:var(--bad)} .traj-cell .td.flat{color:var(--mut2)}
.traj-cell .tc{font-size:9.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.traj-cell .tc.chg{color:var(--gold);font-weight:650}
.traj-cell.dup{opacity:.5}
.traj-cell .tdup{font-size:9px;color:var(--warn);font-family:var(--mono)}
/* captain-bonus ledger (results sub-block) */
.cledge{margin:15px 0 4px;border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:var(--chip-bg)}
.cl-h{font-size:13px;font-weight:650;color:var(--ink)}
.cl-h .cl-tot{font-family:var(--mono);font-weight:700;color:var(--ok)}
.cl-sub{font-size:11.5px;color:var(--mut2);margin:2px 0 10px;line-height:1.5}
.cl-rows{display:grid;gap:6px}
.cl-row{display:grid;grid-template-columns:82px 128px 74px 1fr;gap:11px;align-items:center;
  border:1px solid var(--line);border-radius:9px;padding:6px 11px;background:var(--bg);border-left:3px solid var(--mut2)}
.cl-row.pos{border-left-color:var(--gold)} .cl-row.flat{border-left-color:var(--mut2);opacity:.72}
.cl-st{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink2);display:flex;flex-direction:column;gap:1px}
.cl-merge{font-size:8.5px;font-weight:600;color:var(--warn);font-family:var(--mono);text-transform:uppercase;letter-spacing:.3px}
.cl-cap{font-size:11.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-cap.rot{color:var(--gold);font-weight:600}
.cl-b{font-family:var(--mono);font-size:12.5px;font-weight:700;text-align:right}
.cl-b.pos{color:var(--ok)} .cl-b.flat{color:var(--mut2)}
.cl-v{font-size:11px;line-height:1.35}
.cl-v.ok{color:var(--ok)} .cl-v.warn{color:var(--warn)} .cl-v.mut{color:var(--mut2)}
.cl-method{color:var(--mut2);font-size:11px}
@media(max-width:640px){.cl-row{grid-template-columns:64px 1fr 64px;grid-auto-rows:min-content}.cl-row .cl-v{grid-column:1/-1}}

/* ============================================================= standing (rank vs the field) */
.stand-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
@media(max-width:640px){.stand-grid{grid-template-columns:1fr}}
.stand-panel{background:var(--chip-bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.stand-panel h4{margin:0 0 8px;font-size:11.5px;letter-spacing:.2px;color:var(--ink2);font-weight:650}
.stand-panel h4 .sub{color:var(--mut);font-weight:400}
.edge-row{display:grid;grid-template-columns:116px 1fr 46px;align-items:center;gap:8px;margin:5px 0;font-size:11px}
.edge-row .en{color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.edge-row .en.own{color:var(--ok);font-weight:600}
.edge-track{height:9px;background:var(--bar-bg);border:1px solid var(--line);border-radius:5px;overflow:hidden}
.edge-track i{display:block;height:100%}
.edge-track.load i{background:var(--acc)}
.edge-track.fade i{background:var(--bad)}
.edge-row .ev{font-family:var(--mono);text-align:right;color:var(--mut2)}
.edge-row.own .ev{color:var(--ok)}

/* ============================================================= candor */
.candor-intro{font-size:12.5px;line-height:1.6;color:var(--mut);margin:0 0 14px}
.candor-list{display:grid;gap:10px}
.candor{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start;border:1px solid var(--line);
  border-left:3px solid var(--mut);border-radius:11px;padding:11px 14px 12px;background:var(--chip-bg)}
.candor.sev-high{border-left-color:var(--bad);background:var(--sevhigh-bg)}
.candor.sev-med{border-left-color:var(--warn);background:var(--sevmed-bg)}
.candor.sev-low{border-left-color:var(--cyan)}
.candor .sev-tag{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 7px;border-radius:6px;align-self:start;white-space:nowrap}
.candor.sev-high .sev-tag{color:var(--bad);background:var(--badbg);border:1px solid var(--bad-bd)}
.candor.sev-med .sev-tag{color:var(--warn);background:var(--warnbg);border:1px solid var(--warn-bd)}
.candor.sev-low .sev-tag{color:var(--cyan);background:var(--value-bg);border:1px solid var(--value-bd)}
.candor .c-title{font-size:13.5px;font-weight:650;color:var(--ink)}
.candor .c-title .c-metric{font-family:var(--mono);font-weight:700;margin-left:7px}
.candor .c-detail{font-size:12.5px;line-height:1.6;color:var(--mut);margin-top:4px}
.candor-clear{font-size:13px;color:var(--ok);background:var(--okbg);border:1px solid var(--ok-bd);
  border-radius:10px;padding:12px 15px}

/* ============================================================= decision */
.decision-summary{font-size:14px;line-height:1.7;color:var(--ink2);background:var(--chip-bg);border:1px solid var(--line);
  border-left:3px solid var(--acc);border-radius:10px;padding:14px 16px;margin-bottom:14px}
/* plan-vs-live reconciliation — is the planned team actually the one the bot holds? */
.recon{border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:14px;background:var(--chip-bg)}
.recon.applied{border-left:3px solid var(--ok);background:var(--okbg)}
.recon.drift{border-left:3px solid var(--warn);background:var(--warnbg)}
.recon .rh{font-size:13.5px;font-weight:650;margin-bottom:4px}
.recon.applied .rh{color:var(--ok)}
.recon.drift .rh{color:var(--warn)}
.recon .rsub{font-size:12px;color:var(--ink2);line-height:1.55;margin-bottom:12px}
.recon .capcmp{display:flex;flex-wrap:wrap;gap:9px;align-items:stretch;margin-bottom:13px}
.recon .capcmp .cc{display:flex;flex-direction:column;gap:1px;border:1px solid var(--line2);border-radius:8px;padding:6px 11px;background:var(--bar-bg)}
.recon .capcmp .cc small{font-size:9px;letter-spacing:.7px;text-transform:uppercase;color:var(--mut)}
.recon .capcmp .cc b{font-size:13px}
.recon .capcmp .verd{align-self:center;font-size:11.5px;font-weight:600}
.recon .capcmp .verd.ok{color:var(--ok)}.recon .capcmp .verd.warn{color:var(--warn)}
.recon .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:11px}
.recon .col h4{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);margin:0 0 6px;font-weight:600;display:flex;gap:6px;align-items:center}
.recon .col h4 .cnt{font-family:var(--mono);color:var(--ink2)}
.recon .col .nm{font-size:12px;padding:4px 0;border-bottom:1px dashed var(--line);display:flex;align-items:center;gap:7px;color:var(--ink2)}
.recon .col .nm:last-child{border-bottom:0}
.recon .dot2{width:6px;height:6px;border-radius:50%;flex:none}
.recon .col.held .dot2{background:var(--ok)}
.recon .col.buy .dot2{background:var(--cyan)}
.recon .col.sell .dot2{background:var(--bad)}
.recon .col .star{color:var(--gold);font-size:11px}
.swaps{display:grid;gap:11px}
.swap{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;border:1px solid var(--line);
  border-radius:11px;padding:12px 14px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.swap .flow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:14px;font-weight:600}
.swap .sell{color:var(--bad)}.swap .buy{color:var(--ok)}
.swap .arrow{color:var(--mut);font-family:var(--mono)}
.swap .why{grid-column:1/-1;font-size:12.5px;color:var(--mut);line-height:1.6;margin-top:7px}
.swap .meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;white-space:nowrap}
.swap .ev{font-family:var(--mono);font-size:12px;color:var(--cyan)}
/* swap ledger — the sold→bought head-to-head pulled live from the EV substrate (backs the prose in numbers) */
.swap .ledger{grid-column:1/-1;margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.swap .lmet{background:var(--bar-bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;min-width:0}
.swap .lmet .lm-l{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);margin-bottom:3px}
.swap .lmet .lm-v{font-family:var(--mono);font-size:11.5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.swap .lmet .lm-v .sv{color:var(--mut2)}
.swap .lmet .lm-v .arrow{color:var(--mut2)}
.swap .lmet .up{color:var(--ok)}.swap .lmet .dn{color:var(--bad)}.swap .lmet .flat{color:var(--ink2)}.swap .lmet .frees{color:var(--cyan)}
.swap .fl{font-size:8.5px;letter-spacing:.3px;color:var(--warn);border:1px solid var(--floor-bd);background:var(--floor-bg);border-radius:3px;padding:0 4px;margin-left:4px;vertical-align:middle}
.ledger-note{font-size:12px;line-height:1.55;color:var(--ink2);background:var(--chip-bg);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:9px;padding:9px 13px;margin:0 0 11px}
@media(max-width:560px){.swap .ledger{grid-template-columns:1fr}}
.chip-conf{font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:999px}
.chip-conf.high{color:var(--ok);background:var(--okbg);border:1px solid var(--ok-bd)}
.chip-conf.med{color:var(--warn);background:var(--warnbg);border:1px solid var(--warn-bd)}
.chip-conf.low{color:var(--bad);background:var(--badbg);border:1px solid var(--bad-bd)}
.target-team{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tt-chip{font-size:11px;padding:2px 9px;border-radius:7px;background:var(--acc-bg);border:1px solid var(--line2)}
.tt-chip.cap{border-color:var(--gold);color:var(--gold)}
/* target-team SHAPE — the picks grouped by real-world squad (the "2-up" structure that IS the rationale) */
.shape-note{font-size:12.5px;line-height:1.62;color:var(--ink2);background:var(--chip-bg);border:1px solid var(--line);
  border-left:3px solid var(--cyan);border-radius:10px;padding:11px 14px;margin:2px 0 12px}
.shape-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px}
.squadcard{border:1px solid var(--line);border-radius:11px;padding:11px 13px;
  background:linear-gradient(180deg,var(--panel),var(--panel2));border-top:3px solid var(--sc,var(--tc-default))}
.squadcard.pair{box-shadow:0 0 0 1px var(--pair-inset) inset}
.squadcard.nomatch{opacity:.72;border-style:dashed}
.squadcard .sq-h{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:8px}
.squadcard .sq-name{font-size:11.5px;font-weight:650;color:var(--ink);line-height:1.25}
.squadcard .sq-badge{font-family:var(--mono);font-size:9.5px;letter-spacing:.4px;color:var(--mut2);white-space:nowrap;
  padding:1px 6px;border-radius:5px;border:1px solid var(--line2)}
.squadcard .sq-badge.pair{color:var(--cyan);border-color:var(--value-bd);background:var(--value-bg)}
.squadcard .sq-rider{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;
  padding:4px 0;border-bottom:1px dashed var(--line)}
.squadcard .sq-rider:last-child{border-bottom:0}
.squadcard .sq-rider .rnm{display:flex;align-items:center;gap:6px;min-width:0}
.squadcard .sq-rider .rnm b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.squadcard .sq-rider .rv{font-family:var(--mono);color:var(--cyan);font-size:11.5px;white-space:nowrap}
.squadcard .sq-rider .caps{color:var(--gold)}
.squadcard .sq-rider.floor .rnm b{color:var(--mut)}
.sq-floor{font-size:9px;color:var(--warn);border:1px solid var(--floor-bd);background:var(--floor-bg);border-radius:4px;
  padding:1px 5px;letter-spacing:.3px;white-space:nowrap}

/* ============================================================= tables */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
table{border-collapse:collapse;width:100%;font-size:12px}
thead th{position:sticky;top:0;background:var(--thead-bg);color:var(--mut);font-weight:600;text-align:left;
  padding:8px 10px;border-bottom:1px solid var(--line2);white-space:nowrap;cursor:default;letter-spacing:.3px;z-index:1}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{color:var(--ink)}
thead th .ar{opacity:.4;font-size:9px;margin-left:3px}
thead th.act .ar{opacity:1;color:var(--acc)}
tbody td{padding:6px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr:hover{background:var(--row-hover)}
td.r,th.r{text-align:right;font-family:var(--mono)}
tbody tr.owned{background:var(--owned-bg)}
tbody tr.owned:hover{background:var(--owned-bg2)}
tbody tr.owned td:first-child{box-shadow:inset 3px 0 0 var(--acc)}
tbody tr.out td:first-child::after{content:"DNS";margin-left:6px;font-size:9px;color:var(--bad);
  border:1px solid var(--bad);border-radius:4px;padding:0 4px;vertical-align:middle}
.explorer-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px}
.explorer-bar input[type=text]{background:var(--bar-bg);border:1px solid var(--line2);border-radius:8px;color:var(--ink);
  padding:7px 11px;font-size:13px;min-width:220px;font-family:var(--sans)}
.explorer-bar input::placeholder{color:var(--mut2)}
.explorer-bar label{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px;cursor:pointer}
.explorer-bar .count-tag{font-size:11px;color:var(--mut2);font-family:var(--mono);margin-left:auto}

/* sparkbar in tables */
.spark{display:inline-block;height:9px;border-radius:3px;background:linear-gradient(90deg,var(--acc2),var(--cyan));
  vertical-align:middle;min-width:1px}
.sparkbg{display:inline-block;width:46px;height:9px;border-radius:3px;background:var(--bar-bg);border:1px solid var(--line);
  vertical-align:middle;overflow:hidden;margin-right:6px}
.confcell{display:flex;align-items:center;gap:6px;justify-content:flex-end}

/* provenance / floor signalling in the EV explorer */
.src-chip{display:inline-block;font-family:var(--mono);font-size:9.5px;line-height:1;padding:2px 5px;border-radius:4px;
  border:1px solid var(--srcchip-bd);background:var(--srcchip-bg);color:var(--cyan);margin-right:3px;letter-spacing:.3px}
.floor-tag{display:inline-block;font-size:9.5px;line-height:1;padding:2px 5px;border-radius:4px;
  border:1px solid var(--floor-bd);background:var(--floor-bg);color:var(--warn);letter-spacing:.3px;white-space:nowrap}
tbody tr.floorrow td{color:var(--mut)}
tbody tr.floorrow .sparkbg{opacity:.45}
tbody tr.floorrow td:first-child{box-shadow:inset 3px 0 0 var(--floor-bd)}
tbody tr.floorrow.owned td:first-child{box-shadow:inset 3px 0 0 var(--warn)}
.evlegend{font-size:11px;color:var(--mut);margin:2px 0 10px;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center}
.evlegend b{color:var(--warn);font-weight:600}

/* ============================================================= stage */
.stage-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:14px}
.radar-wrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.tw-bars{flex:1;min-width:200px;display:grid;gap:6px}
.tw-row{display:grid;grid-template-columns:74px 1fr 42px;gap:8px;align-items:center;font-size:12px}
.tw-row .lbl{color:var(--mut);text-transform:capitalize}
.tw-row .bar{height:9px;border-radius:5px;background:var(--bar-bg);border:1px solid var(--line);overflow:hidden}
.tw-row .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--violet),var(--acc))}
.tw-row .val{font-family:var(--mono);text-align:right;color:var(--ink2)}
.upcoming{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.ustage{flex:1;min-width:130px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
  background:linear-gradient(180deg,var(--panel),var(--panel2))}
.ustage .sn{font-family:var(--mono);font-size:11px;color:var(--mut)}
.ustage .ic{font-size:20px;margin:2px 0}
.ustage .ty{font-size:12px;font-weight:600;text-transform:capitalize}
.ustage .rt{font-size:10.5px;color:var(--mut);margin-top:3px}
.ustage.summit{border-color:var(--warn-bd)}
.ustage .summitflag{font-size:9.5px;color:var(--warn);letter-spacing:.5px}
/* swap cadence / block rhythm strip */
.cadence{display:flex;align-items:stretch;flex-wrap:wrap;gap:0;margin-top:4px}
.cad-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:62px;
  border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.cad-stage.here{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc) inset}
.cad-stage .cs-n{font-family:var(--mono);font-size:10px;color:var(--mut)}
.cad-stage .cs-ic{font-size:17px;line-height:1.2}
.cad-stage .cs-ty{font-size:10px;font-weight:600;text-transform:capitalize;color:var(--ink2)}
.cad-link{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:74px;padding:0 4px;position:relative}
.cad-link .cl-line{height:2px;width:100%;border-radius:2px;background:var(--line2)}
.cad-link .cl-lbl{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:4px;white-space:nowrap}
.cad-link.hard .cl-line{background:var(--bad)}
.cad-link.hard .cl-lbl{color:var(--bad)}
.cad-link.soft .cl-line{background:var(--gold)}
.cad-link.soft .cl-lbl{color:var(--gold)}
.cad-link.hold .cl-line{background:var(--line2);opacity:.7}
.cad-link.hold .cl-lbl{color:var(--mut)}

/* ============================================================= brain journal */
.journal{display:grid;gap:9px}
.entry{display:grid;grid-template-columns:auto 1fr;gap:12px;border-left:3px solid var(--mut2);padding:9px 0 9px 13px}
.entry.HELD{border-color:var(--mut)}
.entry.ACTED{border-color:var(--ok)}
.entry .ts{font-family:var(--mono);font-size:11px;color:var(--mut2);white-space:nowrap}
.entry .act{font-size:10px;font-weight:700;letter-spacing:.8px;padding:1px 7px;border-radius:5px;height:fit-content}
.entry .act.HELD{background:var(--held-bg);color:var(--mut)}
.entry .act.ACTED{background:var(--okbg);color:var(--ok)}
.entry .txt{font-size:12.5px;color:var(--ink2);line-height:1.55}
.entry .head{display:flex;align-items:center;gap:9px;margin-bottom:3px}

/* ============================================================= improve */
.imp-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.metric{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.metric .v{font-family:var(--mono);font-size:22px;font-weight:700}
.metric .l{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-top:2px}
.metric.pos .v{color:var(--ok)}.metric.neg .v{color:var(--bad)}

/* ============================================================= 00 overview (scoped) */
#overview .ov-mast{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
#overview .ov-mast .teamname{font-size:20px;font-weight:750;letter-spacing:.2px;line-height:1.15}
#overview .ov-mast .ov-left{display:flex;align-items:center;gap:11px;flex-wrap:wrap;min-width:0}
#overview .ov-mast .ov-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#overview .ov-verdict{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.6px;padding:3px 10px;border-radius:7px}
#overview .metric .v{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#overview .metric .sub{font-size:11px;color:var(--mut2);margin-top:3px;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#overview .ov-ribbon{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
  display:flex;flex-wrap:wrap;gap:7px;align-items:center}
#overview .ov-ribbon .ov-badge{font-family:var(--mono);font-size:11px;font-weight:700;margin-right:3px}
.gate-explain{font-size:13px;line-height:1.6;background:var(--chip-bg);border:1px solid var(--line);border-left:3px solid var(--warn);
  border-radius:10px;padding:12px 15px;margin-bottom:14px;color:var(--ink2)}
.fold-bars{display:grid;gap:8px}
.fold-row{display:grid;grid-template-columns:60px 1fr 64px;gap:10px;align-items:center;font-size:12px}
.fold-row .yr{font-family:var(--mono);color:var(--mut)}
.fold-track{position:relative;height:18px;background:var(--bar-bg);border:1px solid var(--line);border-radius:5px;overflow:hidden}
.fold-track .zero{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line2)}
.fold-track i{position:absolute;top:2px;bottom:2px;border-radius:3px}
.fold-track i.pos{background:var(--ok);left:50%}
.fold-track i.neg{background:var(--bad);right:50%}
.fold-row .pc{font-family:var(--mono);text-align:right}
.fold-row .pc.pos{color:var(--ok)}.fold-row .pc.neg{color:var(--bad)}

/* ============================================================= run log */
.runlog{display:grid;gap:5px}
.run{display:grid;grid-template-columns:130px 86px 1fr;gap:10px;align-items:center;font-size:12px;
  padding:5px 10px;border-radius:7px;background:var(--chip-bg);border:1px solid var(--line)}
.run .when{font-family:var(--mono);color:var(--mut2);font-size:11px}
.run .phase{font-size:10px;letter-spacing:.5px;text-transform:uppercase;text-align:center;padding:2px 0;border-radius:5px;font-weight:600}
.run .msg{color:var(--ink2);font-family:var(--mono);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phase.ph-collect{background:var(--acc-bg);color:var(--acc)}
.phase.ph-verify{background:var(--okbg);color:var(--ok)}
.phase.ph-improve{background:var(--phase-improve-bg);color:var(--violet)}
.phase.ph-other{background:var(--held-bg);color:var(--mut)}
.run.st-warn{border-color:var(--warn-bd)}.run.st-warn .msg{color:var(--warn)}
.run.st-err{border-color:var(--bad-bd)}.run.st-err .msg{color:var(--bad)}
.run.st-noop{opacity:.7}
details.collapse{margin-top:12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}
details.collapse>summary{padding:10px 14px;cursor:pointer;font-size:12.5px;color:var(--acc);font-weight:600;list-style:none}
details.collapse>summary::-webkit-details-marker{display:none}
details.collapse>summary::before{content:"▸ ";color:var(--mut)}
details.collapse[open]>summary::before{content:"▾ "}
.logtail{font-family:var(--mono);font-size:11px;color:var(--mut);background:var(--logtail-bg);padding:10px 14px;margin:0;
  white-space:pre-wrap;border-top:1px solid var(--line);max-height:280px;overflow:auto;line-height:1.5}
.logtail .lt-h{color:var(--cyan)}

/* ============================================================= sources */
.chan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:11px;margin-bottom:14px}
.chan{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.chan.dark{opacity:.65}
.chan .ch-h{display:flex;align-items:center;justify-content:space-between;gap:8px}
.chan .ch-name{font-weight:600;font-size:13px}
.chan .ch-note{font-size:11.5px;color:var(--mut);margin-top:6px}
.fw-table{font-size:12px}
.fw-table td{padding:4px 10px}

/* ============================================================= strategy / glossary */
.tendencies{list-style:none;padding:0;margin:10px 0 0;display:grid;gap:8px}
.tendencies li{position:relative;padding-left:22px;font-size:13px;color:var(--ink2);line-height:1.55}
.tendencies li::before{content:"▸";position:absolute;left:4px;color:var(--acc)}
.gloss{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:11px}
.gterm{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.gterm .gt{font-family:var(--mono);font-size:12.5px;color:var(--cyan);font-weight:600;margin-bottom:4px}
.gterm .gd{font-size:12px;color:var(--mut);line-height:1.5}

/* tooltips */
.info{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;
  border:1px solid var(--mut2);color:var(--mut);font-size:9px;cursor:help;margin-left:5px;vertical-align:middle;
  position:relative;font-style:normal;font-weight:700}
.info:hover{color:var(--acc);border-color:var(--acc)}
.info:hover::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);
  background:var(--tip-bg);border:1px solid var(--line2);color:var(--tip-ink);font-size:11px;font-weight:400;
  padding:7px 10px;border-radius:7px;width:240px;line-height:1.45;z-index:80;white-space:normal;text-align:left;
  box-shadow:0 8px 24px var(--tip-shadow)}

.banner{border:1px solid var(--bad-bd);background:var(--badbg);color:var(--bad);border-radius:10px;padding:11px 14px;
  margin-bottom:14px;font-size:13px}
.banner.warn{border-color:var(--warn-bd);background:var(--warnbg);color:var(--warn)}
.banner.note{border-color:var(--acc-bd);background:var(--chip-bg);color:inherit;border-left:3px solid var(--acc)}

/* ---- pipeline flow: how a pick is manufactured (sources → … → result) ---- */
.pipe{display:flex;align-items:stretch;flex-wrap:wrap;gap:7px 0}
.pipe-node{flex:1 1 158px;min-width:150px;text-decoration:none;color:inherit;
  background:var(--chip-bg);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:9px;
  padding:9px 11px;display:flex;flex-direction:column;gap:2px;transition:border-color .12s,transform .12s}
.pipe-node:hover{border-color:var(--acc-bd);transform:translateY(-1px);text-decoration:none}
.pipe-arrow{display:flex;align-items:center;justify-content:center;color:var(--mut2);font-size:15px;
  padding:0 5px;flex:0 0 auto;user-select:none}
.pipe-step{font-family:var(--mono);font-size:9.5px;color:var(--mut2);letter-spacing:.5px}
.pipe-label{font-size:10.5px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.pipe-val{font-size:13px;font-weight:650;color:var(--ink);line-height:1.25}
.pipe-sub{font-size:10px;color:var(--mut);line-height:1.4;margin-top:1px}
.pipe-note{margin-top:13px;font-size:12px;line-height:1.6;color:var(--ink2);
  border-left:3px solid var(--gold);background:var(--floor-bg);border-radius:0 8px 8px 0;padding:9px 13px}
.pipe-note b{color:var(--ink)}
@media (max-width:720px){
  .pipe{flex-direction:column}
  .pipe-arrow{transform:rotate(90deg);padding:2px 0}
}

footer{text-align:center;color:var(--mut2);font-size:11px;margin-top:50px;padding-top:20px;border-top:1px solid var(--line)}

@media (max-width:900px){
  .hero{grid-template-columns:1fr}
  .stage-grid{grid-template-columns:1fr}
  .swap{grid-template-columns:1fr}
  .swap .meta{flex-direction:row;align-items:center}
}

e":18611275,"cand":18657319,"pct":0.25},{"year":2025,"base":18433981,"cand":18362871,"pct":-0.39}],"noFoldRegresses":false},"weightChanges":[{"knob":"starWeight","from":30,"to":10},{"knob":"stageProbWeight","from":200,"to":170},{"knob":"gcBaseWeight","from":100,"to":120},{"knob":"byType.itt.gc","from":250,"to":220},{"knob":"byType.flat.gc","from":40,"to":100},{"knob":"byType.flat.stageProb","from":120,"to":60}],"autopsy":{"stats":{"stages":84,"captainMissPct":32,"captainAvgRegret":27024,"captainWorstType":"flat (avg regret 42619)","breadthByType":{"itt":4.29,"flat":2.71,"hilly":2.83,"mountain":3.37},"breadthWorst":"flat (2.71/8)","swapsPerStage":1.27,"heavyChurnStages":0,"invalidTeams":0},"findings":[{"area":"captain","severity":"med","detail":"Captain miss on 32% of stages (avg 27024 kr left; worst: flat (avg regret 42619)). Tighten captain selection on flat stages."}]},"verdict":{"ok":false,"reasons":["no change proposed"]},"mergeGateExplanation":"Held (not merged): the conjunctive gate (in-sample ≥ MIN AND held-out ≥ MIN AND no fold regresses) was not met — held-out is -0.23% (must be positive / above floor); at least one cross-val fold regressed; no change proposed."},"sources":{"channels":[{"name":"betxpert.stageOdds","label":"Stage odds (betxpert)","live":false,"coverageNote":"JS-rendered / not live pre-race"},{"name":"betxpert.gcOdds","label":"GC win odds (betxpert)","live":false,"coverageNote":"0 quoted"},{"name":"axelgaard.favorites","label":"Star ratings (Axelgaard)","live":true,"coverageNote":"39 rated"},{"name":"pcs.uciPoints","label":"UCI season points (PCS)","live":false,"coverageNote":"0 riders"},{"name":"feltet","label":"Stage tip (feltet)","live":false,"coverageNote":"none"}],"matchRate":0.20689655172413793,"fusionWeightsSummary":{"channelBase":{"stageOdds":1,"gcOdds":0.7,"stars":0.6,"uci":0.5,"ctc":0.36,"feltet":0.35},"byTypeCurrent":{"stageOdds":1.3,"gcOdds":0,"stars":0.85,"uci":0.3,"feltet":0.5},"gcWeight":1,"uciGcWeight":0.5,"note":"loop-tunable tive EV."},{"term":"efficiency","definition":"High/med/low tercile bucket of roi_per_million across the live (non-DNS) field — a quick-read value tag."},{"term":"captain_ceiling","definition":"E[max(0, Δkr)] right-tail if this rider is captained this stage — the win windfall + placement upside + positive passive floor. Captain the owned rider with the highest one."},{"term":"p_stage","definition":"Fused stage-win probability (de-vigged odds + star/UCI/feltet signals via a weighted geometric pool), normalised so the board ~sums to 1."},{"term":"p_top15","definition":"Fused probability of finishing in the stage top-15 (p_stage expanded by a per-stage-type exponent). Drives etapebonus breadth."},{"term":"p_gc","definition":"Fused GC-strength: de-vigged GC win odds blended with a capped UCI-points prior. Paid every held stage as passive GC income."},{"term":"confidence","definition":"HONEST 0–1 trust band = coverage × agreement (NOT a statistical interval). Below 0.4 the rider is flagged low-confidence; discount aggression."},{"term":"coverage","definition":"Count of independent research channels that had a reading for this rider (0–5). More channels = sturdier fusion."},{"term":"matchRate","definition":"Fraction of the pool a LIVE source actually covered. Low pre-race (only GC odds live); rises ~24h out. Low matchRate = treat EV as weak."},{"term":"leverage","definition":"Per-stage 0–1 decisive-stage weight (GC importance, volatility, summit, TT). Concentrate variance/captaincy where it is high."},{"term":"expected_breadth","definition":"Expected count of an optimal 8-man team’s riders inside the stage top-15. High on bunch days, low on selective mountain/TT days."},{"term":"profile_block / block_boundary","definition":"Grouping of consecutive similar stages + whether this stage closes the block — the 1–3 stage anti-churn look-ahead."},{"term":"holdbonus / TTT note","definition":"Holdbonus = real-team stage-finish spillover to all that team’s active riders. On TTT, stage-placement/holdbonus/late-arrival/etapebonus do NOT apply — value whole strong TT squads."},{"term":"substrateLive","definition":"True when the dashboard successfully re-ran the pure fusion+EV engine to reconstruct per-rider numbers; false means it fell back to the snapshot name-lists."}]}</script>
<script>
"use strict";
/* ============================================================= data + helpers */
const D = JSON.parse(document.getElementById('dash-data').textContent);
const root = document.getElementById('root');

const esc = (s)=> String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const elFrom = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
const num = (x)=> typeof x==='number' && isFinite(x);
const kr  = (n)=> num(n)? Math.round(n).toLocaleString('en-US') : '<span class="na">n/a</span>';
const krM = (n)=> num(n)? (n/1e6).toFixed(n%1e6?1:0)+'M' : '<span class="na">n/a</span>';
const pct = (x,d=1)=> num(x)? (x*100).toFixed(d)+'%' : '<span class="na">n/a</span>';
const f2  = (x)=> num(x)? x.toFixed(2) : '<span class="na">n/a</span>';
const naSpan = '<span class="na">n/a</span>';
const cap1 = (s)=> s? s.charAt(0).toUpperCase()+s.slice(1) : '';
const I = (tip)=> '<i class="info" data-tip="'+esc(tip)+'">i</i>';

function relAge(iso){
  if(!iso) return '';
  const ms = Date.now()-new Date(iso).getTime();
  if(!isFinite(ms)) return '';
  const m=Math.round(ms/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  const h=Math.round(m/60); if(h<24) return h+'h ago';
  return Math.round(h/24)+'d ago';
}
function confTier(c){ if(!num(c)) return {c:'--',cls:'low',col:'var(--bad)'}; if(c>=0.6) return {c:c.toFixed(2),cls:'high',col:'var(--ok)'}; if(c>=0.4) return {c:c.toFixed(2),cls:'med',col:'var(--warn)'}; return {c:c.toFixed(2),cls:'low',col:'var(--bad)'}; }
const STAGE_ICON = {ttt:'⏱',itt:'⏱',flat:'🚩',hilly:'⛰',mountain:'🏔',mtn:'🏔',sprint:'🚩',cobbles:'🧱'};
function stageIcon(t){ return STAGE_ICON[(t||'').toLowerCase()] || '🚴'; }

const blocks=[];
const EV_WIRE=[];
function pushBlock(id,n,title,hint,inner){
  blocks.push(`<section class="block" id="${id}">
    <div class="block-h"><span class="num">${n}</span><h2>${title}</h2>${hint?`<span class="hint">${hint}</span>`:''}</div>
    ${inner}</section>`);
}

/* ============================================================= shared derivations (module scope)
   Brother-safe name matcher + the single weakness builder consumed by BOTH the Overview (00) and the
   Candor (1b) sections, so the two panels can never disagree. NEVER key a rider match by surname alone
   — the pool has same-surname riders (brothers). */
const nn=(s)=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z ]/g,' ').replace(/\s+/g,' ').trim();
function namesMatch(a,b){
  const na=nn(a),nb=nn(b); if(!na||!nb) return false; if(na===nb) return true;
  const pa=na.split(' '),pb=nb.split(' '); if(!pa[0]||!pb[0]) return false;
  const sa=pa[pa.length-1],sb=pb[pb.length-1];
  return (sa===sb||sa.endsWith(sb)||sb.endsWith(sa)) && pa[0][0]===pb[0][0];
}
// Auto-derive the bot's CURRENT weaknesses straight from the live snapshot, severity-ranked.
// Derivation (not a hand-written list) is the point: no panel can quietly omit today's problem.
function computeWeaknesses(){
  const m=D.meta||{}, status=D.status||{}, tm=D.team||{}, im=D.improve||{}, tb=D.teamB||{}, sc=D.sources||{}, dc=D.decision||null;
  const W=[]; // {sev:'high'|'med'|'low', title, metric, detail}
  const push=(sev,title,metric,detail)=>W.push({sev,title,metric,detail});

  // 0) Snapshot staleness — the substrate this ENTIRE page is rebuilt from is behind the live race.
  // The single most misleading failure mode of a static dashboard: data/snapshots/latest.json is a
  // degraded/stale capture (here a pre-race, empty-market Stage-0 snapshot from a collect glitch), so
  // the Stage tile, Team board, EV substrate and Results all render an OLD state as if current — while
  // the bot's own latest DECISION proves the race has moved on. build.js derives meta.snapshotStale
  // (decision stage_number = ground truth for race progress; an intact higher-stage snapshot on disk =
  // proof it's a glitch). Surfaced FIRST so a skimmer never trusts a stale number. No name keying here
  // beyond echoing the resolved live-captain string build.js already computed.
  const ss=m.snapshotStale;
  if(ss&&ss.stale){
    const shown=ss.snapStage===0?'pre-race (Stage 0)':('Stage '+esc(String(ss.snapStage??'?')));
    const parts=[];
    parts.push('This whole page is rebuilt from <span class="mono">data/snapshots/latest.json</span>, but that snapshot is <b>stale</b>: it reads as <b>'+shown+'</b>'
      +(ss.marketEmpty?' with an <b>empty market</b> (no start/current prices — which is why the Results section is dark)':'')
      +(ss.snapGeneratedAt?' (captured '+relAge(ss.snapGeneratedAt)+')':'')+'.');
    if(num(ss.decisionStage)) parts.push('The bot’s latest <b>decision is for Stage '+esc(String(ss.decisionStage))+'</b>'
      +(ss.liveCaptain?' (live captain <b>'+esc(ss.liveCaptain)+'</b>)':'')+', so the race has demonstrably moved past what this page renders.');
    if(ss.newerSnapshot) parts.push('An intact <b>Stage '+esc(String(ss.newerSnapshot.stage))+'</b> snapshot ('+esc(String(ss.newerSnapshot.players))+' priced riders'
      +(ss.newerSnapshot.generatedAt?', '+relAge(ss.newerSnapshot.generatedAt):'')+') still sits on disk — evidence this is a collect glitch, not a genuine pre-race state.');
    parts.push('<b>Read every Stage / Team / EV / Results figure below as that '+shown+' substrate</b>, NOT the live Stage-'+esc(String(ss.decisionStage??'?'))+' race. It should self-heal on the next clean collect.');
    push('high','Substrate is a stale snapshot — the page is behind the live race',
      (ss.snapStage!=null&&num(ss.decisionStage))?('Stage '+ss.snapStage+' shown · Stage '+ss.decisionStage+' live'):'stale snapshot',
      parts.join(' '));
  }

  // 1) Substrate fallback — the whole EV board is name-lists, not live per-rider numbers.
  if(m.substrateLive===false){
    push('high','EV substrate is in fallback','name-lists only',
      'Per-rider EV could not be recomputed live this build, so the board below is the snapshot’s name-list leaderboards rather than scored substrate. Treat ROI / ceiling figures as unavailable, not authoritative.');
  }

  // 2) Jobs off or exiting non-zero — the pipeline that feeds every number may be stale.
  const badJobs=(status.jobs||[]).filter(j=>!j.loaded || (j.lastExit!=null && j.lastExit!==0));
  if(badJobs.length){
    push('high','A scheduled job is not healthy',badJobs.length+' job'+(badJobs.length===1?'':'s'),
      'These jobs are off or last exited non-zero: '+badJobs.map(j=>esc(j.label)+(j.loaded?' (exit '+j.lastExit+')':' (off)')).join(', ')+'. Until they run cleanly, the data on this page can silently go stale.');
  }

  // 3) Overfit signal — optimizer found in-sample gain that does NOT carry out-of-sample.
  if(num(im.improvedPct) && num(im.heldOutPct) && im.improvedPct>0 && im.heldOutPct<=0){
    push('med','Last tuning gain did not generalize',
      '+'+im.improvedPct+'% in / '+(im.heldOutPct>=0?'+':'')+im.heldOutPct+'% oos',
      'The self-improve loop found an in-sample improvement that turned negative out-of-sample — a classic overfit. The conjunctive merge gate caught it ('+(im.merged?'MERGED':'correctly NOT merged')+'), but it is a standing reminder that backtest gains here are easy to over-trust.');
  }

  // 4) Coverage gap — how much of the pool a LIVE source actually touched.
  if(num(status.matchRate) && status.matchRate<0.7){
    push(status.matchRate<0.5?'high':'med','Most-of-pool live coverage is thin',
      (status.matchRate*100).toFixed(0)+'% matchRate',
      'A live research source covered only '+(status.matchRate*100).toFixed(0)+'% of the rider pool; the remaining '+((1-status.matchRate)*100).toFixed(0)+'% leans on the model prior, not observed signal. Pre-race this is expected (stage-level sources are still dark), but it caps how much edge the numbers can carry right now.');
  }

  // 5) Dark channels — named, so the reader knows exactly which signals are missing.
  const dark=(sc.channels||[]).filter(c=>!c.live);
  if(dark.length){
    push('low',dark.length+' of '+(sc.channels||[]).length+' research channels are dark','',
      'Currently dark: '+dark.map(c=>esc(c.label||c.name)).join(', ')+'. These light up closer to each stage (~24h out); until then the fusion blends fewer independent opinions.');
  }

  // 6) Single-team mode — half the portfolio's top-1% path is switched off.
  if(tb && tb.enabled===false){
    push('med','Only the anchor team is live','Team B disabled',
      'The decorrelated differential (Team B) is disabled in config, so the two-team portfolio that chases a top-1% finish is running on one entry. The shadow plan is shown below, but it is not applied to any live team.');
  }

  // 7) Owned riders with no EV substrate — a real per-rider data gap.
  const riders=tm.riders||[];
  const gaps=riders.filter(r=>!(r.ev && (num(r.ev.e_horizon)||num(r.ev.captain_ceiling))));
  if(gaps.length){
    push('med',gaps.length+' owned rider'+(gaps.length===1?'':'s')+' carry no live EV',gaps.length+'/'+riders.length,
      'No live substrate attached to: '+gaps.map(r=>esc(r.name)).join(', ')+'. Their value and captain math cannot be scored this build — a genuine data gap, not a zero.');
  }

  // 7b) No-signal floor — owned riders whose e_horizon is the TRUE undifferentiated prior shared by
  // every rider no research channel has reached. Historically this was "any coverage-0 rider", but that
  // proxy breaks on a TTT: the EV engine scores uncovered riders by their squad's TT strength, so
  // coverage-0 now spans a wide range (−300k … +213k) and only a subset actually sit on the shared prior.
  // So derive the floor from the data — the MODAL e_horizon among coverage-0 board riders (982, held by
  // 128/176 here) — and flag only owned riders sitting exactly on it. This stops the panel from calling a
  // squad-scored rouleur (or a scored liability, handled in 7c) "not yet scored".
  const board=D.evBoard||[];
  const cov0board=board.filter(r=>!num(r.coverage)||r.coverage===0);
  let floorVal=null, floorPop=0;
  if(cov0board.length){
    const freq=new Map();
    for(const r of cov0board){ if(num(r.e_horizon)){ freq.set(r.e_horizon,(freq.get(r.e_horizon)||0)+1); } }
    let best=-1; for(const [v,c] of freq){ if(c>best){ best=c; floorVal=v; floorPop=c; } }
  }
  const onFloor=(r)=>r.ev&&num(r.ev.e_horizon)&&num(floorVal)&&Math.abs(r.ev.e_horizon-floorVal)<1
    &&(!r.fused||!num(r.fused.coverage)||r.fused.coverage===0);
  const floorRiders=riders.filter(onFloor);
  if(floorRiders.length){
    const poolNote=board.length?' Pool-wide, '+floorPop+' of '+board.length+' riders ('+Math.round(floorPop/board.length*100)+'%) sit on this exact prior floor (e_horizon '+kr(floorVal)+').':'';
    push('med',floorRiders.length+' owned rider'+(floorRiders.length===1?'':'s')+' sit on the no-signal EV floor','e_horizon '+kr(floorVal),
      'No research channel has reached '+floorRiders.map(r=>esc(r.name)).join(', ')+' yet, so their e_horizon is the shared prior floor (e_horizon '+kr(floorVal)+') — identical for every un-scored rider, not an individually scored read. Do not mistake the low number for “scored low”; it is “not yet scored”.'+poolNote);
  }

  // 7c) Scored liability — an owned rider the engine scored materially NEGATIVE. This is the OPPOSITE of
  // 7b: coverage-0 here does not mean "unscored", it means the engine deliberately marked the rider a
  // loss (typically a DNS / non-starter penalty — Carlos Rodríguez at −300k is the sole negative on the
  // whole 185-rider board). It must never be swept into the "not yet scored" floor, and it is the single
  // most consequential live weakness: a slot and its kroner tied up in a rider the model expects to hurt
  // the score. Names come straight from the resolved team.riders — no surname keying.
  const liabilities=riders.filter(r=>r.ev&&num(r.ev.e_horizon)&&r.ev.e_horizon<0);
  if(liabilities.length){
    const bud=num(tm.budget)?tm.budget:(num(tm.totalValue)?tm.totalValue:0);
    const val=liabilities.reduce((s,r)=>s+(num(r.value)?r.value:0),0);
    const pct=bud?Math.round(val/bud*100):null;
    const names=liabilities.map(r=>esc(r.name)+' ('+kr(r.ev.e_horizon)+' e_horizon'+(num(r.value)?', '+krM(r.value)+' held':'')+')').join(', ');
    const dcObj=D.decision||null;
    const restore=dcObj&&/safe.?restore|manual/i.test(dcObj.source||'');
    const srcNote=restore
      ? ' The current plan is a manual restore (source: '+esc(dcObj.source)+'), not an autonomous EV pick — its own summary flags a replacement as pending, so this is a known OPEN slot, not a considered bet. Until the brain buys a replacement the liability stands.'
      : '';
    push('high',liabilities.length+' owned rider'+(liabilities.length===1?'':'s')+' scored a NEGATIVE EV',
      (pct!=null?pct+'% of budget at risk':kr(val)),
      'The engine scored these owned riders below zero e_horizon — a deliberate liability read (typically a DNS / non-starter), the OPPOSITE of the coverage-0 prior floor above: '+names+'. '
      +(pct!=null?'That is '+pct+'% of the '+krM(bud)+' budget committed to a rider projected to LOSE points. ':'')
      +'This is the sharpest kind of hidden weakness the dashboard exists to surface: value and a roster slot parked on a rider the model expects to subtract from the score.'+srcNote);
  }

  // 8) Captaincy not the highest ceiling — reuse the same ceiling logic as the captain section.
  const ranked=riders.filter(r=>r.ev&&num(r.ev.captain_ceiling))
    .map(r=>({name:r.name,ceil:r.ev.captain_ceiling,isCaptain:!!r.isCaptain}))
    .sort((a,b)=>b.ceil-a.ceil);
  if(ranked.length){
    const chosen=ranked.find(r=>r.isCaptain), top=ranked[0];
    if(!chosen){
      push('high','Captain is unexplained here','no ceiling match',
        'The live captain ('+esc(tm.captain||'—')+') did not match any rider carrying a captain_ceiling this build, so the crown cannot be justified numerically — a possible data gap.');
    } else if(top.ceil-chosen.ceil>Math.max(1,top.ceil*0.005)){
      // Only a GENUINE ceiling gap is a mismatch — an exact tie (e.g. captain_ceiling degenerates to one
      // shared value on a TTT, where the engine zeroes stage-placement upside) is NOT a mismatch and must
      // not fire a false HIGH weakness; the Captain section explains the flat-ceiling case in-place.
      // Even with a real gap, distinguish a STALE crown (never updated to the plan → HIGH) from a benign
      // dashboard-vs-decision recompute DRIFT (live crown == the latest decision's captain → LOW): the
      // dashboard re-fuses the substrate fresh, so near-tied ceilings can flip after the brain decided.
      // Brother-safe match only (namesMatch), never surname alone.
      const decCap=dc&&dc.captain_name||null;
      const sameStage=!dc||dc.stage_number==null||!D.stage||dc.stage_number===D.stage.number;
      const crownIsLatest=!!(decCap&&namesMatch(chosen.name,decCap)&&sameStage);
      if(crownIsLatest){
        push('low','Captaincy differs from the live ceiling board',esc(chosen.name)+' vs recomputed top '+esc(top.name),
          'The crown ('+esc(chosen.name)+', ceiling '+kr(chosen.ceil)+') is exactly the captain the latest decision set — NOT stale — but the dashboard’s freshly-recomputed board now ranks '+esc(top.name)+' higher ('+kr(top.ceil)+'). This is dashboard-vs-decision drift (near-tied ceilings re-fused after the brain decided), explained in full in the Captain section; worth confirming the brain re-crowns on its next run.');
      } else {
        push('high','Captaincy is not the highest ceiling'+(decCap?' — and looks stale':''),esc(chosen.name)+' over '+esc(top.name),
          chosen.name+' wears the crown (ceiling '+kr(chosen.ceil)+') but '+top.name+' scores higher ('+kr(top.ceil)+')'+(decCap?', and the latest decision captains '+decCap+' — so the live crown was not updated to the plan':'')+'. The strategy says crown the top ceiling — '+(decCap?'reconcile the live crown to the plan':'a possible stale captaincy or deliberate override worth checking')+'.');
      }
    }
  }

  // 9) Plan-vs-live drift — the "Why this team" rationale narrates a team the bot may NOT hold.
  // Derived with the SAME brother-safe matcher (namesMatch) — NEVER surname alone.
  if(dc){
    const planTeam=(dc.target_team||[]).filter(Boolean);
    const liveTeam=(tm.riders||[]).map(r=>r.name).filter(Boolean);
    if(planTeam.length && liveTeam.length){
      const toBuy=planTeam.filter(p=>!liveTeam.some(l=>namesMatch(p,l)));
      const planCap=dc.captain_name||null, liveCap=tm.captain||null;
      const capDiffers=!!(planCap&&liveCap&&!namesMatch(planCap,liveCap));
      if(toBuy.length || capDiffers){
        const metric=[toBuy.length?toBuy.length+'/'+planTeam.length+' unbought':'',capDiffers?'captain differs':''].filter(Boolean).join(' · ');
        const detail='The “Why this team” rationale below explains the planned target team'
          +(dc.rebuild?' (a full rebuild)':'')+', but the live roster does not match it: '
          +(toBuy.length?toBuy.length+' planned rider'+(toBuy.length===1?'':'s')+' not yet bought ('+toBuy.map(esc).join(', ')+')':'')
          +(toBuy.length&&capDiffers?', and ':'')
          +(capDiffers?'the live captain is <b>'+esc(liveCap)+'</b> but the plan captains <b>'+esc(planCap)+'</b>':'')
          +'. So the explained picks are <b>not necessarily the team the bot currently holds</b> — the executor may not have converged. See the plan-vs-live strip in “Why this team” for the full held / to-buy / to-sell breakdown.'
          +(dc.rebuild?' Pre-stage-1 transfers are free, so this rebuild may be applied in a later cycle rather than being a failure.':'');
        push(capDiffers?'high':'med','The decision plan is not reflected in the live roster',metric,detail);
      }
    }
  }

  // 10) Backtest self-diagnosis — the self-improve autopsy's OWN findings on where the shipped strategy
  // systematically loses points across the historical backtest. These are the most quantified, honest
  // weaknesses in the whole system, yet they live three sections down (§07 autopsy) as a stat chip. Pull
  // the material ones up here so the panel that promises "never buried" never buries the bot's own
  // diagnosis. Distinct from check #3 (overfit / generalization): these are WHERE points are lost across
  // past Tours, not whether a tune generalizes. No name matching here at all → no surname risk.
  const ap=im.autopsy||{}, apStats=ap.stats||{}, apFindings=Array.isArray(ap.findings)?ap.findings:[];
  if(apFindings.length){
    const nStages=num(apStats.stages)?apStats.stages:null, nYears=(im.years||[]).length||null;
    const scope=[nStages?nStages+'-stage':'',nYears?nYears+'-season':''].filter(Boolean).join(' / ')||'historical';
    for(const fd of apFindings){
      const sev=fd.severity==='high'?'high':fd.severity==='low'?'low':'med';
      const area=fd.area||'strategy';
      // headline metric straight from the autopsy stats (never a rider name → no surname keying)
      let metric='';
      if(area==='captain'&&num(apStats.captainMissPct)) metric=apStats.captainMissPct+'% miss · '+kr(apStats.captainAvgRegret)+' kr avg regret';
      else if(area==='breadth'&&apStats.breadthWorst) metric='worst: '+esc(apStats.breadthWorst);
      const detail='<b>Backtest self-diagnosis</b> ('+esc(scope)+' backtest): '+esc(fd.detail||'')
        +' This is the shipped strategy’s own measured weakness over past Tours, not a live glitch — the self-improve loop targets it (see §07 Self-improvement), but it is a standing bias to weigh when reading today’s picks.';
      push(sev,'Backtest flags a systematic '+esc(area)+' weakness',metric,detail);
    }
  }

  // 11) Losing the actual competition — the one weakness that lives ONLY in the Standing section (§02·R)
  // and never rode up to this panel / the Overview ribbon, so a skimmer reading the top of the page saw
  // no red flag that the bot is sliding on the thing the game is actually won on: RANK. Value growth
  // (Results §) is NOT rank — every team's riders gain value, so a green Results page can hide a falling
  // leaderboard. buildStanding derives D.standing.posture read-only from the meta-learning report
  // (data/meta/report-latest.json); fire when the global-rank trend is worsening OR the mini-league seat
  // is last, i.e. there is a genuine competitive deficit (a stable/improving good standing is not a
  // weakness and stays silent). All name work here echoes report-provided strings — no surname keying.
  const St=D.standing, P=St&&St.posture||null;
  if(St && St.available!==false && P){
    const worsening=P.trend==='worsening';
    const seatLast=num(P.miniRank)&&num(P.miniSize)&&P.miniRank>=P.miniSize;
    if(worsening||seatLast){
      const pct=num(P.globalPctile)?Math.round(P.globalPctile*100):null;
      const metric=[P.arc?esc(P.arc):(num(P.globalRank)?'rank '+P.globalRank:''),seatLast?'mini '+P.miniRank+'/'+P.miniSize:''].filter(Boolean).join(' · ');
      const miss=(St.missingCore||[]).map(x=>esc(x&&x.name||x)).filter(Boolean);
      const cc=St.consensusCaptain&&St.consensusCaptain.name?esc(St.consensusCaptain.name):null;
      const ccOwn=!!(St.consensusCaptain&&St.consensusCaptain.weOwn);
      const cbg=(St.churn&&St.churn.captainBonusGap)||{};
      const parts=[];
      parts.push('The game is won on <b>rank</b>, not value growth — and on rank the bot is '
        +(worsening?'<b>losing ground</b>':'in the lower half')+': '+(P.arc?esc(P.arc):'')
        +(pct!=null?', now a top&#8201;'+pct+'% global position':'')
        +(seatLast?' and <b>last ('+P.miniRank+' of '+P.miniSize+') in its mini-league</b>':'')+'.');
      parts.push('Value can rise while rank falls (every team gains value), so the green Results section above can <b>hide</b> this — it is the single biggest competitive blind spot.');
      if(num(St.ownedCore)&&num(St.templateN))
        parts.push('Root cause is roster <b>composition</b>, not execution: the bot holds only '+St.ownedCore+' of '+St.templateN+' of the winners’ consensus core'
          +(miss.length?' (missing '+miss.slice(0,3).join(', ')+(miss.length>3?', …':'')+')':'')
          +', anchoring GC stars the top teams fade in a sprint-heavy first week'
          +(cc?', while the consensus crown sits on <b>'+cc+'</b>'+(ccOwn?' — which the bot also owns and captains, so the deficit is breadth, not the crown':' which the bot does not own'):'')+'.');
      if(num(cbg.ours)&&num(cbg.topAvg))
        parts.push('In its favour it is actually <b>ahead</b> on banked captain bonus ('+krM(cbg.ours)+' vs '+krM(cbg.topAvg)+') and churns less — so the fix is sprinter breadth, not a rebuild.');
      parts.push('Full breakdown in §Standing.'
        +(num(St.round)?' The report is round '+St.round+(St.asOf?' ('+esc(St.asOf)+')':''):'')
        +(num(St.roundsBehind)&&St.roundsBehind>0?', '+St.roundsBehind+' round'+(St.roundsBehind===1?'':'s')+' behind live'+(num(St.liveStage)?' Stage '+St.liveStage:'')+' — one collect stale':'')+'.');
      push(worsening?'high':'med','Losing ground in the actual competition'+(seatLast?' — last in the mini-league':''),
        metric,parts.join(' '));
    }
  }

  const order={high:0,med:1,low:2};
  W.sort((a,b)=>order[a.sev]-order[b.sev]);
  return W;
}

/* ============================================================= 1c. PIPELINE — HOW A PICK IS MANUFACTURED
   The rest of the dashboard explains the OUTPUTS (which riders, which captain, pool standing). This one
   section shows the PROCESS that produces them, so a skimmer gets the causal chain before the detail:
   web sources → weighted fusion → per-rider probabilities → EV engine → decision → execute → result.
   Every number is derived from this snapshot; the constants (8 riders / ≤2 per team / 1 captain / H≤3)
   are the shipped strategy's own hard constraints (strategy.essence), the EV term structure mirrors
   src/ev.js scoreEv/eStageFor, and the stage-aware note ties the abstract flow to TODAY's actual pick. */
(function(){
  const m=D.meta||{}, tm=D.team||{}, dc=D.decision||{}, sc=D.sources||{}, st=D.stage||{};
  const chs=sc.channels||[];
  const liveCh=chs.filter(c=>c.live), chN=chs.length;
  const liveNames=liveCh.map(c=>{
    // short, honest label: the source family, not the marketing string
    const n=(c.name||'').split('.').pop()||c.label||'';
    return n.replace(/Odds$/,' odds').replace(/Points$/,' pts');
  });
  const board=D.evBoard||[];
  const floorN=board.filter(r=>num(r.coverage)&&r.coverage>0?false:true).length; // coverage 0/undef → prior floor
  const scoredN=board.length-floorN;
  const mr=num(sc.matchRate)?sc.matchRate:null;
  const byType=(sc.fusionWeightsSummary||{}).byTypeCurrent||null;
  // top-2 by-type fusion weights for the current stage, so "weighted blend" is concrete not hand-wavy
  const topW=byType?Object.entries(byType).filter(([,v])=>num(v)).sort((a,b)=>b[1]-a[1]).slice(0,2)
      .map(([k,v])=>`${k} ${v.toFixed(1)}`).join(' · '):'';
  const isTTT=(st.type||'').toLowerCase()==='ttt';
  const budgetTxt=num(tm.budget)?krM(tm.budget):'50M';
  const swN=(dc.swaps||[]).length;
  const decV = dc.rebuild ? 'Full rebuild' : (swN?`${swN} swap${swN===1?'':'s'}`:'Hold');
  const racing=!!m.racing;

  // node = {step,label,val,sub,href,tok}
  const nodes=[
    {step:'01 · in',label:'Web sources',tok:'--acc',href:'#sources',
      val:`${liveCh.length}/${chN} live`,
      sub: liveNames.length?esc(liveNames.join(' · ')):'all dark pre-race'},
    {step:'02',label:'Fusion',tok:'--acc',href:'#sources',
      val:'weighted blend',
      sub:`${mr==null?'':'matchRate '+pct(mr,0)}${topW?` · ${esc(topW)}`:''}`},
    {step:'03',label:'Rider probabilities',tok:'--cyan',href:'#explorer',
      val:'p_stage · p_top15 · p_gc',
      sub:`${scoredN}/${board.length} scored${floorN?` · ${floorN} on prior floor`:''}`},
    {step:'04',label:'EV engine',tok:'--cyan',href:'#explorer',
      val:'e_horizon · roi/M · capCeil',
      sub:'e_stage summed over ≤3 upcoming stages (future discounted)'},
    {step:'05',label:'Decision',tok:'--violet',href:'#decision',
      val:esc(decV),
      sub:`8 riders · ${esc(budgetTxt)} · ≤2/team · 1 captain`},
    {step:'06',label:'Execute',tok:'--violet',href:'#team',
      val:'live team',
      sub: racing?'applied on holdet.dk':'pre-race — transfers free until S1'},
    {step:'07 · out',label:'Result',tok:'--gold',href:'#team',
      val:'value growth',
      sub: racing?'points → kr':`not racing yet (T-${m.tourStartsInDays??'?'}d)`},
  ];
  const flow=nodes.map((n,i)=>{
    const node=`<a class="pipe-node" href="${n.href}" style="border-left-color:var(${n.tok})">
        <span class="pipe-step">${esc(n.step)}</span>
        <span class="pipe-label">${esc(n.label)}</span>
        <span class="pipe-val">${n.val}</span>
        ${n.sub?`<span class="pipe-sub">${n.sub}</span>`:''}
      </a>`;
    return node+(i<nodes.length-1?'<span class="pipe-arrow" aria-hidden="true">→</span>':'');
  }).join('');

  // Stage-aware honesty note: on a TTT the per-rider stage numbers the board leads with are structurally
  // inert, so the pick is squad-structural. This mirrors eStageFor() zeroing stagePlacement/sprintKom on
  // type==='ttt'. Off a TTT, state the plain horizon logic instead.
  const note = isTTT
    ? `<b>Why today's board can mislead:</b> Stage ${st.number??1} is a <b>team time-trial</b>. In the EV engine (<span class="mono">eStageFor</span>) a TTT zeroes the stage-placement and sprint/KOM terms — value collapses onto the GC/TTT passive floor, paid equally to every active rider of a strong squad. So the pick is <b>squad-structural</b> (strong TT teams, 2-up), <b>not</b> the top of the per-rider <span class="mono">e_horizon</span> board. Read the numbers below with that in mind — see the Decision section for the squad shape.`
    : `<b>How the numbers drive the pick:</b> <span class="mono">e_horizon</span> blends this stage's EV with up to two more upcoming stages (future ones discounted and weighted by how likely the rider stays useful). The decision maximises Σ <span class="mono">e_horizon</span> under the hard constraints, fills cheap breadth by <span class="mono">roi/M</span>, and captains the highest <span class="mono">captain_ceiling</span>.`;

  const inner=`<div class="card">
    <p class="candor-intro" style="margin-bottom:11px">One pass, left to right: how a web signal becomes a roster slot. Each node is live from this snapshot and links to the section that details it.</p>
    <div class="pipe">${flow}</div>
    <div class="pipe-note">${note}</div>
  </div>`;
  pushBlock('pipeline','1·C','How a pick is made — the pipeline','sources → fusion → probabilities → EV → decision → execute · the causal chain, not the outputs',inner);
})();

/* ============================================================= 00. OVERVIEW — state, alerts & the whole board
   Renders FIRST (blocks.unshift) so it sits above the header hero. Every value derives client-side from D;
   the alert ribbon + system verdict consume the SAME computeWeaknesses() W the Candor panel renders, so the
   two can never disagree. Nothing here is hand-written. */
(function(){
  const m=D.meta||{}, status=D.status||{}, tm=D.team||{}, im=D.improve||{}, dc=D.decision||{}, sc=D.sources||{};
  const W=computeWeaknesses();
  const counts=W.reduce((o,w)=>{o[w.sev]=(o[w.sev]||0)+1;return o;},{});
  const anyHigh=W.some(w=>w.sev==='high');

  // colour token by severity
  const sevTok=(s)=> s==='high'?'--bad':s==='med'?'--warn':'--ok';
  const sevPill=(s)=> s==='high'?'bad':s==='med'?'warn':'';

  // ---- SYSTEM VERDICT (derived from the shared W) ----
  const verdict = anyHigh
      ? {txt:'ATTENTION', tok:'--bad', bg:'var(--badbg)', bd:'var(--bad-bd)'}
    : (W.length ? {txt:'CAUTION', tok:'--warn', bg:'var(--warnbg)', bd:'var(--warn-bd)'}
                : {txt:'NOMINAL', tok:'--ok', bg:'var(--okbg)', bd:'var(--ok-bd)'});

  // ---- MASTHEAD pills (copied from the hero metarow) ----
  const modeCls = m.mode==='live'?'ok':m.mode==='dry-run'?'warn':'';
  const metarow = `<span class="pill ${modeCls}"><span class="led"></span>mode: ${esc(m.mode||'?')}</span>`
    +`<span class="pill ${m.substrateLive?'ok':'warn'}">substrate ${m.substrateLive?'LIVE':'fallback'}</span>`
    +`<span class="pill ${m.buildOk?'acc':'bad'}">build ${m.buildOk?'OK':'FAIL'}</span>`
    +`<span class="pill" title="${esc(m.gitHeadMsg||'')}">git ${esc(m.gitHead||'?')}</span>`
    +`<span class="pill">updated ${relAge(m.generatedAt)}</span>`;
  const countTok = m.racing
    ? `<span class="count racing" style="font-size:20px">RACING</span>`
    : `<span class="count" style="font-size:20px">T-${m.tourStartsInDays??'?'}d</span>`;

  // ---- helper to render one tile ----
