<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdet TDF bot — interpretability console</title>
<style>
/* ============================================================= mission-control theme */
:root{
  --bg:#0a0e14; --bg2:#070a0f; --panel:#11161f; --panel2:#0d121a;
  --ink:#e6edf3; --ink2:#c4cdd8; --mut:#7d8a9c; --mut2:#5a6675;
  --line:#1e2632; --line2:#283142;
  --acc:#58a6ff; --acc2:#388bfd; --cyan:#39d3c8; --violet:#a371f7;
  --ok:#3fb950; --okbg:#0f2417; --warn:#d29922; --warnbg:#241c0d; --bad:#f85149; --badbg:#2a1213;
  --gold:#e3b341;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:
   radial-gradient(1200px 600px at 80% -10%, #0e1722 0%, transparent 60%),
   radial-gradient(900px 500px at -10% 10%, #0c141d 0%, transparent 55%),
   var(--bg);
  color:var(--ink);font:14px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3{margin:0}
::-webkit-scrollbar{height:9px;width:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ============================================================= top nav */
.topnav{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  padding:8px 16px;background:rgba(8,11,16,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.topnav .brand{font-weight:700;letter-spacing:.3px;margin-right:10px;font-size:13px;white-space:nowrap}
.topnav .brand .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);
  margin-right:7px;box-shadow:0 0 8px var(--ok);animation:pulse 2.6s ease-in-out infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.topnav a.nav{color:var(--mut);font-size:11.5px;padding:4px 9px;border-radius:6px;white-space:nowrap}
.topnav a.nav:hover{color:var(--ink);background:var(--line);text-decoration:none}
.topnav .spacer{flex:1}
.topnav .stamp{font-family:var(--mono);font-size:11px;color:var(--mut2)}

/* ============================================================= layout */
.wrap{max-width:1320px;margin:0 auto;padding:20px 18px 80px}
section.block{margin:30px 0;scroll-margin-top:58px}
.block-h{display:flex;align-items:baseline;gap:12px;margin:0 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.block-h .num{font-family:var(--mono);font-size:12px;color:var(--acc);opacity:.8}
.block-h h2{font-size:16px;font-weight:650;letter-spacing:.2px}
.block-h .hint{font-size:11.5px;color:var(--mut2);margin-left:auto}
.grid{display:grid;gap:14px}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
  border-radius:12px;padding:15px 16px}
.card h3{font-size:12px;color:var(--mut);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.muted{color:var(--mut)}
.mono{font-family:var(--mono)}
.tiny{font-size:11px}
.nowrap{white-space:nowrap}
.na{color:var(--mut2);font-style:italic}

/* pills / chips */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11px;
  border:1px solid var(--line2);color:var(--ink2);background:#0c121b;white-space:nowrap}
.pill.ok{color:var(--ok);border-color:#1c4029;background:var(--okbg)}
.pill.warn{color:var(--warn);border-color:#3d3415;background:var(--warnbg)}
.pill.bad{color:var(--bad);border-color:#4a1f1f;background:var(--badbg)}
.pill.acc{color:var(--acc);border-color:#1d3a5c;background:#0c1722}
.pill .led{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}

/* ============================================================= header strip */
.hero{display:grid;grid-template-columns:1.5fr auto;gap:16px;align-items:stretch;
  background:linear-gradient(135deg,#0f1722,#0b1019);border:1px solid var(--line2);border-radius:16px;padding:20px 22px;
  position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:
   repeating-linear-gradient(90deg,transparent,transparent 38px,rgba(88,166,255,.03) 39px,transparent 40px);
   pointer-events:none}
.hero .teamname{font-size:24px;font-weight:750;letter-spacing:.2px;line-height:1.15}
.hero .stageline{margin-top:7px;color:var(--ink2);font-size:13.5px}
.hero .metarow{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.hero .right{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-width:150px}
.count{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--gold);line-height:1}
.count.racing{color:var(--ok)}
.count-lbl{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut)}
.jobs-strip{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.jobpill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:11px;
  background:#0b1019;border:1px solid var(--line)}
.jobpill .led{width:8px;height:8px;border-radius:50%}
.jobpill.ok .led{background:var(--ok);box-shadow:0 0 7px var(--ok)}
.jobpill.warn .led{background:var(--warn);box-shadow:0 0 7px var(--warn)}
.jobpill.bad .led{background:var(--bad);box-shadow:0 0 7px var(--bad)}
.jobpill .lx{color:var(--mut2);font-family:var(--mono)}

/* gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center}
.gauge-cap{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);margin-top:2px}

/* ============================================================= team cards */
.team-summary{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-bottom:6px}
.team-summary .stat{display:flex;flex-direction:column}
.team-summary .stat .v{font-family:var(--mono);font-size:18px;font-weight:650;color:var(--ink)}
.team-summary .stat .l{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut)}
.budgetbar{height:8px;border-radius:5px;background:#0a0f17;border:1px solid var(--line);overflow:hidden;min-width:200px;flex:1}
.budgetbar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc2),var(--cyan))}
.squad{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;margin-top:14px}
.rider{position:relative;border:1px solid var(--line);border-radius:12px;padding:12px 13px;
  background:linear-gradient(180deg,var(--panel),var(--panel2));border-left:4px solid var(--tc,#30363d)}
.rider.captain{box-shadow:0 0 0 1px var(--gold) inset, 0 4px 18px rgba(227,179,65,.10)}
.rider .crown{position:absolute;top:-9px;right:11px;font-size:13px;background:var(--gold);color:#1a1407;
  padding:1px 8px;border-radius:999px;font-weight:700;letter-spacing:.5px}
.rider .rn{font-weight:650;font-size:14.5px}
.rider .rt{font-size:11px;color:var(--mut);margin-top:1px}
.rider .price{float:right;font-family:var(--mono);font-size:13px;color:var(--cyan);font-weight:600}
.rider .subgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;margin-top:9px;font-size:11.5px}
.rider .subgrid b{color:var(--mut);font-weight:500}
.rider .subgrid span{font-family:var(--mono);text-align:right;color:var(--ink2)}
.rider .srcline{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.srctag{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;padding:1px 6px;border-radius:4px;
  background:#0c1722;border:1px solid var(--line2);color:var(--acc)}
.conf-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.rider.nodata{opacity:.72}
.rider .gap{font-size:10.5px;color:var(--warn);margin-top:8px;font-style:italic}

/* ============================================================= captain pick */
.capwrap{display:grid;gap:9px;margin-top:4px}
.caprow{display:grid;grid-template-columns:175px 1fr 92px;gap:11px;align-items:center;font-size:12.5px}
.caprow .cn{display:flex;flex-direction:column;line-height:1.25;overflow:hidden}
.caprow .cn b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.caprow .cn small{color:var(--mut2);font-size:10.5px}
.caprow .ctrack{height:20px;border-radius:6px;background:#0a0f17;border:1px solid var(--line);overflow:hidden}
.caprow .ctrack i{display:block;height:100%;background:linear-gradient(90deg,var(--mut2),var(--mut));border-radius:5px}
.caprow.chosen .ctrack i{background:linear-gradient(90deg,#8a6d1f,var(--gold))}
.caprow.chosen .cn b{color:var(--gold)}
.caprow .cval{font-family:var(--mono);text-align:right;color:var(--ink2)}
.cap-callout{font-size:13px;line-height:1.6;background:#0c121b;border:1px solid var(--line);border-left:3px solid var(--gold);
  border-radius:10px;padding:12px 15px;margin-bottom:14px;color:var(--ink2)}
.cap-nodata{font-size:11.5px;color:var(--mut);margin-top:11px;font-style:italic}

/* ============================================================= candor */
.candor-intro{font-size:12.5px;line-height:1.6;color:var(--mut);margin:0 0 14px}
.candor-list{display:grid;gap:10px}
.candor{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start;border:1px solid var(--line);
  border-left:3px solid var(--mut);border-radius:11px;padding:11px 14px 12px;background:#0c121b}
.candor.sev-high{border-left-color:var(--bad);background:#16100f}
.candor.sev-med{border-left-color:var(--warn);background:#14110b}
.candor.sev-low{border-left-color:var(--cyan)}
.candor .sev-tag{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 7px;border-radius:6px;align-self:start;white-space:nowrap}
.candor.sev-high .sev-tag{color:var(--bad);background:var(--badbg);border:1px solid #4a1f1f}
.candor.sev-med .sev-tag{color:var(--warn);background:var(--warnbg);border:1px solid #3d3415}
.candor.sev-low .sev-tag{color:var(--cyan);background:#0c1f1d;border:1px solid #16403b}
.candor .c-title{font-size:13.5px;font-weight:650;color:var(--ink)}
.candor .c-title .c-metric{font-family:var(--mono);font-weight:700;margin-left:7px}
.candor .c-detail{font-size:12.5px;line-height:1.6;color:var(--mut);margin-top:4px}
.candor-clear{font-size:13px;color:var(--ok);background:var(--okbg);border:1px solid #1c4029;
  border-radius:10px;padding:12px 15px}

/* ============================================================= decision */
.decision-summary{font-size:14px;line-height:1.7;color:var(--ink2);background:#0c121b;border:1px solid var(--line);
  border-left:3px solid var(--acc);border-radius:10px;padding:14px 16px;margin-bottom:14px}
/* plan-vs-live reconciliation — is the planned team actually the one the bot holds? */
.recon{border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:14px;background:#0c121b}
.recon.applied{border-left:3px solid var(--ok);background:var(--okbg)}
.recon.drift{border-left:3px solid var(--warn);background:var(--warnbg)}
.recon .rh{font-size:13.5px;font-weight:650;margin-bottom:4px}
.recon.applied .rh{color:var(--ok)}
.recon.drift .rh{color:var(--warn)}
.recon .rsub{font-size:12px;color:var(--ink2);line-height:1.55;margin-bottom:12px}
.recon .capcmp{display:flex;flex-wrap:wrap;gap:9px;align-items:stretch;margin-bottom:13px}
.recon .capcmp .cc{display:flex;flex-direction:column;gap:1px;border:1px solid var(--line2);border-radius:8px;padding:6px 11px;background:#0a0f17}
.recon .capcmp .cc small{font-size:9px;letter-spacing:.7px;text-transform:uppercase;color:var(--mut)}
.recon .capcmp .cc b{font-size:13px}
.recon .capcmp .verd{align-self:center;font-size:11.5px;font-weight:600}
.recon .capcmp .verd.ok{color:var(--ok)}.recon .capcmp .verd.warn{color:var(--warn)}
.recon .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:11px}
.recon .col h4{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);margin:0 0 6px;font-weight:600;display:flex;gap:6px;align-items:center}
.recon .col h4 .cnt{font-family:var(--mono);color:var(--ink2)}
.recon .col .nm{font-size:12px;padding:4px 0;border-bottom:1px dashed var(--line);display:flex;align-items:center;gap:7px;color:var(--ink2)}
.recon .col .nm:last-child{border-bottom:0}
.recon .dot2{width:6px;height:6px;border-radius:50%;flex:none}
.recon .col.held .dot2{background:var(--ok)}
.recon .col.buy .dot2{background:var(--cyan)}
.recon .col.sell .dot2{background:var(--bad)}
.recon .col .star{color:var(--gold);font-size:11px}
.swaps{display:grid;gap:11px}
.swap{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;border:1px solid var(--line);
  border-radius:11px;padding:12px 14px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.swap .flow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:14px;font-weight:600}
.swap .sell{color:var(--bad)}.swap .buy{color:var(--ok)}
.swap .arrow{color:var(--mut);font-family:var(--mono)}
.swap .why{grid-column:1/-1;font-size:12.5px;color:var(--mut);line-height:1.6;margin-top:7px}
.swap .meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;white-space:nowrap}
.swap .ev{font-family:var(--mono);font-size:12px;color:var(--cyan)}
.chip-conf{font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:999px}
.chip-conf.high{color:var(--ok);background:var(--okbg);border:1px solid #1c4029}
.chip-conf.med{color:var(--warn);background:var(--warnbg);border:1px solid #3d3415}
.chip-conf.low{color:var(--bad);background:var(--badbg);border:1px solid #4a1f1f}
.target-team{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tt-chip{font-size:11px;padding:2px 9px;border-radius:7px;background:#0c1722;border:1px solid var(--line2)}
.tt-chip.cap{border-color:var(--gold);color:var(--gold)}

/* ============================================================= tables */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
table{border-collapse:collapse;width:100%;font-size:12px}
thead th{position:sticky;top:0;background:#0d131c;color:var(--mut);font-weight:600;text-align:left;
  padding:8px 10px;border-bottom:1px solid var(--line2);white-space:nowrap;cursor:default;letter-spacing:.3px;z-index:1}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{color:var(--ink)}
thead th .ar{opacity:.4;font-size:9px;margin-left:3px}
thead th.act .ar{opacity:1;color:var(--acc)}
tbody td{padding:6px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr:hover{background:#0e141d}
td.r,th.r{text-align:right;font-family:var(--mono)}
tbody tr.owned{background:rgba(88,166,255,.06)}
tbody tr.owned:hover{background:rgba(88,166,255,.10)}
tbody tr.owned td:first-child{box-shadow:inset 3px 0 0 var(--acc)}
tbody tr.out td:first-child::after{content:"DNS";margin-left:6px;font-size:9px;color:var(--bad);
  border:1px solid var(--bad);border-radius:4px;padding:0 4px;vertical-align:middle}
.explorer-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px}
.explorer-bar input[type=text]{background:#0a0f17;border:1px solid var(--line2);border-radius:8px;color:var(--ink);
  padding:7px 11px;font-size:13px;min-width:220px;font-family:var(--sans)}
.explorer-bar input::placeholder{color:var(--mut2)}
.explorer-bar label{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px;cursor:pointer}
.explorer-bar .count-tag{font-size:11px;color:var(--mut2);font-family:var(--mono);margin-left:auto}

/* sparkbar in tables */
.spark{display:inline-block;height:9px;border-radius:3px;background:linear-gradient(90deg,var(--acc2),var(--cyan));
  vertical-align:middle;min-width:1px}
.sparkbg{display:inline-block;width:46px;height:9px;border-radius:3px;background:#0a0f17;border:1px solid var(--line);
  vertical-align:middle;overflow:hidden;margin-right:6px}
.confcell{display:flex;align-items:center;gap:6px;justify-content:flex-end}

/* ============================================================= stage */
.stage-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:14px}
.radar-wrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.tw-bars{flex:1;min-width:200px;display:grid;gap:6px}
.tw-row{display:grid;grid-template-columns:74px 1fr 42px;gap:8px;align-items:center;font-size:12px}
.tw-row .lbl{color:var(--mut);text-transform:capitalize}
.tw-row .bar{height:9px;border-radius:5px;background:#0a0f17;border:1px solid var(--line);overflow:hidden}
.tw-row .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--violet),var(--acc))}
.tw-row .val{font-family:var(--mono);text-align:right;color:var(--ink2)}
.upcoming{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.ustage{flex:1;min-width:130px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
  background:linear-gradient(180deg,var(--panel),var(--panel2))}
.ustage .sn{font-family:var(--mono);font-size:11px;color:var(--mut)}
.ustage .ic{font-size:20px;margin:2px 0}
.ustage .ty{font-size:12px;font-weight:600;text-transform:capitalize}
.ustage .rt{font-size:10.5px;color:var(--mut);margin-top:3px}
.ustage.summit{border-color:#3d3415}
.ustage .summitflag{font-size:9.5px;color:var(--warn);letter-spacing:.5px}

/* ============================================================= brain journal */
.journal{display:grid;gap:9px}
.entry{display:grid;grid-template-columns:auto 1fr;gap:12px;border-left:3px solid var(--mut2);padding:9px 0 9px 13px}
.entry.HELD{border-color:var(--mut)}
.entry.ACTED{border-color:var(--ok)}
.entry .ts{font-family:var(--mono);font-size:11px;color:var(--mut2);white-space:nowrap}
.entry .act{font-size:10px;font-weight:700;letter-spacing:.8px;padding:1px 7px;border-radius:5px;height:fit-content}
.entry .act.HELD{background:#1a2029;color:var(--mut)}
.entry .act.ACTED{background:var(--okbg);color:var(--ok)}
.entry .txt{font-size:12.5px;color:var(--ink2);line-height:1.55}
.entry .head{display:flex;align-items:center;gap:9px;margin-bottom:3px}

/* ============================================================= improve */
.imp-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.metric{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.metric .v{font-family:var(--mono);font-size:22px;font-weight:700}
.metric .l{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-top:2px}
.metric.pos .v{color:var(--ok)}.metric.neg .v{color:var(--bad)}
.gate-explain{font-size:13px;line-height:1.6;background:#0c121b;border:1px solid var(--line);border-left:3px solid var(--warn);
  border-radius:10px;padding:12px 15px;margin-bottom:14px;color:var(--ink2)}
.fold-bars{display:grid;gap:8px}
.fold-row{display:grid;grid-template-columns:60px 1fr 64px;gap:10px;align-items:center;font-size:12px}
.fold-row .yr{font-family:var(--mono);color:var(--mut)}
.fold-track{position:relative;height:18px;background:#0a0f17;border:1px solid var(--line);border-radius:5px;overflow:hidden}
.fold-track .zero{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line2)}
.fold-track i{position:absolute;top:2px;bottom:2px;border-radius:3px}
.fold-track i.pos{background:var(--ok);left:50%}
.fold-track i.neg{background:var(--bad);right:50%}
.fold-row .pc{font-family:var(--mono);text-align:right}
.fold-row .pc.pos{color:var(--ok)}.fold-row .pc.neg{color:var(--bad)}

/* ============================================================= run log */
.runlog{display:grid;gap:5px}
.run{display:grid;grid-template-columns:130px 86px 1fr;gap:10px;align-items:center;font-size:12px;
  padding:5px 10px;border-radius:7px;background:#0c121b;border:1px solid var(--line)}
.run .when{font-family:var(--mono);color:var(--mut2);font-size:11px}
.run .phase{font-size:10px;letter-spacing:.5px;text-transform:uppercase;text-align:center;padding:2px 0;border-radius:5px;font-weight:600}
.run .msg{color:var(--ink2);font-family:var(--mono);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phase.ph-collect{background:#0c1722;color:var(--acc)}
.phase.ph-verify{background:#0f2417;color:var(--ok)}
.phase.ph-improve{background:#1a1226;color:var(--violet)}
.phase.ph-other{background:#1a2029;color:var(--mut)}
.run.st-warn{border-color:#3d3415}.run.st-warn .msg{color:var(--warn)}
.run.st-err{border-color:#4a1f1f}.run.st-err .msg{color:var(--bad)}
.run.st-noop{opacity:.7}
details.collapse{margin-top:12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}
details.collapse>summary{padding:10px 14px;cursor:pointer;font-size:12.5px;color:var(--acc);font-weight:600;list-style:none}
details.collapse>summary::-webkit-details-marker{display:none}
details.collapse>summary::before{content:"▸ ";color:var(--mut)}
details.collapse[open]>summary::before{content:"▾ "}
.logtail{font-family:var(--mono);font-size:11px;color:var(--mut);background:#070a0f;padding:10px 14px;margin:0;
  white-space:pre-wrap;border-top:1px solid var(--line);max-height:280px;overflow:auto;line-height:1.5}
.logtail .lt-h{color:var(--cyan)}

/* ============================================================= sources */
.chan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:11px;margin-bottom:14px}
.chan{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.chan.dark{opacity:.65}
.chan .ch-h{display:flex;align-items:center;justify-content:space-between;gap:8px}
.chan .ch-name{font-weight:600;font-size:13px}
.chan .ch-note{font-size:11.5px;color:var(--mut);margin-top:6px}
.fw-table{font-size:12px}
.fw-table td{padding:4px 10px}

/* ============================================================= strategy / glossary */
.tendencies{list-style:none;padding:0;margin:10px 0 0;display:grid;gap:8px}
.tendencies li{position:relative;padding-left:22px;font-size:13px;color:var(--ink2);line-height:1.55}
.tendencies li::before{content:"▸";position:absolute;left:4px;color:var(--acc)}
.gloss{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:11px}
.gterm{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
.gterm .gt{font-family:var(--mono);font-size:12.5px;color:var(--cyan);font-weight:600;margin-bottom:4px}
.gterm .gd{font-size:12px;color:var(--mut);line-height:1.5}

/* tooltips */
.info{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;
  border:1px solid var(--mut2);color:var(--mut);font-size:9px;cursor:help;margin-left:5px;vertical-align:middle;
  position:relative;font-style:normal;font-weight:700}
.info:hover{color:var(--acc);border-color:var(--acc)}
.info:hover::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);
  background:#05080c;border:1px solid var(--line2);color:var(--ink2);font-size:11px;font-weight:400;
  padding:7px 10px;border-radius:7px;width:240px;line-height:1.45;z-index:80;white-space:normal;text-align:left;
  box-shadow:0 8px 24px rgba(0,0,0,.5)}

.banner{border:1px solid #4a1f1f;background:var(--badbg);color:var(--bad);border-radius:10px;padding:11px 14px;
  margin-bottom:14px;font-size:13px}
.banner.warn{border-color:#3d3415;background:var(--warnbg);color:var(--warn)}

footer{text-align:center;color:var(--mut2);font-size:11px;margin-top:50px;padding-top:20px;border-top:1px solid var(--line)}

@media (max-width:900px){
  .hero{grid-template-columns:1fr}
  .stage-grid{grid-template-columns:1fr}
  .swap{grid-template-columns:1fr}
  .swap .meta{flex-direction:row;align-items:center}
}
</style>

 owned rider with the highest captain_ceiling. GOLD = unlimited swaps; the only friction is the 1% buy fee, so only swap when the multi-stage gain beats it. Confidence governs aggression — discount low-confidence riders.","tendencies":["Maximise Σ e_horizon under the hard constraints; do not churn for sub-1%-fee gains.","Use roi_per_million to fill cheap breadth slots so under-priced value is not overlooked.","Among near-equal e_horizon, tilt toward p_top15 breadth and lower ownership.","Captain the owned rider with the highest captain_ceiling (right-tail upside).","Concentrate variance/captaincy where stage leverage is high; prefer breadth on low-confidence stages.","Discount enriched.lowConfidence riders and fused.confidence \u003c 0.4; matchRate governs how much to trust EV.","Respect profile_block / block_boundary look-ahead: do not dump a rider wanted again 1–3 stages later.","On TTT, stage-placement/holdbonus/etapebonus do not apply — value whole strong TT squads."]},"glossary":[{"term":"EV (e_stage)","definition":"Expected value in kr from THIS stage for a rider — Σ over placement, GC, jersey, sprint/KOM, TTT terms, minus hazard. Same kr axis the backtest scores."},{"term":"e_horizon","definition":"Multi-stage expectation: e_stage plus discounted, hold-weighted look-ahead over the next 1–3 stages, net of the amortized 1% buy fee. The primary team-build objective."},{"term":"roi_per_million","definition":"e_horizon (net of amortized fee) per 1M kr of price — the efficiency metric for filling cheap breadth slots. Infinity if value is 0 with positive EV."},{"term":"efficiency","definition":"High/med/low tercile bucket of roi_per_million across the live (non-DNS) field — a quick-read value tag."},{"term":"captain_ceiling","definition":"E[max(0, Δkr)] right-tail if this rider is captained this stage — the win windfall + placement upside + positive passive floor. Captain the owned rider with the highest one."},{"term":"p_stage","definition":"Fused stage-win probability (de-vigged odds + star/UCI/feltet signals via a weighted geometric pool), normalised so the board ~sums to 1."},{"term":"p_top15","definition":"Fused probability of finishing in the stage top-15 (p_stage expanded by a per-stage-type exponent). Drives etapebonus breadth."},{"term":"p_gc","definition":"Fused GC-strength: de-vigged GC win odds blended with a capped UCI-points prior. Paid every held stage as passive GC income."},{"term":"confidence","definition":"HONEST 0–1 trust band = coverage × agreement (NOT a statistical interval). Below 0.4 the rider is flagged low-confidence; discount aggression."},{"term":"coverage","definition":"Count of independent research channels that had a reading for this rider (0–5). More channels = sturdier fusion."},{"term":"matchRate","definition":"Fraction of the pool a LIVE source actually covered. Low pre-race (only GC odds live); rises ~24h out. Low matchRate = treat EV as weak."},{"term":"leverage","definition":"Per-stage 0–1 decisive-stage weight (GC importance, volatility, summit, TT). Concentrate variance/captaincy where it is high."},{"term":"expected_breadth","definition":"Expected count of an optimal 8-man team’s riders inside the stage top-15. High on bunch days, low on selective mountain/TT days."},{"term":"profile_block / block_boundary","definition":"Grouping of consecutive similar stages + whether this stage closes the block — the 1–3 stage anti-churn look-ahead."},{"term":"holdbonus / TTT note","definition":"Holdbonus = real-team stage-finish spillover to all that team’s active riders. On TTT, stage-placement/holdbonus/late-arrival/etapebonus do NOT apply — value whole strong TT squads."},{"term":"substrateLive","definition":"True when the dashboard successfully re-ran the pure fusion+EV engine to reconstruct per-rider numbers; false means it fell back to the snapshot name-lists."}]}</script>
<script>
"use strict";
/* ============================================================= data + helpers */
const D = JSON.parse(document.getElementById('dash-data').textContent);
const root = document.getElementById('root');

const esc = (s)=> String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const elFrom = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
const num = (x)=> typeof x==='number' && isFinite(x);
const kr  = (n)=> num(n)? Math.round(n).toLocaleString('en-US') : '<span class="na">n/a</span>';
const krM = (n)=> num(n)? (n/1e6).toFixed(n%1e6?1:0)+'M' : '<span class="na">n/a</span>';
const pct = (x,d=1)=> num(x)? (x*100).toFixed(d)+'%' : '<span class="na">n/a</span>';
const f2  = (x)=> num(x)? x.toFixed(2) : '<span class="na">n/a</span>';
const naSpan = '<span class="na">n/a</span>';
const cap1 = (s)=> s? s.charAt(0).toUpperCase()+s.slice(1) : '';
const I = (tip)=> '<i class="info" data-tip="'+esc(tip)+'">i</i>';

function relAge(iso){
  if(!iso) return '';
  const ms = Date.now()-new Date(iso).getTime();
  if(!isFinite(ms)) return '';
  const m=Math.round(ms/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  const h=Math.round(m/60); if(h<24) return h+'h ago';
  return Math.round(h/24)+'d ago';
}
function confTier(c){ if(!num(c)) return {c:'--',cls:'low',col:'var(--bad)'}; if(c>=0.6) return {c:c.toFixed(2),cls:'high',col:'var(--ok)'}; if(c>=0.4) return {c:c.toFixed(2),cls:'med',col:'var(--warn)'}; return {c:c.toFixed(2),cls:'low',col:'var(--bad)'}; }
const STAGE_ICON = {ttt:'⏱',itt:'⏱',flat:'🚩',hilly:'⛰',mountain:'🏔',mtn:'🏔',sprint:'🚩',cobbles:'🧱'};
function stageIcon(t){ return STAGE_ICON[(t||'').toLowerCase()] || '🚴'; }

const blocks=[];
const EV_WIRE=[];
function pushBlock(id,n,title,hint,inner){
  blocks.push(`<section class="block" id="${id}">
    <div class="block-h"><span class="num">${n}</span><h2>${title}</h2>${hint?`<span class="hint">${hint}</span>`:''}</div>
    ${inner}</section>`);
}

/* ============================================================= 1. HEADER STRIP */
(function(){
  const m=D.meta||{}, st=D.stage||{}, status=D.status||{};
  const mr = num(status.matchRate)? status.matchRate : null;

  // gauge SVG (semi-dial 0..1)
  function gauge(v){
    const val = num(v)? Math.max(0,Math.min(1,v)) : 0;
    const cx=70,cy=68,r=54, a0=Math.PI, a1=0;
    const ang=a0+(a1-a0)*val;
    const pt=(an)=>[cx+r*Math.cos(an),cy-r*Math.sin(an)];
    const arc=(from,to,col,w)=>{const[x1,y1]=pt(from);const[x2,y2]=pt(to);const large=(from-to)>Math.PI?1:0;
      return `<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}" stroke="${col}" stroke-width="${w}" fill="none" stroke-linecap="round"/>`;}
    const col = val>=0.6?'var(--ok)':val>=0.35?'var(--warn)':'var(--bad)';
    const[nx,ny]=pt(ang);
    return `<svg width="140" height="92" viewBox="0 0 140 92" class="gauge-wrap" role="img" aria-label="matchRate gauge">
      ${arc(a0,a1,'#1a2330',9)}
      ${num(v)?arc(a0,ang,col,9):''}
      <circle cx="${cx}" cy="${cy}" r="4" fill="${col}"/>
      <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
      <text x="${cx}" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="${col}" font-family="var(--mono)">${num(v)?(v*100).toFixed(0)+'%':'n/a'}</text>
    </svg>`;
  }

  const jobs=(status.jobs||[]).map(j=>{
    let cls='bad',txt='off';
    if(j.loaded){ if(j.lastExit===0){cls='ok';txt='exit 0';} else if(j.lastExit==null){cls='ok';txt='loaded';} else {cls='warn';txt='exit '+j.lastExit;} }
    const iv = num(j.intervalSec)? ' · '+(j.intervalSec>=3600?(j.intervalSec/3600)+'h':(j.intervalSec/60)+'m') : '';
    return `<div class="jobpill ${cls}" title="${esc(j.name)}${iv}"><span class="led"></span><span>${esc(j.label)}</span><span class="lx">${txt}</span></div>`;
  }).join('');

  const modeCls = m.mode==='live'?'ok':m.mode==='dry-run'?'warn':'';
  const racing = m.racing;
  const inner = `<div class="hero" id="hero">
    <div>
      <div class="teamname">${esc(D.team&&D.team.teamName||'—')}</div>
      <div class="stageline">Stage ${st.number??'?'} · <b>${cap1(st.type)||'?'}</b> · ${esc(st.start_town||'?')} → ${esc(st.finish_town||'?')} · ${num(st.distance_km)?st.distance_km+' km':'?'}${st.summit_finish?' · <span style="color:var(--warn)">summit finish</span>':''}</div>
      <div class="metarow">
        <span class="pill ${modeCls}"><span class="led"></span>mode: ${esc(m.mode||'?')}</span>
        <span class="pill ${m.substrateLive?'ok':'warn'}">substrate ${m.substrateLive?'LIVE':'fallback'}</span>
        <span class="pill ${m.buildOk?'acc':'bad'}">build ${m.buildOk?'OK':'FAIL'}</span>
        <span class="pill" title="${esc(m.gitHeadMsg||'')}">git ${esc(m.gitHead||'?')}</span>
        <span class="pill">updated ${relAge(m.generatedAt)}</span>
      </div>
      <div class="jobs-strip">${jobs||'<span class="na">no jobs</span>'}</div>
    </div>
    <div class="right">
      ${num(mr)?gauge(mr):gauge(null)}
      <div class="gauge-cap">matchRate ${I(D.status&&D.status.matchRateNote||'')}</div>
      <div style="margin-top:10px;text-align:center">
        ${racing?`<div class="count racing">RACING</div><div class="count-lbl">tour live</div>`
                :`<div class="count">T-${m.tourStartsInDays??'?'}d</div><div class="count-lbl">until grand départ</div>`}
      </div>
    </div>
  </div>`;
  blocks.push(`<section class="block" id="header" style="scroll-margin-top:58px">${inner}</section>`);
})();

/* ============================================================= 1b. CANDOR — WHAT TO DISTRUST */
(function(){
  // Auto-derive the bot's CURRENT weaknesses straight from the live snapshot, severity-ranked.
  // Derivation (not a hand-written list) is the point: this panel cannot quietly omit today's problem.
  const m=D.meta||{}, status=D.status||{}, tm=D.team||{}, im=D.improve||{}, tb=D.teamB||{}, sc=D.sources||{};
  const W=[]; // {sev:'high'|'med'|'low', title, metric, detail}
  const push=(sev,title,metric,detail)=>W.push({sev,title,metric,detail});

  // 1) Substrate fallback — the whole EV board is name-lists, not live per-rider numbers.
  if(m.substrateLive===false){
    push('high','EV substrate is in fallback','name-lists only',
      'Per-rider EV could not be recomputed live this build, so the board below is the snapshot’s name-list leaderboards rather than scored substrate. Treat ROI / ceiling figures as unavailable, not authoritative.');
  }

  // 2) Jobs off or exiting non-zero — the pipeline that feeds every number may be stale.
  const badJobs=(status.jobs||[]).filter(j=>!j.loaded || (j.lastExit!=null && j.lastExit!==0));
  if(badJobs.length){
    push('high','A scheduled job is not healthy',badJobs.length+' job'+(badJobs.length===1?'':'s'),
      'These jobs are off or last exited non-zero: '+badJobs.map(j=>esc(j.label)+(j.loaded?' (exit '+j.lastExit+')':' (off)')).join(', ')+'. Until they run cleanly, the data on this page can silently go stale.');
  }

  // 3) Overfit signal — optimizer found in-sample gain that does NOT carry out-of-sample.
  if(num(im.improvedPct) && num(im.heldOutPct) && im.improvedPct>0 && im.heldOutPct<=0){
    push('med','Last tuning gain did not generalize',
      '+'+im.improvedPct+'% in / '+(im.heldOutPct>=0?'+':'')+im.heldOutPct+'% oos',
      'The self-improve loop found an in-sample improvement that turned negative out-of-sample — a classic overfit. The conjunctive merge gate caught it ('+(im.merged?'MERGED':'correctly NOT merged')+'), but it is a standing reminder that backtest gains here are easy to over-trust.');
  }

  // 4) Coverage gap — how much of the pool a LIVE source actually touched.
  if(num(status.matchRate) && status.matchRate<0.7){
    push(status.matchRate<0.5?'high':'med','Most-of-pool live coverage is thin',
      (status.matchRate*100).toFixed(0)+'% matchRate',
      'A live research source covered only '+(status.matchRate*100).toFixed(0)+'% of the rider pool; the remaining '+((1-status.matchRate)*100).toFixed(0)+'% leans on the model prior, not observed signal. Pre-race this is expected (stage-level sources are still dark), but it caps how much edge the numbers can carry right now.');
  }

  // 5) Dark channels — named, so the reader knows exactly which signals are missing.
  const dark=(sc.channels||[]).filter(c=>!c.live);
  if(dark.length){
    push('low',dark.length+' of '+(sc.channels||[]).length+' research channels are dark','',
      'Currently dark: '+dark.map(c=>esc(c.label||c.name)).join(', ')+'. These light up closer to each stage (~24h out); until then the fusion blends fewer independent opinions.');
  }

  // 6) Single-team mode — half the portfolio's top-1% path is switched off.
  if(tb && tb.enabled===false){
    push('med','Only the anchor team is live','Team B disabled',
      'The decorrelated differential (Team B) is disabled in config, so the two-team portfolio that chases a top-1% finish is running on one entry. The shadow plan is shown below, but it is not applied to any live team.');
  }

  // 7) Owned riders with no EV substrate — a real per-rider data gap.
  const riders=tm.riders||[];
  const gaps=riders.filter(r=>!(r.ev && (num(r.ev.e_horizon)||num(r.ev.captain_ceiling))));
  if(gaps.length){
    push('med',gaps.length+' owned rider'+(gaps.length===1?'':'s')+' carry no live EV',gaps.length+'/'+riders.length,
      'No live substrate attached to: '+gaps.map(r=>esc(r.name)).join(', ')+'. Their value and captain math cannot be scored this build — a genuine data gap, not a zero.');
  }

  // 8) Captaincy not the highest ceiling — reuse the same ceiling logic as the captain section.
  const ranked=riders.filter(r=>r.ev&&num(r.ev.captain_ceiling))
    .map(r=>({name:r.name,ceil:r.ev.captain_ceiling,isCaptain:!!r.isCaptain}))
    .sort((a,b)=>b.ceil-a.ceil);
  if(ranked.length){
    const chosen=ranked.find(r=>r.isCaptain), top=ranked[0];
    if(!chosen){
      push('high','Captain is unexplained here','no ceiling match',
        'The live captain ('+esc(tm.captain||'—')+') did not match any rider carrying a captain_ceiling this build, so the crown cannot be justified numerically — a possible data gap.');
    } else if(chosen.name!==top.name){
      push('high','Captaincy is not the highest ceiling',esc(chosen.name)+' over '+esc(top.name),
        chosen.name+' wears the crown (ceiling '+kr(chosen.ceil)+') but '+top.name+' scores higher ('+kr(top.ceil)+'). The strategy says crown the top ceiling — this is a stale captaincy or a deliberate override worth checking.');
    }
  }

  const order={high:0,med:1,low:2};
  W.sort((a,b)=>order[a.sev]-order[b.sev]);
  const counts=W.reduce((o,w)=>{o[w.sev]=(o[w.sev]||0)+1;return o;},{});
  const badge=W.length?'⚑ '+W.length:'OK';

  let body;
  if(!W.length){
    body=`<div class="candor-clear">✓ No material weakness detected from this snapshot. Substrate is live, jobs are clean, coverage is adequate, and the captaincy matches the highest ceiling. (This panel is auto-derived — when something breaks it will appear here, not be hidden.)</div>`;
  } else {
    const sumPills=['high','med','low'].filter(s=>counts[s]).map(s=>{
      const lbl=s==='high'?'high':s==='med'?'medium':'low';
      const cls=s==='high'?'bad':s==='med'?'warn':'';
      return `<span class="pill ${cls}">${counts[s]} ${lbl}</span>`;
    }).join('');
    const rows=W.map(w=>`<div class="candor sev-${w.sev}">
        <span class="sev-tag">${w.sev}</span>
        <div>
          <div class="c-title">${esc(w.title)}${w.metric?`<span class="c-metric">${w.metric}</span>`:''}</div>
          <div class="c-detail">${w.detail}</div>
        </div>
      </div>`).join('');
    body=`<p class="candor-intro">Derived live from this snapshot — every item below is a real limitation in force right now, ranked most-severe first. Nothing here is hidden in a sub-section.</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px">${sumPills}</div>
      <div class="candor-list">${rows}</div>`;
  }
  pushBlock('candor',badge,'Candor — what to distrust','the bot’s weaknesses, auto-derived & severity-ranked — surfaced up front, never buried',
    `<div class="card">${body}</div>`);
})();

/* ============================================================= 2. TEAM BOARD */
(function(){
  const tm=D.team||{};
  const riders=tm.riders||[];
  // colour per real team
  const teams=[...new Set(riders.map(r=>r.realTeam||'Unknown'))];
  const palette=['#58a6ff','#39d3c8','#a371f7','#e3b341','#f0883e','#db61a2','#3fb950','#79c0ff'];
  const tcol={}; teams.forEach((t,i)=>tcol[t]=palette[i%palette.length]);

  const budgetPct = (num(tm.totalValue)&&num(tm.budget)&&tm.budget>0)? Math.min(100,tm.totalValue/tm.budget*100):0;

  const cards=riders.map(r=>{
    const col=tcol[r.realTeam||'Unknown'];
    const ev=r.ev, fu=r.fused;
    const hasData = ev||fu;
    const ct=confTier(fu&&fu.confidence);
    const sub = hasData? `<div class="subgrid">
        <b>e_horizon</b><span>${kr(ev&&ev.e_horizon)}</span>
        <b>cap ceil</b><span>${kr(ev&&ev.captain_ceiling)}</span>
        <b>p_stage</b><span>${pct(fu&&fu.p_stage,2)}</span>
        <b>p_top15</b><span>${pct(fu&&fu.p_top15,2)}</span>
        <b>p_gc</b><span>${pct(fu&&fu.p_gc)}</span>
        <b>roi/M</b><span>${num(ev&&ev.roi_per_million)?Math.round(ev.roi_per_million).toLocaleString('en-US'):naSpan}</span>
      </div>
      <div class="srcline">
        <span style="font-size:11px;color:var(--mut)"><span class="conf-dot" style="background:${ct.col}"></span>conf ${ct.c}</span>

/* ============================================================= 2b. CAPTAIN PICK */
(function(){
  const tm=D.team||{};
  const riders=tm.riders||[];
  // Owned riders ranked by captain_ceiling — the exact metric the strategy uses to pick the captain.
  // r.isCaptain is computed upstream by a robust norm match (never surname-only), so we trust it here.
  const ranked=riders.filter(r=>r.ev&&num(r.ev.captain_ceiling))
    .map(r=>({name:r.name,realTeam:r.realTeam,ceil:r.ev.captain_ceiling,isCaptain:!!r.isCaptain}))
    .sort((a,b)=>b.ceil-a.ceil);
  const noData=riders.filter(r=>!(r.ev&&num(r.ev.captain_ceiling))).map(r=>r.name);

  if(!ranked.length){
    pushBlock('captain','CAP','Captain pick — why the crown','the captaincy decision, ranked by captain_ceiling',
      `<div class="card"><span class="na">No per-rider captain_ceiling available this build (substrate not live), so the captaincy of <b>${esc(tm.captain||'—')}</b> cannot be justified numerically here.</span></div>`);
    return;
  }
  const chosen=ranked.find(r=>r.isCaptain)||null;
  const top=ranked[0], runner=ranked[1]||null;
  const maxc=top.ceil>0?top.ceil:1;

  let callout;
  if(!chosen){
    // Live captain exists but didn't resolve to a ceiling-bearing rider — surface it as a gap, don't hide it.
    callout=`<div class="banner warn">The live captain <b>${esc(tm.captain||'—')}</b> could not be matched to a rider carrying a captain_ceiling in this build — the captaincy is <b>unexplained</b> here (possible data gap, not a green light).</div>`;
  } else if(chosen.name===top.name){
    const marg=runner&&runner.ceil>0?(chosen.ceil/runner.ceil):null;
    callout=`<div class="cap-callout"><b style="color:var(--gold)">★ ${esc(chosen.name)}</b> is captained — the <b>highest captain_ceiling in the squad</b> at <b class="mono">${kr(chosen.ceil)}</b> kr${runner?`, ${marg?'<b>×'+marg.toFixed(1)+'</b> ':''}the next-best (${esc(runner.name)}, ${kr(runner.ceil)})`:''}. ${I('captain_ceiling = E[max(0,Δkr)] right-tail upside if this rider is captained this stage — win windfall + placement upside + positive passive floor.')} The strategy crowns the owned rider with the largest captain_ceiling, so this pick is <b>consistent with the rule</b>.</div>`;
  } else {
    // The crowned rider is NOT the top-ceiling rider — the most important honesty case to flag.
    callout=`<div class="banner warn">⚠ <b>Captaincy mismatch.</b> <b>${esc(chosen.name)}</b> wears the crown (ceiling ${kr(chosen.ceil)}), but <b>${esc(top.name)}</b> has the higher captain_ceiling (${kr(top.ceil)}). The strategy says to captain the highest-ceiling owned rider — this is a possible stale captaincy or a deliberate override, and worth a look.</div>`;
  }

  const bars=ranked.map(r=>{
    const w=Math.max(2,Math.round(r.ceil/maxc*100));
    return `<div class="caprow ${r.isCaptain?'chosen':''}">
      <span class="cn"><b>${r.isCaptain?'★ ':''}${esc(r.name)}</b><small>${esc(r.realTeam||'—')}</small></span>
      <span class="ctrack"><i style="width:${w}%"></i></span>
      <span class="cval">${kr(r.ceil)}</span>
    </div>`;
  }).join('');
  const nodataLine=noData.length?`<div class="cap-nodata">Not ranked — no live substrate to score a ceiling (real data gap): ${noData.map(esc).join(', ')}.</div>`:'';

  const inner=`<div class="card">
    ${callout}
    <h3>Owned riders ranked by captain_ceiling ${I('Right-tail Δkr upside if captained this stage. The crowned (gold) bar should sit at the top.')}</h3>
    <div class="capwrap">${bars}</div>
    ${nodataLine}
  </div>`;
  pushBlock('captain','CAP','Captain pick — why the crown','owned riders ranked by captain_ceiling · the gold (crowned) bar should top the list',inner);
})();

/* ============================================================= 3. DECISION */
(function(){
  const dc=D.decision;
  if(!dc){ pushBlock('decision','03','Why this team','the decision','<div class="card"><span class="na">No decision plan available.</span></div>'); return; }

  /* Plan-vs-live reconciliation — does the bot actually HOLD the team this plan describes?
     The "why" narrative is for dc.target_team, but that can differ from the live roster
     (a rebuild not yet applied, a human-gated swap, a stale captaincy). Surface the gap
     honestly instead of letting the two sections silently contradict each other.
     Name match is brother-safe: exact-normalized, else first-initial + surname-suffix,
     NEVER surname alone (brothers share surnames). */
  const normName=(s)=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z ]/g,' ').replace(/\s+/g,' ').trim();
  function namesMatch(a,b){
    const na=normName(a), nb=normName(b); if(!na||!nb) return false; if(na===nb) return true;
    const pa=na.split(' '), pb=nb.split(' '); if(!pa[0]||!pb[0]) return false;
    const sa=pa[pa.length-1], sb=pb[pb.length-1];
    const surOk = sa===sb || sa.endsWith(sb) || sb.endsWith(sa);
    return surOk && pa[0][0]===pb[0][0]; // first initial must agree — never surname alone
  }
  let recon='';
  (function(){
    const planTeam=(dc.target_team||[]).filter(Boolean);
    const liveTeam=((D.team&&D.team.riders)||[]).map(r=>r.name).filter(Boolean);
    if(!planTeam.length || !liveTeam.length) return; // nothing to reconcile against
    const held =planTeam.filter(p=>liveTeam.some(l=>namesMatch(p,l)));
    const toBuy=planTeam.filter(p=>!liveTeam.some(l=>namesMatch(p,l)));
    const toSell=liveTeam.filter(l=>!planTeam.some(p=>namesMatch(p,l)));
    const planCap=dc.captain_name||null, liveCap=(D.team&&D.team.captain)||null;
    const capMatch=(planCap&&liveCap)? namesMatch(planCap,liveCap) : null;
    const rosterApplied=toBuy.length===0 && toSell.length===0;
    const fullApplied=rosterApplied && capMatch!==false;
    const nm=(name,isCap)=>`<div class="nm"><span class="dot2"></span>${isCap?'<span class="star">★</span>':''}${esc(name)}</div>`;
    const capCmp=(planCap||liveCap)?`<div class="capcmp">
        <div class="cc"><small>plan captain</small><b style="color:var(--gold)">★ ${esc(planCap||'—')}</b></div>
        <div class="cc"><small>live captain</small><b style="color:${capMatch===false?'var(--warn)':'var(--gold)'}">★ ${esc(liveCap||'—')}</b></div>
        ${capMatch===null?'':`<span class="verd ${capMatch?'ok':'warn'}">${capMatch?'✓ captain matches':'⚠ captain differs — the live crown is not the planned one'}</span>`}
      </div>`:'';
    const col=(cls,label,arr,capName)=> arr.length? `<div class="col ${cls}"><h4>${label} <span class="cnt">${arr.length}</span></h4>${arr.map(n=>nm(n,capName&&namesMatch(n,capName))).join('')}</div>`:'';
    const cols=[
      col('held','In plan &amp; held',held, fullApplied?planCap:null),
      col('buy','Planned · not yet bought',toBuy, planCap),
      col('sell','Held · not in plan (would sell)',toSell, liveCap),
    ].filter(Boolean).join('');
    const head = fullApplied
      ? '✓ The live roster matches this plan'
      : `⚠ This plan is <b>not yet reflected</b> in the live roster`;
    const sub = fullApplied
      ? 'Every planned rider is held and the planned captain is the live captain — the decision below is the team the bot actually owns.'
      : `${toBuy.length} of ${planTeam.length} planned rider${toBuy.length===1?'':'s'} ${toBuy.length===1?'is':'are'} not held yet`
        + (toSell.length?`, and ${toSell.length} held rider${toSell.length===1?'':'s'} ${toSell.length===1?'is':'are'} not in the plan`:'')
        + (capMatch===false?', and the live captain differs from the planned captain':'')
        + `. The rationale below explains the <b>planned</b> target team — not necessarily the roster shown in “Current team” above.`
        + (dc.rebuild?' This plan is a full rebuild; pre-stage-1 transfers are free, so it may be applied in a later cycle.':'');
    recon=`<div class="recon ${fullApplied?'applied':'drift'}">
      <div class="rh">${head}</div>
      <div class="rsub">${sub}</div>
      ${capCmp}
      <div class="cols">${cols}</div>
    </div>`;
  })();

  const swaps=(dc.swaps||[]).map(sw=>{
    const cc=(sw.confidence||'').toLowerCase();
    const ccCls=cc==='high'?'high':cc==='med'?'med':cc==='low'?'low':'med';
    return `<div class="swap">
      <div>
        <div class="flow"><span class="sell">${esc(sw.sell_name||'—')}</span><span class="arrow">→</span><span class="buy">${esc(sw.buy_name||'—')}</span></div>
        <div class="why">${esc(sw.rationale||'')}</div>
      </div>
      <div class="meta">
        ${num(sw.expected_value)?`<span class="ev">EV ${kr(sw.expected_value)}</span>`:'<span class="ev na">EV n/a</span>'}
        ${sw.confidence?`<span class="chip-conf ${ccCls}">${esc(sw.confidence)}</span>`:'<span class="chip-conf med">conf n/a</span>'}
        ${sw.human_gated===true?'<span class="pill warn tiny">human-gated</span>':''}
      </div>
    </div>`;
  }).join('');

  const tt=(dc.target_team||[]).map(n=>`<span class="tt-chip ${n===dc.captain_name?'cap':''}">${n===dc.captain_name?'★ ':''}${esc(n)}</span>`).join('');

  const inner=`<div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <span class="pill acc">source: ${esc(dc.source||'?')}</span>
      ${dc.rebuild?'<span class="pill warn">FULL REBUILD</span>':''}
      ${num(dc.matchRateAtWrite)?`<span class="pill">matchRate@write ${(dc.matchRateAtWrite*100).toFixed(0)}%</span>`:''}
      ${num(dc.total_value)?`<span class="pill">target value ${krM(dc.total_value)}</span>`:''}
      <span class="pill">written ${relAge(dc.generatedAt)}</span>
    </div>
    ${recon}
    <div class="decision-summary">${esc(dc.summary||'')}</div>
    <h3 style="margin:6px 0 9px">${(dc.swaps||[]).length} swap${(dc.swaps||[]).length===1?'':'s'} — sell → buy</h3>
    <div class="swaps">${swaps||'<span class="na">no swaps</span>'}</div>
    ${tt?`<h3 style="margin:16px 0 7px">Resulting target team</h3><div class="target-team">${tt}</div>`:''}
  </div>`;
  pushBlock('decision','03','Why this team — the decision','the core explanation: what changed and why',inner);
})();

/* ============================================================= 4. EV EXPLORER */
(function(){
  const live=D.meta&&D.meta.substrateLive;
  const board=D.evBoard||[];
  if(!live || !board.length){
    // fallback to name lists
    const b=D.boards||{};
    const list=(arr)=> (arr&&arr.length)? '<ol style="margin:6px 0 0;padding-left:20px">'+arr.map(n=>`<li>${esc(n)}</li>`).join('')+'</ol>' : '<span class="na">none</span>';
    const inner=`<div class="banner warn">Live per-rider substrate was unavailable for this build — showing the snapshot's name-list leaderboards instead.</div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">
        <div class="card"><h3>Top by EV</h3>${list(b.topByEv)}</div>
        <div class="card"><h3>Top by ROI</h3>${list(b.topByRoi)}</div>
        <div class="card"><h3>Low confidence</h3>${list(b.lowConfidence)}</div>
      </div>`;

  }
  // max for sparkbars
  const maxEh=Math.max(1,...board.map(r=>num(r.e_horizon)?r.e_horizon:0));
  const cols=[
    {k:'name',  t:'Rider',     num:false},
    {k:'realTeam',t:'Team',    num:false},
    {k:'value', t:'Price',     num:true,  fmt:v=>krM(v)},
    {k:'p_stage',t:'p_stage',  num:true,  fmt:v=>pct(v,2)},
    {k:'p_top15',t:'p_top15',  num:true,  fmt:v=>pct(v,2)},
    {k:'p_gc',  t:'p_gc',      num:true,  fmt:v=>pct(v)},

    {k:'coverage',t:'cov',     num:true,  fmt:v=>num(v)?v:naSpan},
    {k:'e_stage',t:'e_stage',  num:true,  fmt:v=>kr(v)},
    {k:'e_horizon',t:'e_horizon',num:true,fmt:ehCell},
    {k:'roi_per_million',t:'roi/M',num:true,fmt:v=>num(v)?Math.round(v).toLocaleString('en-US'):naSpan},
    {k:'captain_ceiling',t:'cap ceil',num:true,fmt:v=>kr(v)},
  ];
  function confCell(v){ const t=confTier(v); return `<span class="confcell"><span style="color:${t.col}">${t.c}</span></span>`; }
  function ehCell(v){ const w=num(v)?Math.max(1,Math.round(v/maxEh*46)):0; return `<span class="sparkbg"><span class="spark" style="width:${w}px"></span></span>${kr(v)}`; }

  const head=cols.map((c,i)=>`<th class="${c.num?'r':''} sortable" data-col="${i}">${c.t}<span class="ar"></span></th>`).join('');
  const inner=`<div class="card">
    <div class="explorer-bar">
      <input type="text" id="evfilter" placeholder="filter by rider or team…">

      <label><input type="checkbox" id="evcov"> covered only (conf≥0.4)</label>

      <table id="evtable"><thead><tr>${head}</tr></thead><tbody></tbody></table>
    </div>
  </div>`;
  pushBlock('explorer','04','EV substrate explorer','full pool of '+board.length+' · click headers to sort · default e_horizon ↓ · this is WHY X over Y',inner);

  // defer wiring until DOM is in place
  EV_WIRE.push(function(){
    const tbody=document.querySelector('#evtable tbody');
    const ths=document.querySelectorAll('#evtable thead th');
    let sortCol=9, sortDir=-1; // e_horizon desc
    function render(){
      const q=(document.getElementById('evfilter').value||'').toLowerCase();
      const ownedOnly=document.getElementById('evowned').checked;
      const covOnly=document.getElementById('evcov').checked;

      rows.sort((a,b)=>{
        let av=a[c.k],bv=b[c.k];

      tbody.innerHTML=rows.map(r=>{

      ths.forEach((th,i)=>{ th.classList.toggle('act',i===sortCol); const ar=th.querySelector('.ar'); if(ar) ar.textContent= i===sortCol?(sortDir<0?'▼':'▲'):''; });
    }
    ths.forEach(th=>th.addEventListener('click',()=>{
      const i=+th.dataset.col;
      if(i===sortCol) sortDir*=-1; else { sortCol=i; sortDir= cols[i].num? -1 : 1; }
      render();
    }));
    document.getElementById('evfilter').addEventListener('input',render);
    document.getElementById('evowned').addEventListener('change',render);
    document.getElementById('evcov').addEventListener('change',render);
    render();
  });
})();

/* ============================================================= 5. STAGE CONTEXT */
(function(){
  const st=D.stage||{}, en=st.enriched||{}, tw=en.type_weighting||null;
  const up=D.upcomingStages||[];

  // radar for type_weighting
  function radar(tw){
    if(!tw) return '<span class="na">no type weighting</span>';
    const keys=['climber','sprinter','puncheur','rouleur','breakaway','gc'];
    const vals=keys.map(k=>num(tw[k])?tw[k]:0);
    const maxv=Math.max(0.001,...vals);
    const cx=95,cy=95,R=72,N=keys.length;
    const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};
    let rings='';
    [0.25,0.5,0.75,1].forEach(f=>{ const p=keys.map((_,i)=>pt(i,R*f).map(n=>n.toFixed(1)).join(',')).join(' '); rings+=`<polygon points="${p}" fill="none" stroke="#1e2632" stroke-width="1"/>`; });
    let axes='',labels='';
    keys.forEach((k,i)=>{ const[x,y]=pt(i,R); axes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#1a2330"/>`;
      const[lx,ly]=pt(i,R+14); labels+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="9.5" fill="var(--mut)" text-anchor="middle" dominant-baseline="middle">${k}</text>`; });
    const poly=keys.map((k,i)=>pt(i,R*(vals[i]/maxv)).map(n=>n.toFixed(1)).join(',')).join(' ');
    return `<svg width="190" height="190" viewBox="0 0 190 190" role="img" aria-label="type weighting radar">
      ${rings}${axes}
      <polygon points="${poly}" fill="rgba(163,113,247,.22)" stroke="var(--violet)" stroke-width="2"/>
      ${keys.map((k,i)=>{const[x,y]=pt(i,R*(vals[i]/maxv));return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="var(--violet)"/>`;}).join('')}
      ${labels}</svg>`;
  }
  function twBars(tw){
    if(!tw) return '';
    const keys=['climber','sprinter','puncheur','rouleur','breakaway','gc'];
    const maxv=Math.max(0.001,...keys.map(k=>num(tw[k])?tw[k]:0));
    return `<div class="tw-bars">`+keys.map(k=>{const v=num(tw[k])?tw[k]:0;return `<div class="tw-row"><span class="lbl">${k}</span><span class="bar"><i style="width:${(v/maxv*100).toFixed(0)}%"></i></span><span class="val">${v.toFixed(3)}</span></div>`;}).join('')+`</div>`;
  }

  const upcards=up.map(s=>`<div class="ustage ${s.summit_finish?'summit':''}">
      <div class="sn">Stage ${s.number??'?'} · ${s.date||''}</div>
      <div class="ic">${stageIcon(s.type)}</div>
      <div class="ty">${cap1(s.type)||'?'}</div>
      <div class="rt">${esc(s.start_town||'?')} → ${esc(s.finish_town||'?')}<br>${num(s.distance_km)?s.distance_km+' km':''}</div>
      ${s.summit_finish?'<div class="summitflag">▲ summit finish</div>':''}
    </div>`).join('');

  const inner=`<div class="stage-grid">
    <div class="card">
      <h3>Stage ${st.number??'?'} profile</h3>
      <div class="kv" style="display:grid;grid-template-columns:max-content 1fr;gap:5px 14px;font-size:13px">
        <b class="muted">Type</b><span>${cap1(st.type)||naSpan}</span>
        <b class="muted">Route</b><span>${esc(st.start_town||'?')} → ${esc(st.finish_town||'?')}</span>
        <b class="muted">Distance</b><span>${num(st.distance_km)?st.distance_km+' km':naSpan}</span>
        <b class="muted">Date</b><span>${esc(st.date||naSpan)}</span>
        <b class="muted">Summit</b><span>${st.summit_finish?'yes':'no'}</span>
      </div>
      <p style="font-size:12.5px;color:var(--mut);line-height:1.6;margin:12px 0 0">${esc(st.profile_notes||'')}</p>
    </div>
    <div class="card">
      <h3>Enriched block ${I('Per-stage signal weighting the engine derives — what rider archetypes this stage rewards.')}</h3>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px">
        <span class="pill">leverage ${num(en.leverage)?en.leverage:naSpan}</span>
        <span class="pill">breadth ${en.expected_breadth??naSpan}</span>
        <span class="pill">${esc(en.profile_block||'—')}</span>
        ${en.block_boundary?'<span class="pill warn">block boundary</span>':''}
      </div>
      <div class="radar-wrap">${radar(tw)}${twBars(tw)}</div>
    </div>
  </div>
  <h3 style="margin:18px 0 9px;font-size:12px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase">Upcoming stages</h3>
  <div class="upcoming">${upcards||'<span class="na">none</span>'}</div>`;
  pushBlock('stage','05','Stage context','profile · enriched type-weighting radar · look-ahead',inner);
})();

/* ============================================================= 6. BRAIN JOURNAL */
(function(){
  const bj=D.brainJournal||[];
  const entries=bj.map(b=>`<div class="entry ${b.action==='ACTED'?'ACTED':b.action==='HELD'?'HELD':''}">
      <div class="ts">${esc(b.ts||'')}</div>
      <div>
        <div class="head"><span class="act ${b.action==='ACTED'?'ACTED':'HELD'}">${esc(b.action||'—')}</span></div>
        <div class="txt">${esc(b.text||'')}</div>
      </div>
    </div>`).join('');
  pushBlock('brain','06','Brain journal','hourly HELD / ACTED reasoning · newest first',
    `<div class="card"><div class="journal">${entries||'<span class="na">no journal entries</span>'}</div></div>`);
})();

/* ============================================================= 7. SELF-IMPROVE */
(function(){
  const im=D.improve;
  if(!im){ pushBlock('improve','07','Self-improvement','','<div class="card"><span class="na">No improve report.</span></div>'); return; }
  const cv=im.crossVal||{}, folds=cv.folds||[];
  const maxAbs=Math.max(0.5,...folds.map(f=>Math.abs(num(f.pct)?f.pct:0)));
  const foldBars=folds.map(f=>{
    const p=num(f.pct)?f.pct:0; const w=Math.abs(p)/maxAbs*50;
    return `<div class="fold-row">
      <span class="yr">${f.year}</span>
      <div class="fold-track"><div class="zero"></div><i class="${p>=0?'pos':'neg'}" style="width:${w.toFixed(1)}%"></i></div>
      <span class="pc ${p>=0?'pos':'neg'}">${p>=0?'+':''}${num(f.pct)?f.pct.toFixed(2):'?'}%</span>
    </div>`;
  }).join('');
  const wc=(im.weightChanges||[]).map(w=>`<tr><td class="mono">${esc(w.knob)}</td><td class="r">${esc(w.from)}</td><td style="text-align:center;color:var(--mut)">→</td><td class="r">${esc(w.to)}</td></tr>`).join('');
  const findings=(im.autopsy&&im.autopsy.findings||[]).map(fd=>`<div style="border:1px solid var(--line);border-radius:9px;padding:9px 12px;background:#0c121b">
      <span class="chip-conf ${fd.severity==='high'?'low':fd.severity==='med'?'med':'high'}">${esc(fd.severity||'')}</span>
      <b style="margin-left:7px">${esc(fd.area||'')}</b>
      <div style="font-size:12.5px;color:var(--mut);margin-top:5px">${esc(fd.detail||'')}</div>
    </div>`).join('');
  const aStats=im.autopsy&&im.autopsy.stats||null;
  const statChips=aStats?Object.entries(aStats).filter(([k,v])=>typeof v!=='object').map(([k,v])=>`<span class="pill tiny">${esc(k)}: ${esc(v)}</span>`).join(''):'';

  const inner=`<div class="card">
    <div class="imp-top">
      <div class="metric ${num(im.improvedPct)&&im.improvedPct>=0?'pos':'neg'}"><div class="v">${num(im.improvedPct)?(im.improvedPct>=0?'+':'')+im.improvedPct+'%':'—'}</div><div class="l">in-sample</div></div>
      <div class="metric ${num(im.heldOutPct)&&im.heldOutPct>=0?'pos':'neg'}"><div class="v">${num(im.heldOutPct)?(im.heldOutPct>=0?'+':'')+im.heldOutPct+'%':'—'}</div><div class="l">held-out (oos)</div></div>
      <div class="metric"><div class="v" style="color:${im.merged?'var(--ok)':'var(--warn)'}">${im.merged?'MERGED':'HELD'}</div><div class="l">verdict</div></div>
      <div class="metric"><div class="v">${(im.years||[]).length}</div><div class="l">backtest years</div></div>
    </div>
    <div class="gate-explain"><b>Merge gate ${I('Conjunctive: in-sample ≥ floor AND held-out ≥ floor AND no cross-val fold regresses. ALL must pass to auto-merge.')}:</b> ${esc(im.mergeGateExplanation||'')}</div>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <h3>Cross-validation folds ${I('Leave-one-year-out: candidate vs baseline per season. Signed bars, baseline at 0.')}</h3>
        <div class="fold-bars">${foldBars||'<span class="na">no folds</span>'}</div>
      </div>
      <div>
        <h3>Proposed weight changes</h3>
        ${wc?`<div class="tbl-wrap"><table>${wc}</table></div>`:'<span class="na">none</span>'}
      </div>
    </div>
    <h3 style="margin-top:16px">Autopsy</h3>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${statChips}</div>
    <div class="grid" style="gap:9px">${findings||'<span class="na">no findings</span>'}</div>
  </div>`;
  pushBlock('improve','07','Self-improvement','in-sample vs held-out · the conjunctive merge gate explained',inner);
})();

/* ============================================================= 8. RUN LOG */
(function(){
  const runs=D.status&&D.status.recentRuns||[];
  const tails=D.status&&D.status.logTails||{};
  const rows=runs.map(r=>{
    const ph=(r.phase||'other').toLowerCase();
    const phCls= ph==='collect'?'ph-collect':ph==='verify'?'ph-verify':ph==='improve'?'ph-improve':'ph-other';
    const stCls= r.status==='warn'?'st-warn':(r.status==='err'||r.status==='error')?'st-err':r.status==='noop'?'st-noop':'';
    return `<div class="run ${stCls}">
      <span class="when">${esc(r.created_at||'')}</span>
      <span class="phase ${phCls}">${esc(r.phase||'?')}</span>
      <span class="msg" title="${esc(r.message||'')}">${esc(r.status||'')} · ${esc(r.message||'')}</span>
    </div>`;
  }).join('');
  const tail=(name)=>{ const lines=tails[name]||[]; if(!lines.length) return '';
    return `<details class="collapse"><summary>${name}.log — last ${lines.length} lines</summary><pre class="logtail">${lines.map(l=>esc(l)).join('\n')}</pre></details>`; };
  const inner=`<div class="card">
    <div class="runlog">${rows||'<span class="na">no runs</span>'}</div>
    ${tail('evening')}${tail('watch')}${tail('improve')}${tail('guard')}
  </div>`;
  pushBlock('runlog','08','Pipeline run log','newest first · colour-coded by phase/status · log tails behind collapse',inner);
})();

/* ============================================================= 9. PROVENANCE */
(function(){
  const sc=D.sources||{};
  const chans=(sc.channels||[]).map(c=>`<div class="chan ${c.live?'':'dark'}">
      <div class="ch-h"><span class="ch-name">${esc(c.label||c.name)}</span>
        <span class="pill ${c.live?'ok':''}">${c.live?'<span class="led"></span>live':'dark'}</span></div>
      <div class="ch-note">${esc(c.coverageNote||'')}</div>
      <div class="tiny mono" style="color:var(--mut2);margin-top:5px">${esc(c.name)}</div>
    </div>`).join('');
  const fw=sc.fusionWeightsSummary||{};
  function wtRows(obj,label){ if(!obj||typeof obj!=='object') return ''; return `<tr><td colspan="2" style="color:var(--cyan);padding-top:8px">${label}</td></tr>`+Object.entries(obj).map(([k,v])=>`<tr><td class="muted">${esc(k)}</td><td class="r mono">${esc(v)}</td></tr>`).join(''); }
  const inner=`<div class="card">
    <p style="font-size:13px;color:var(--ink2);margin:0 0 12px">Five research channels feed the fusion engine. <b>matchRate ${pct(sc.matchRate)}</b> = the fraction of the pool a LIVE source actually covered. Pre-race only the GC odds board and UCI points are live; stage odds / star ratings / feltet are dark until ~24h out.</p>
    <div class="chan-grid">${chans}</div>
    <h3 style="margin-top:6px">Fusion weights summary ${I('Channel base weights × per-stage-type overrides. Loop-tunable by the self-improve routine.')}</h3>
    <div class="tbl-wrap" style="max-width:520px"><table class="fw-table">
      ${wtRows(fw.channelBase,'channel base')}
      ${wtRows(fw.byTypeCurrent,'this stage type ('+(D.stage&&D.stage.type||'?')+')')}
      <tr><td class="muted">gcWeight</td><td class="r mono">${esc(fw.gcWeight)}</td></tr>
      <tr><td class="muted">uciGcWeight</td><td class="r mono">${esc(fw.uciGcWeight)}</td></tr>
      <tr><td class="muted">note</td><td class="r">${esc(fw.note)}</td></tr>
    </table></div>
  </div>`;
  pushBlock('sources','09','Data provenance','channel coverage live/dark · matchRate · fusion weights',inner);
})();

/* ============================================================= 10. STRATEGY + GLOSSARY */
(function(){
  const str=D.strategy||{};
  const tend=(str.tendencies||[]).map(t=>`<li>${esc(t)}</li>`).join('');
  const gloss=(D.glossary||[]).map(g=>`<div class="gterm"><div class="gt">${esc(g.term)}</div><div class="gd">${esc(g.definition)}</div></div>`).join('');
  const inner=`<div class="card" style="margin-bottom:14px">
      <h3>Strategy essence</h3>
      <p style="font-size:13.5px;line-height:1.65;color:var(--ink2)">${esc(str.essence||'')}</p>
      <h3 style="margin-top:14px">EV tendencies (not hard rules)</h3>
      <ul class="tendencies">${tend}</ul>
    </div>
    <div class="card">
      <h3>Glossary — how to read this</h3>
      <div class="gloss">${gloss}</div>
    </div>`;
  pushBlock('glossary','10','Glossary &amp; strategy','EV tendencies · term definitions for the non-expert',inner);
})();

/* ============================================================= FINAL MOUNT */
(function(){
  const root=document.getElementById('root');
  root.innerHTML = blocks.join('');
  // run deferred explorer wiring
  (EV_WIRE||[]).forEach(fn=>{ try{ fn(); }catch(e){ console.warn('ev wire',e); } });
  // stamps
  const stamp = (D.meta&&D.meta.generatedAt)? new Date(D.meta.generatedAt).toLocaleString() : '';
  const ns=document.getElementById('navstamp'); if(ns) ns.textContent=stamp;
  const fs=document.getElementById('footstamp'); if(fs) fs.textContent='· generated '+stamp;
})();
</script>
</body>
